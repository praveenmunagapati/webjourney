<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebJourney IDE — Learn HTML, CSS & JavaScript</title>
  <meta name="description" content="All-in-one web IDE for learning HTML5, CSS3 & JavaScript with 200+ live examples.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg-app: #06080f;
      --bg-primary: #0b0f1a;
      --bg-secondary: #111827;
      --bg-tertiary: #1a2236;
      --bg-editor: #0d1117;
      --bg-hover: rgba(139, 92, 246, 0.08);
      --bg-active: rgba(139, 92, 246, 0.15);
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --accent: #8b5cf6;
      --accent-2: #06b6d4;
      --accent-3: #f472b6;
      --accent-grad: linear-gradient(135deg, #8b5cf6, #06b6d4);
      --accent-grad2: linear-gradient(135deg, #f472b6, #8b5cf6, #06b6d4);
      --border: rgba(148, 163, 184, 0.08);
      --border-active: rgba(139, 92, 246, 0.4);
      --shadow-glow: 0 0 20px rgba(139, 92, 246, 0.15);
      --success: #10b981;
      --warning: #f59e0b;
      --error: #ef4444;
      --info: #3b82f6;
      --html-color: #e34c26;
      --css-color: #264de4;
      --js-color: #f0db4f;
      --radius: 8px;
      --glass: rgba(17, 24, 39, 0.7);
      --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      --sidebar-w: 280px;
    }

    [data-theme="light"] {
      --bg-app: #f0f2f5;
      --bg-primary: #f8fafc;
      --bg-secondary: #fff;
      --bg-tertiary: #f1f5f9;
      --bg-editor: #fff;
      --bg-hover: rgba(139, 92, 246, 0.06);
      --bg-active: rgba(139, 92, 246, 0.1);
      --text-primary: #1e293b;
      --text-secondary: #64748b;
      --text-muted: #94a3b8;
      --border: rgba(15, 23, 42, 0.08);
      --glass: rgba(255, 255, 255, 0.8);
    }

    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    html,
    body {
      height: 100%;
      overflow: hidden
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg-app);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased
    }

    button {
      cursor: pointer;
      font-family: inherit;
      border: none;
      background: none;
      color: inherit
    }

    ::-webkit-scrollbar {
      width: 5px;
      height: 5px
    }

    ::-webkit-scrollbar-track {
      background: transparent
    }

    ::-webkit-scrollbar-thumb {
      background: var(--text-muted);
      border-radius: 3px
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-secondary)
    }

    .app {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      height: 46px;
      min-height: 46px;
      background: var(--glass);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      z-index: 100;
      position: relative
    }

    .toolbar::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: var(--accent-grad);
      opacity: .3
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      user-select: none
    }

    .brand-logo {
      width: 28px;
      height: 28px;
      background: var(--accent-grad);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .95rem
    }

    .brand-name {
      font-size: .9rem;
      font-weight: 700;
      background: var(--accent-grad2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text
    }

    .brand-tag {
      font-size: .55rem;
      font-weight: 600;
      background: var(--accent-grad);
      color: #fff;
      padding: 1px 5px;
      border-radius: 3px;
      text-transform: uppercase
    }

    .tb-actions {
      display: flex;
      align-items: center;
      gap: 4px
    }

    .tb-group {
      display: flex;
      align-items: center;
      gap: 3px;
      padding: 0 5px;
      border-right: 1px solid var(--border)
    }

    .tb-group:last-child {
      border-right: none;
      padding-right: 0
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      border-radius: 6px;
      font-size: .72rem;
      font-weight: 500;
      color: var(--text-secondary);
      transition: all var(--transition);
      white-space: nowrap
    }

    .btn:hover {
      background: var(--bg-hover);
      color: var(--text-primary)
    }

    .btn.active,
    .btn.primary {
      background: var(--accent-grad);
      color: #fff;
      box-shadow: 0 2px 10px rgba(139, 92, 246, .3)
    }

    .btn.primary:hover {
      box-shadow: 0 4px 16px rgba(139, 92, 246, .45);
      transform: translateY(-1px)
    }

    .btn-icon {
      width: 28px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      font-size: .9rem;
      color: var(--text-secondary);
      transition: all var(--transition)
    }

    .btn-icon:hover {
      background: var(--bg-hover);
      color: var(--text-primary)
    }

    .workspace {
      flex: 1;
      display: flex;
      overflow: hidden
    }

    .sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      display: flex;
      flex-direction: column;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      transition: width .3s, min-width .3s;
      overflow: hidden
    }

    .sidebar.collapsed {
      width: 0;
      min-width: 0;
      border-right: none
    }

    .sidebar-header {
      padding: 12px;
      border-bottom: 1px solid var(--border)
    }

    .sidebar-search {
      width: 100%;
      padding: 8px 12px;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-primary);
      font-size: .78rem;
      outline: none;
      transition: border var(--transition);
      font-family: inherit
    }

    .sidebar-search:focus {
      border-color: var(--accent)
    }

    .sidebar-search::placeholder {
      color: var(--text-muted)
    }

    .sidebar-body {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0
    }

    .sidebar-cat-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      font-size: .7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text-muted);
      cursor: pointer;
      transition: all var(--transition);
      position: sticky;
      top: 0;
      background: var(--bg-secondary);
      z-index: 2;
      user-select: none
    }

    .sidebar-cat-header:hover {
      color: var(--text-secondary);
      background: var(--bg-hover)
    }

    .sidebar-cat-header .arrow {
      font-size: .6rem;
      transition: transform .2s;
      flex-shrink: 0
    }

    .sidebar-cat-header.open .arrow {
      transform: rotate(90deg)
    }

    .sidebar-cat-header .cat-icon {
      font-size: .85rem
    }

    .sidebar-cat-header .cat-count {
      margin-left: auto;
      background: var(--bg-tertiary);
      padding: 1px 6px;
      border-radius: 8px;
      font-size: .6rem;
      color: var(--text-muted)
    }

    .sidebar-items {
      overflow: hidden;
      max-height: 0;
      transition: max-height .3s ease
    }

    .sidebar-items.open {
      max-height: 8000px
    }

    .sidebar-subcat {
      padding: 6px 14px 2px 28px;
      font-size: .62rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--accent);
      opacity: .7
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 14px 5px 28px;
      font-size: .76rem;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--transition);
      border-left: 2px solid transparent;
      position: relative
    }

    .sidebar-item:hover {
      background: var(--bg-hover);
      color: var(--text-primary)
    }

    .sidebar-item.active {
      background: var(--bg-active);
      color: #fff;
      border-left-color: var(--accent)
    }

    .sidebar-item .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
      opacity: .5
    }

    .sidebar-item.active .dot {
      opacity: 1;
      box-shadow: 0 0 6px currentColor
    }

    .sidebar-item.html-item .dot {
      background: var(--html-color)
    }

    .sidebar-item.css-item .dot {
      background: var(--css-color)
    }

    .sidebar-item.js-item .dot {
      background: var(--js-color)
    }

    .sidebar-item.hidden {
      display: none
    }

    .sidebar-footer {
      padding: 8px 12px;
      border-top: 1px solid var(--border);
      text-align: center
    }

    .sidebar-footer span {
      font-size: .65rem;
      color: var(--text-muted)
    }

    .main-panel {
      flex: 1;
      display: flex;
      overflow: hidden;
      min-width: 0
    }

    .editor-panel {
      width: 50%;
      min-width: 200px;
      display: flex;
      flex-direction: column;
      background: var(--bg-primary);
      border-right: 1px solid var(--border)
    }

    .editor-tabs {
      display: flex;
      align-items: stretch;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 0 4px;
      min-height: 36px;
      gap: 1px
    }

    .editor-tab {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 14px;
      font-size: .75rem;
      font-weight: 500;
      color: var(--text-muted);
      position: relative;
      transition: all var(--transition);
      border-radius: 6px 6px 0 0
    }

    .editor-tab:hover {
      color: var(--text-secondary);
      background: var(--bg-hover)
    }

    .editor-tab.active {
      color: var(--text-primary);
      background: var(--bg-primary)
    }

    .editor-tab.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 6px;
      right: 6px;
      height: 2px;
      border-radius: 2px 2px 0 0
    }

    .editor-tab[data-lang="html"].active::after {
      background: var(--html-color)
    }

    .editor-tab[data-lang="css"].active::after {
      background: var(--css-color)
    }

    .editor-tab[data-lang="javascript"].active::after {
      background: var(--js-color)
    }

    .tab-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%
    }

    .editor-tab[data-lang="html"] .tab-dot {
      background: var(--html-color)
    }

    .editor-tab[data-lang="css"] .tab-dot {
      background: var(--css-color)
    }

    .editor-tab[data-lang="javascript"] .tab-dot {
      background: var(--js-color)
    }

    .editor-container {
      flex: 1;
      position: relative;
      overflow: hidden
    }

    .editor-instance {
      position: absolute;
      inset: 0;
      display: none
    }

    .editor-instance.active {
      display: block
    }

    .resize-handle {
      width: 5px;
      cursor: col-resize;
      background: transparent;
      position: relative;
      z-index: 50;
      flex-shrink: 0;
      transition: background var(--transition)
    }

    .resize-handle:hover,
    .resize-handle.active {
      background: rgba(139, 92, 246, .15)
    }

    .resize-handle::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 3px;
      height: 36px;
      border-radius: 3px;
      background: var(--text-muted);
      opacity: 0;
      transition: opacity var(--transition)
    }

    .resize-handle:hover::after,
    .resize-handle.active::after {
      opacity: .4
    }

    .output-panel {
      flex: 1;
      min-width: 200px;
      display: flex;
      flex-direction: column;
      background: var(--bg-primary)
    }

    .output-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 0 6px 0 4px;
      min-height: 36px
    }

    .output-tabs {
      display: flex;
      align-items: stretch;
      gap: 1px
    }

    .output-tab {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 0 12px;
      font-size: .75rem;
      font-weight: 500;
      color: var(--text-muted);
      position: relative;
      transition: all var(--transition)
    }

    .output-tab:hover {
      color: var(--text-secondary)
    }

    .output-tab.active {
      color: var(--text-primary)
    }

    .output-tab.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 6px;
      right: 6px;
      height: 2px;
      background: var(--accent-grad);
      border-radius: 2px 2px 0 0
    }

    .console-badge {
      background: var(--error);
      color: #fff;
      font-size: .6rem;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 8px;
      min-width: 14px;
      text-align: center;
      display: none;
      animation: pop .3s ease
    }

    .console-badge.visible {
      display: inline-block
    }

    @keyframes pop {
      0% {
        transform: scale(0)
      }

      60% {
        transform: scale(1.2)
      }

      100% {
        transform: scale(1)
      }
    }

    .output-actions {
      display: flex;
      align-items: center;
      gap: 2px
    }

    .preview-container {
      flex: 1;
      position: relative;
      background: #fff
    }

    .preview-container iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: #fff
    }

    .console-container {
      flex: 1;
      display: none;
      flex-direction: column;
      background: var(--bg-editor);
      font-family: 'JetBrains Mono', monospace;
      font-size: .78rem
    }

    .console-container.active {
      display: flex
    }

    .console-output {
      flex: 1;
      overflow-y: auto;
      padding: 6px
    }

    .console-entry {
      padding: 3px 8px;
      margin: 1px 0;
      border-radius: 3px;
      display: flex;
      align-items: flex-start;
      gap: 6px;
      animation: slide .15s ease;
      word-break: break-word
    }

    @keyframes slide {
      from {
        opacity: 0;
        transform: translateY(3px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .console-entry.log {
      color: var(--text-primary)
    }

    .console-entry.info {
      color: var(--info);
      background: rgba(59, 130, 246, .06)
    }

    .console-entry.warn {
      color: var(--warning);
      background: rgba(245, 158, 11, .06)
    }

    .console-entry.error {
      color: var(--error);
      background: rgba(239, 68, 68, .08)
    }

    .console-entry-icon {
      flex-shrink: 0;
      width: 14px;
      text-align: center;
      opacity: .7;
      font-size: .7rem
    }

    .console-entry-text {
      flex: 1;
      white-space: pre-wrap
    }

    .console-input-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-top: 1px solid var(--border);
      background: var(--bg-secondary)
    }

    .console-prompt {
      color: var(--accent);
      font-weight: 600;
      font-size: .8rem
    }

    .console-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-family: 'JetBrains Mono', monospace;
      font-size: .78rem
    }

    .example-info {
      display: none;
      padding: 8px 14px;
      background: var(--bg-tertiary);
      border-bottom: 1px solid var(--border);
      font-size: .76rem;
      color: var(--text-secondary);
      line-height: 1.5;
      max-height: 60px;
      overflow-y: auto
    }

    .example-info.visible {
      display: block
    }

    .example-info strong {
      color: var(--accent)
    }

    .example-info .example-title {
      color: var(--text-primary);
      font-weight: 600;
      margin-right: 6px
    }

    .statusbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      height: 24px;
      min-height: 24px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      font-size: .65rem;
      color: var(--text-muted);
      user-select: none
    }

    .statusbar-left,
    .statusbar-right {
      display: flex;
      align-items: center;
      gap: 14px
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 3px
    }

    .status-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--success);
      animation: dotPulse 2s ease infinite
    }

    @keyframes dotPulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .4
      }
    }

    .output-panel.fullscreen {
      position: fixed;
      inset: 0;
      z-index: 9999
    }

    .ace_editor {
      font-family: 'JetBrains Mono', monospace !important
    }

    @media(max-width:900px) {
      .sidebar {
        width: 0;
        min-width: 0;
        border-right: none
      }

      .sidebar.mobile-open {
        width: 280px;
        min-width: 280px;
        position: absolute;
        z-index: 200;
        height: 100%;
        border-right: 1px solid var(--border)
      }
    }
  </style>
</head>

<body>
  <div class="app" id="app">
    <header class="toolbar">
      <div class="brand">
        <button class="btn-icon" id="sidebarToggle" title="Toggle Sidebar">☰</button>
        <div class="brand-logo">🚀</div>
        <span class="brand-name">WebJourney IDE</span>
        <span class="brand-tag">v2</span>
      </div>
      <div class="tb-actions">
        <div class="tb-group">
          <button class="btn primary" id="runBtn" title="Run (Ctrl+Enter)"><span>▶</span> Run</button>
          <button class="btn active" id="autoRunBtn" title="Auto-Run"><span>⚡</span> Auto</button>
        </div>
        <div class="tb-group">
          <button class="btn" id="resetBtn" title="Reset to original">↺ Reset</button>
          <button class="btn" id="downloadBtn" title="Download">↓ Export</button>
        </div>
        <div class="tb-group">
          <button class="btn-icon" id="fontMinusBtn" title="Font −">A<small>−</small></button>
          <button class="btn-icon" id="fontPlusBtn" title="Font +">A<small>+</small></button>
        </div>
        <div class="tb-group">
          <button class="btn-icon" id="themeBtn" title="Toggle Theme">🌙</button>
        </div>
      </div>
    </header>
    <div class="workspace">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <input class="sidebar-search" id="sidebarSearch" type="text" placeholder="🔍 Search examples..."
            autocomplete="off" spellcheck="false">
        </div>
        <div class="sidebar-body" id="sidebarBody"></div>
        <div class="sidebar-footer"><span id="exampleCount">0</span> <span>examples</span></div>
      </aside>
      <div class="main-panel">
        <div class="editor-panel" id="editorPanel">
          <div class="example-info" id="exampleInfo"></div>
          <div class="editor-tabs">
            <button class="editor-tab active" data-lang="html"><span class="tab-dot"></span> HTML</button>
            <button class="editor-tab" data-lang="css"><span class="tab-dot"></span> CSS</button>
            <button class="editor-tab" data-lang="javascript"><span class="tab-dot"></span> JS</button>
          </div>
          <div class="editor-container">
            <div class="editor-instance active" id="htmlEditorEl"></div>
            <div class="editor-instance" id="cssEditorEl"></div>
            <div class="editor-instance" id="jsEditorEl"></div>
          </div>
        </div>
        <div class="resize-handle" id="resizeHandle"></div>
        <div class="output-panel" id="outputPanel">
          <div class="output-header">
            <div class="output-tabs">
              <button class="output-tab active" data-panel="preview"><span>👁</span> Preview</button>
              <button class="output-tab" data-panel="console"><span>⌨</span> Console <span class="console-badge"
                  id="consoleBadge">0</span></button>
            </div>
            <div class="output-actions">
              <button class="btn-icon" id="clearConsoleBtn" title="Clear Console">🗑</button>
              <button class="btn-icon" id="refreshBtn" title="Refresh">↻</button>
              <button class="btn-icon" id="fullscreenBtn" title="Fullscreen">⛶</button>
            </div>
          </div>
          <div class="preview-container" id="previewPanel"><iframe id="previewFrame"
              sandbox="allow-scripts allow-modals allow-forms allow-popups"></iframe></div>
          <div class="console-container" id="consolePanel">
            <div class="console-output" id="consoleOutput"></div>
            <div class="console-input-bar"><span class="console-prompt">›</span><input class="console-input"
                id="consoleInput" type="text" placeholder="Type JavaScript..." autocomplete="off" spellcheck="false">
            </div>
          </div>
        </div>
      </div>
    </div>
    <footer class="statusbar">
      <div class="statusbar-left">
        <div class="status-item"><span class="status-dot"></span><span id="statusText">Ready</span></div>
        <div class="status-item" id="cursorInfo">Ln 1, Col 1</div>
      </div>

    // ========================================================================
    //  CODE FORMATTER — beautifies HTML/CSS/JS before loading into editor
    // ========================================================================
    function formatHTML(html) {
      if (!html || !html.trim()) return html;
      let formatted = '';
      let indent = 0;
      const indentStr = '  ';

      // Split by tags, keeping the tags
      const tokens = html.split(/(<\/?[a-zA-Z0-9\-]+[^>]*>)/g);

      tokens.forEach(token => {
        const trimmed = token.trim();
        if (!trimmed) return;

        if (trimmed.startsWith('</')) {
          indent = Math.max(0, indent - 1);
          formatted += '\n' + indentStr.repeat(indent) + trimmed;
        } else if (trimmed.startsWith('<') && !trimmed.startsWith('<!') && !trimmed.endsWith('/>') && !trimmed.startsWith('<?') && !trimmed.startsWith('\x3c!--')) {
          const tagNameMatch = trimmed.match(/^<([a-zA-Z0-9\-]+)/);
          const tagName = tagNameMatch ? tagNameMatch[1].toLowerCase() : '';
          const isSelfClosing = ['img', 'br', 'hr', 'input', 'meta', 'link', 'source', 'embed', 'param', 'col', 'base', 'area', 'track', 'wbr'].includes(tagName);

          formatted += '\n' + indentStr.repeat(indent) + trimmed;
          if (!isSelfClosing) {
            indent++;
          }
        } else {
          formatted += '\n' + indentStr.repeat(indent) + trimmed;
        }
      });

      return formatted.split('\n').filter(line => line.trim() !== '').join('\n');
    }

    function formatCSS(css) {
      if (!css || !css.trim()) return css;
      let formatted = '';
      let indent = 0;
      const indentStr = '  ';

      const tokens = css.split(/([{}[:;])/g);

      for (let i = 0; i < tokens.length; i++) {
        const token = tokens[i].trim();
        if (!token) continue;

        if (token === '{') {
          formatted += ' {\n';
          indent++;
          formatted += indentStr.repeat(indent);
        } else if (token === '}') {
          indent = Math.max(0, indent - 1);
          formatted = formatted.trimEnd() + '\n' + indentStr.repeat(indent) + '}\n' + indentStr.repeat(indent);
        } else if (token === ';') {
          formatted += ';\n' + indentStr.repeat(indent);
        } else if (token === ':') {
          formatted += ': ';
        } else {
          formatted += token;
        }
      }

      return formatted.split('\n')
        .map(line => line.trimRight())
        .filter((line, idx, arr) => line !== '' || (idx > 0 && arr[idx - 1] !== ''))
        .join('\n')
        .trim();
    }

    function formatJS(j) { return j; }

    function ensureStandaloneHTML(html, css = "", js = "", title = "Demo") {
      if (!html) html = '';
      const cleanHtml = html.trim();
      if (cleanHtml.includes('<!DOCTYPE html>') || cleanHtml.includes('<html') || cleanHtml.includes('<body')) {
        return cleanHtml;
      }
      return `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>${title}</title>
</head>
<body>
  ${cleanHtml}
</body>
</html>`;
    }

      { cat: "Forms", name: "button types", desc: "Button, submit, and reset buttons", html: '<form onsubmit="return false">\n  <input type="text" placeholder="Type something..." id="inp">\n  <br><br>\n  <button type="button" onclick="alert(\'Button clicked!\')">Regular Button</button>\n  <button type="submit">Submit</button>\n  <button type="reset">Reset</button>\n</form>', css: 'body{font-family:sans-serif;padding:20px}input{padding:8px 12px;border:1px solid #ddd;border-radius:6px;width:100%;margin-bottom:5px}button{padding:8px 16px;margin:5px;border:none;border-radius:6px;cursor:pointer;font-size:.95em}button[type="button"]{background:#3498db;color:#fff}button[type="submit"]{background:#27ae60;color:#fff}button[type="reset"]{background:#e74c3c;color:#fff}button:hover{opacity:.85}', js: "" },
      { cat: "Forms", name: "fieldset & legend", desc: "Grouping related form elements", html: '<form onsubmit="return false">\n  <fieldset>\n    <legend>Personal Information</legend>\n    <p><label>Name: <input type="text"></label></p>\n    <p><label>Email: <input type="email"></label></p>\n  </fieldset>\n  <fieldset>\n    <legend>Preferences</legend>\n    <p><label><input type="checkbox"> Newsletter</label></p>\n    <p><label><input type="checkbox"> Dark mode</label></p>\n  </fieldset>\n</form>', css: "body{font-family:sans-serif;padding:20px}fieldset{border:2px solid #3498db;border-radius:8px;padding:15px;margin-bottom:15px}legend{padding:0 10px;color:#3498db;font-weight:bold}p{margin:8px 0}input[type=text],input[type=email]{padding:6px;border:1px solid #ddd;border-radius:4px}", js: "" },
      { cat: "Forms", name: "label & datalist", desc: "Form labels and autocomplete suggestions", html: '<label for="browser">Choose your browser:</label>\n<input list="browsers" id="browser" placeholder="Type a browser...">\n<datalist id="browsers">\n  <option value="Chrome">\n  <option value="Firefox">\n  <option value="Safari">\n  <option value="Edge">\n  <option value="Opera">\n  <option value="Brave">\n</datalist>', css: 'body{font-family:sans-serif;padding:20px}label{display:block;margin-bottom:8px;font-weight:600;color:#2c3e50}input{padding:10px;border:2px solid #ddd;border-radius:8px;width:100%;max-width:300px;font-size:1em}input:focus{border-color:#3498db;outline:none}', js: "" },
      { cat: "Forms", name: "output & progress & meter", desc: "Calculation results, progress, and measurements", html: '<h3>Calculator</h3>\n<form oninput="result.value = parseInt(a.value) + parseInt(b.value)">\n  <input type="number" id="a" value="50" style="width:60px"> +\n  <input type="number" id="b" value="50" style="width:60px"> =\n  <output name="result" for="a b">100</output>\n</form>\n<h3>Download Progress</h3>\n<progress value="70" max="100" style="width:200px"></progress> 70%\n<h3>Battery Level</h3>\n<meter value="0.8" min="0" max="1" low="0.25" high="0.75" optimum="1" style="width:200px"></meter> 80%\n<h3>Disk Usage (Warning!)</h3>\n<meter value="0.9" min="0" max="1" low="0.3" high="0.7" optimum="0.3" style="width:200px"></meter> 90%', css: "body{font-family:sans-serif;padding:20px}h3{color:#2c3e50;margin:15px 0 8px}", js: "" },

      // --- Media ---
      { cat: "Media", name: "img & figure & figcaption", desc: "Images with captions using figure element", html: '<figure>\n  <img src="data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'400\' height=\'200\'><defs><linearGradient id=\'g\' x1=\'0%\' y1=\'0%\' x2=\'100%\' y2=\'100%\'><stop offset=\'0%\' style=\'stop-color:%233498db\'/><stop offset=\'100%\' style=\'stop-color:%239b59b6\'/></linearGradient></defs><rect width=\'400\' height=\'200\' fill=\'url(%23g)\'/><text x=\'50%\' y=\'50%\' fill=\'white\' text-anchor=\'middle\' dy=\'.3em\' font-size=\'24\' font-family=\'sans-serif\'>🌄 Sample Image</text></svg>" alt="Sample" style="width:100%;border-radius:8px">\n  <figcaption>Figure 1: A gradient sample image using inline SVG</figcaption>\n</figure>', css: "body{font-family:sans-serif;padding:20px;max-width:500px;margin:0 auto}figure{margin:0;box-shadow:0 4px 15px rgba(0,0,0,.1);border-radius:12px;overflow:hidden}figcaption{text-align:center;color:#666;padding:12px;font-size:.9em;background:#f8f9fa}", js: "" },
      { cat: "Media", name: "audio & video", desc: "HTML5 media elements", html: '<h3>🎵 Audio Element</h3>\n<audio controls style="width:100%">\n  <source src="audio.mp3" type="audio/mpeg">\n  Your browser does not support audio.\n</audio>\n<h3>🎬 Video Element</h3>\n<video controls width="100%" poster="data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'640\' height=\'360\'><rect width=\'640\' height=\'360\' fill=\'%232c3e50\'/><text x=\'50%\' y=\'50%\' fill=\'white\' text-anchor=\'middle\' dy=\'.3em\' font-size=\'28\' font-family=\'sans-serif\'>▶ Video Placeholder</text></svg>">\n  <source src="video.mp4" type="video/mp4">\n  Your browser does not support video.\n</video>', css: "body{font-family:sans-serif;padding:20px;max-width:500px;margin:0 auto}h3{color:#2c3e50;margin:20px 0 10px}video{border-radius:8px;box-shadow:0 4px 15px rgba(0,0,0,.15)}", js: "" },
      { cat: "Media", name: "picture & source", desc: "Responsive images with multiple sources", html: '<h3>Picture Element</h3>\n<p>The <code>&lt;picture&gt;</code> element lets you serve different images for different screen sizes:</p>\n<pre>&lt;picture&gt;\n  &lt;source media="(min-width:650px)" srcset="large.jpg"&gt;\n  &lt;source media="(min-width:465px)" srcset="medium.jpg"&gt;\n  &lt;img src="small.jpg" alt="Responsive"&gt;\n&lt;/picture&gt;</pre>', css: 'body{font-family:sans-serif;padding:20px}code{background:#f0f0f0;padding:2px 6px;border-radius:3px;color:#e74c3c}pre{background:#2c3e50;color:#ecf0f1;padding:15px;border-radius:8px;font-size:.9em;overflow-x:auto}', js: "" },

      // --- Semantic HTML ---
      { cat: "Semantic HTML", name: "header & nav", desc: "Page header with navigation links", html: '<header>\n  <h1>MySite</h1>\n  <nav>\n    <a href="#">Home</a>\n    <a href="#">About</a>\n    <a href="#">Services</a>\n    <a href="#">Contact</a>\n  </nav>\n</header>', css: "body{margin:0;font-family:sans-serif}header{background:linear-gradient(135deg,#2c3e50,#3498db);color:#fff;padding:20px 30px}h1{margin:0 0 12px 0;font-size:1.5em}nav{display:flex;gap:20px}nav a{color:#ecf0f1;text-decoration:none;padding:5px 0;border-bottom:2px solid transparent;transition:all .3s}nav a:hover{border-bottom-color:#fff}", js: "" },
      { cat: "Semantic HTML", name: "main & article & section", desc: "Main content with articles and sections", html: '<main>\n  <article>\n    <h1>Welcome to My Blog</h1>\n    <p>Published on <time datetime="2025-01-15">January 15, 2025</time></p>\n    <section>\n      <h2>Introduction</h2>\n      <p>This article demonstrates semantic HTML5 elements.</p>\n    </section>\n    <section>\n      <h2>Why Semantic HTML?</h2>\n      <p>Semantic tags make your HTML meaningful and accessible.</p>\n    </section>\n  </article>\n</main>', css: "body{font-family:Georgia,serif;padding:20px;max-width:600px;margin:0 auto;line-height:1.8}h1{color:#2c3e50}h2{color:#3498db;margin-top:20px}time{color:#999;font-size:.9em}article{border:1px solid #eee;padding:20px;border-radius:12px}", js: "" },
      { cat: "Semantic HTML", name: "aside & footer", desc: "Sidebar and footer content", html: '<div class="layout">\n  <main>\n    <h2>Main Content</h2>\n    <p>This is the primary content area of the page.</p>\n  </main>\n  <aside>\n    <h3>Sidebar</h3>\n    <ul>\n      <li><a href="#">Related Link 1</a></li>\n      <li><a href="#">Related Link 2</a></li>\n      <li><a href="#">Related Link 3</a></li>\n    </ul>\n  </aside>\n</div>\n<footer>\n  <p>&copy; 2025 MySite. All rights reserved.</p>\n  <p>Contact: <a href="mailto:info@example.com">info@example.com</a></p>\n</footer>', css: "body{margin:0;font-family:sans-serif}.layout{display:flex;padding:20px;gap:20px}main{flex:2}aside{flex:1;background:#f8f9fa;padding:15px;border-radius:8px;border-left:4px solid #e74c3c}h2{color:#2c3e50}h3{color:#e74c3c;margin-top:0}footer{background:#2c3e50;color:#ecf0f1;text-align:center;padding:20px;margin-top:20px}footer a{color:#3498db}ul{padding-left:20px}li{margin:5px 0}a{color:#3498db;text-decoration:none}", js: "" },

      // --- Interactive Elements ---
      { cat: "Interactive", name: "details & summary", desc: "Expandable/collapsible accordion sections", html: '<h2>FAQ</h2>\n<details open>\n  <summary>What is HTML?</summary>\n  <p>HTML (HyperText Markup Language) is the standard markup language for creating web pages.</p>\n</details>\n<details>\n  <summary>What is CSS?</summary>\n  <p>CSS (Cascading Style Sheets) describes how HTML elements should be displayed.</p>\n</details>\n<details>\n  <summary>What is JavaScript?</summary>\n  <p>JavaScript is a programming language that makes web pages interactive.</p>\n</details>\n<details>\n  <summary>What is the DOM?</summary>\n  <p>The Document Object Model is a programming interface for HTML documents.</p>\n</details>', css: "body{font-family:sans-serif;padding:20px;max-width:500px;margin:0 auto}h2{color:#2c3e50;margin-bottom:15px}details{margin-bottom:8px;border:1px solid #e0e0e0;border-radius:8px;overflow:hidden}summary{padding:12px 16px;background:#f8f9fa;cursor:pointer;font-weight:600;color:#2c3e50;transition:background .2s}summary:hover{background:#e8ecf1}details[open] summary{background:#3498db;color:#fff}details p{padding:12px 16px;color:#555;line-height:1.6;margin:0}", js: "" },
      { cat: "Interactive", name: "dialog", desc: "Modal dialog boxes", html: '<button id="openBtn">Open Dialog</button>\n<dialog id="myDialog">\n  <h2>Dialog Box</h2>\n  <p>This is a native HTML5 dialog element!</p>\n  <p>It supports modal and non-modal modes.</p>\n  <button id="closeBtn">Close</button>\n</dialog>', css: "body{font-family:sans-serif;padding:20px}button{padding:10px 20px;border:none;border-radius:6px;cursor:pointer;font-size:1em}#openBtn{background:#3498db;color:#fff}#openBtn:hover{background:#2980b9}dialog{border:none;border-radius:12px;box-shadow:0 10px 40px rgba(0,0,0,.2);padding:30px;max-width:400px}dialog::backdrop{background:rgba(0,0,0,.5)}dialog h2{margin-top:0;color:#2c3e50}#closeBtn{background:#e74c3c;color:#fff;margin-top:10px}#closeBtn:hover{background:#c0392b}", js: 'document.getElementById("openBtn").addEventListener("click", function() {\n  document.getElementById("myDialog").showModal();\n});\ndocument.getElementById("closeBtn").addEventListener("click", function() {\n  document.getElementById("myDialog").close();\n});\nconsole.log("Dialog demo ready! Click the button.");' },

      // --- Embedded Content ---
      { cat: "Embedded", name: "iframe", desc: "Embed another HTML page", html: '<h3>Iframe Example</h3>\n<iframe srcdoc="<html><body style=\'background:linear-gradient(135deg,#667eea,#764ba2);color:white;padding:30px;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0\'><div><h2>Embedded Content</h2><p>This is inside an iframe!</p></div></body></html>" width="100%" height="150" style="border:2px solid #ddd;border-radius:8px" title="Iframe demo"></iframe>', css: "body{font-family:sans-serif;padding:20px}h3{color:#2c3e50;margin-bottom:10px}", js: "" },
      { cat: "Embedded", name: "embed & object", desc: "Embedding external resources", html: '<h3>Embed & Object Tags</h3>\n<p>The <code>&lt;embed&gt;</code> tag embeds external content (plugins, media):</p>\n<pre>&lt;embed src="document.pdf" type="application/pdf" width="600" height="400"&gt;</pre>\n<p>The <code>&lt;object&gt;</code> tag is similar but allows fallback content:</p>\n<pre>&lt;object data="doc.pdf" type="application/pdf"&gt;\n  &lt;p&gt;PDF not supported. &lt;a href="doc.pdf"&gt;Download&lt;/a&gt;&lt;/p&gt;\n&lt;/object&gt;</pre>', css: 'body{font-family:sans-serif;padding:20px}code{background:#f0f0f0;padding:2px 6px;border-radius:3px;color:#e74c3c}pre{background:#2c3e50;color:#ecf0f1;padding:12px;border-radius:8px;font-size:.85em}', js: "" },

      // --- Graphics ---
      { cat: "Graphics", name: "SVG Drawing", desc: "Scalable Vector Graphics inline in HTML", html: '<svg width="300" height="200" viewBox="0 0 300 200">\n  <defs>\n    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">\n      <stop offset="0%" style="stop-color:#3498db" />\n      <stop offset="100%" style="stop-color:#9b59b6" />\n    </linearGradient>\n  </defs>\n  <rect x="10" y="10" width="280" height="180" rx="15" fill="url(#grad)" />\n  <circle cx="80" cy="90" r="35" fill="rgba(255,255,255,0.3)" />\n  <circle cx="150" cy="90" r="35" fill="rgba(255,255,255,0.3)" />\n  <circle cx="220" cy="90" r="35" fill="rgba(255,255,255,0.3)" />\n  <text x="150" y="160" text-anchor="middle" font-family="sans-serif" font-size="18" fill="white" font-weight="bold">SVG Shapes ✨</text>\n</svg>', css: "body{display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;background:#f0f0f0}svg{filter:drop-shadow(0 8px 20px rgba(0,0,0,.2))}", js: "" },
      { cat: "Graphics", name: "Canvas Drawing", desc: "Drawing with the HTML5 Canvas API", html: '<canvas id="myCanvas" width="400" height="250"></canvas>', css: "body{display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;background:#1a1a2e}canvas{border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,.3)}", js: 'var canvas = document.getElementById("myCanvas");\nvar ctx = canvas.getContext("2d");\n\n// Background\nctx.fillStyle = "#0f0f23";\nctx.fillRect(0, 0, 400, 250);\n\n// Stars\nfor (var i = 0; i < 60; i++) {\n  ctx.fillStyle = "rgba(255,255,255," + Math.random() + ")";\n  ctx.beginPath();\n  ctx.arc(Math.random()*400, Math.random()*250, Math.random()*2, 0, Math.PI*2);\n  ctx.fill();\n}\n\n// Moon\nctx.beginPath();\nctx.arc(320, 60, 35, 0, Math.PI * 2);\nctx.fillStyle = "#f1c40f";\nctx.fill();\nctx.beginPath();\nctx.arc(335, 50, 30, 0, Math.PI * 2);\nctx.fillStyle = "#0f0f23";\nctx.fill();\n\n// Mountains\nctx.beginPath();\nctx.moveTo(0, 250);\nctx.lineTo(80, 120);\nctx.lineTo(160, 190);\nctx.lineTo(250, 100);\nctx.lineTo(350, 150);\nctx.lineTo(400, 130);\nctx.lineTo(400, 250);\nctx.fillStyle = "#2c3e50";\nctx.fill();\n\n// Text\nctx.font = "bold 18px sans-serif";\nctx.fillStyle = "#ecf0f1";\nctx.fillText("Canvas Night Sky 🌙", 100, 235);\n\nconsole.log("🎨 Canvas drawn!");' },
      { cat: "Graphics", name: "map & area", desc: "Image maps with clickable areas", html: '<h3>Image Map</h3>\n<p>The <code>&lt;map&gt;</code> and <code>&lt;area&gt;</code> tags define clickable regions on images:</p>\n<pre>&lt;img src="planets.jpg" usemap="#planetmap"&gt;\n&lt;map name="planetmap"&gt;\n  &lt;area shape="rect" coords="0,0,82,126"\n        href="sun.htm" alt="Sun"&gt;\n  &lt;area shape="circle" coords="90,58,3"\n        href="mercury.htm" alt="Mercury"&gt;\n  &lt;area shape="poly" coords="..." \n        href="venus.htm" alt="Venus"&gt;\n&lt;/map&gt;</pre>', css: 'body{font-family:sans-serif;padding:20px}code{background:#f0f0f0;padding:2px 6px;border-radius:3px;color:#e74c3c}pre{background:#2c3e50;color:#ecf0f1;padding:15px;border-radius:8px;font-size:.85em}', js: "" },

      // --- Templates ---
      { cat: "Templates", name: "template & slot", desc: "Reusable HTML templates and Web Components", html: '<h3>Template Element</h3>\n<div id="container"></div>\n<template id="cardTemplate">\n  <div class="card">\n    <h4 class="title"></h4>\n    <p class="body"></p>\n  </div>\n</template>', css: ".card{background:#fff;border:1px solid #eee;border-radius:8px;padding:15px;margin:8px 0;box-shadow:0 2px 8px rgba(0,0,0,.05)}body{font-family:sans-serif;padding:20px;background:#f5f5f5}h3{color:#2c3e50;margin-bottom:15px}h4{margin:0 0 8px;color:#3498db}p{margin:0;color:#666}", js: 'var template = document.getElementById("cardTemplate");\nvar container = document.getElementById("container");\nvar items = [\n  { title: "HTML5", body: "Structure of web pages" },\n  { title: "CSS3", body: "Styling and layout" },\n  { title: "JavaScript", body: "Interactivity and logic" }\n];\n\nitems.forEach(function(item) {\n  var clone = template.content.cloneNode(true);\n  clone.querySelector(".title").textContent = item.title;\n  clone.querySelector(".body").textContent = item.body;\n  container.appendChild(clone);\n});\nconsole.log("📝 Template cards created!");' },

      // --- Obsolete Tags ---
      { cat: "Obsolete Tags", name: "font, center, marquee", desc: "Deprecated tags — use CSS instead", html: '<h3>⚠️ Obsolete Tags (Don\'t Use!)</h3>\n<p><code>&lt;font&gt;</code> — Use CSS <code>font-family</code>, <code>color</code> instead.</p>\n<p><code>&lt;center&gt;</code> — Use CSS <code>text-align: center</code> instead.</p>\n<p><code>&lt;marquee&gt;</code> — Use CSS animations instead.</p>\n<p><code>&lt;big&gt;</code> — Use CSS <code>font-size</code> instead.</p>\n<p><code>&lt;tt&gt;</code> — Use <code>&lt;code&gt;</code> or CSS <code>font-family: monospace</code>.</p>\n<h3>✅ Modern Alternatives</h3>\n<p style="font-family:Arial;color:red;font-size:1.2em">Styled with CSS (not &lt;font&gt;)</p>\n<p style="text-align:center">Centered with CSS (not &lt;center&gt;)</p>', css: "body{font-family:sans-serif;padding:20px}h3{color:#2c3e50;margin:20px 0 10px}code{background:#f0f0f0;padding:2px 6px;border-radius:3px;color:#e74c3c}", js: "" },

    // ========================================================================
    //  DATA: ALL CSS PROPERTIES (from csscompleteref.html — complete cssDB)
    // ========================================================================
    const CSS_EXAMPLES = [
      // Animation
      { cat: "Animation", name: "animation", desc: "Shorthand for all animation properties", html: "<div class='box'></div>", css: ".box{width:50px;height:50px;background:#3b82f6;border-radius:8px;animation:slide 2s infinite alternate}@keyframes slide{from{transform:translateX(0)}to{transform:translateX(120px)}}" },
      { cat: "Animation", name: "animation-name", desc: "Specifies the @keyframes animation name", html: "<div class='box'></div>", css: ".box{width:50px;height:50px;background:#ef4444;border-radius:8px;animation-name:spin;animation-duration:2s;animation-iteration-count:infinite}@keyframes spin{to{transform:rotate(360deg)}}" },
      { cat: "Animation", name: "animation-duration", desc: "How long the animation takes to complete", html: "<div class='box'></div>", css: ".box{width:50px;height:50px;background:#10b981;border-radius:8px;animation:fade 3s infinite}@keyframes fade{0%,100%{opacity:1}50%{opacity:0.2}}" },
      { cat: "Animation", name: "animation-timing-function", desc: "Speed curve: ease, linear, cubic-bezier", html: "<div class='box'></div>", css: ".box{width:50px;height:50px;background:#f59e0b;border-radius:8px;animation:move 2s infinite alternate;animation-timing-function:cubic-bezier(0.68,-0.55,0.27,1.55)}@keyframes move{to{transform:translateX(120px)}}" },
      { cat: "Animation", name: "animation-delay", desc: "Delay before animation starts", html: "<div class='box'></div>", css: ".box{width:50px;height:50px;background:#8b5cf6;border-radius:8px;animation:pop 2s infinite;animation-delay:1s}@keyframes pop{0%,100%{transform:scale(1)}50%{transform:scale(1.5)}}" },
      { cat: "Animation", name: "animation-iteration-count", desc: "Number of times animation plays", html: "<div class='box'></div>", css: ".box{width:50px;height:50px;background:#ec4899;border-radius:8px;animation:spin 1s 3;animation-iteration-count:3}@keyframes spin{to{transform:rotate(360deg)}}" },
      { cat: "Animation", name: "animation-direction", desc: "Normal, reverse, or alternate direction", html: "<div class='box'></div>", css: ".box{width:50px;height:50px;background:#06b6d4;border-radius:8px;animation:move 2s infinite alternate;animation-direction:alternate}@keyframes move{to{transform:translateX(120px)}}" },
      { cat: "Animation", name: "animation-fill-mode", desc: "Style applied before/after animation", html: "<div class='box'></div>", css: ".box{width:50px;height:50px;background:#f97316;border-radius:8px;animation:slide 2s 1 forwards}@keyframes slide{to{transform:translateX(120px);background:#3b82f6}}" },
      { cat: "Animation", name: "animation-play-state", desc: "Running or paused state", html: "<div class='box' title='Hover to play!'></div>", css: ".box{width:50px;height:50px;background:#14b8a6;border-radius:8px;animation:spin 2s infinite;animation-play-state:paused}.box:hover{animation-play-state:running}@keyframes spin{to{transform:rotate(360deg)}}" },
      { cat: "Animation", name: "@keyframes", desc: "Define animation steps with percentages", html: "<div class='box'></div>", css: ".box{width:60px;height:60px;background:#8b5cf6;border-radius:50%;animation:rainbow 3s infinite}@keyframes rainbow{0%{background:#ef4444;transform:scale(1)}25%{background:#f59e0b;transform:scale(1.2)}50%{background:#10b981;transform:scale(1)}75%{background:#3b82f6;transform:scale(1.2)}100%{background:#ef4444;transform:scale(1)}}" },

      // Background
      { cat: "Background", name: "background", desc: "Shorthand for all background properties", html: "<div class='box'>Gradient Background</div>", css: ".box{width:100%;height:100px;background:linear-gradient(45deg,#3b82f6,#ec4899);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:bold;font-family:sans-serif}" },
      { cat: "Background", name: "background-color", desc: "Sets the background color", html: "<div class='box'>Yellow Background</div>", css: ".box{width:100%;height:100px;background-color:#fef3c7;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:sans-serif}" },
      { cat: "Background", name: "background-image", desc: "Set gradients or image backgrounds", html: "<div class='box'>Radial Gradient</div>", css: ".box{width:100%;height:100px;background-image:radial-gradient(circle,#3b82f6,#1e3a8a);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-family:sans-serif}" },
      { cat: "Background", name: "background-size", desc: "Control background sizing: cover, contain", html: "<div class='box'></div>", css: ".box{width:100%;height:100px;background-image:linear-gradient(45deg,#ccc 25%,transparent 25%,transparent 75%,#ccc 75%),linear-gradient(45deg,#ccc 25%,transparent 25%,transparent 75%,#ccc 75%);background-size:20px 20px;background-position:0 0,10px 10px;border-radius:8px}" },
      { cat: "Background", name: "background-clip: text", desc: "Clip background to text shape", html: "<div class='box'>TEXT CLIP</div>", css: ".box{width:100%;height:100px;background:linear-gradient(to right,#3b82f6,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-size:2.5rem;font-weight:900;display:flex;align-items:center;justify-content:center;font-family:sans-serif}" },
      { cat: "Background", name: "background-attachment", desc: "Fixed or scrolling background", html: "<div class='box'>Fixed Attachment</div>", css: ".box{width:100%;height:100px;background:linear-gradient(to right,#f59e0b,#ef4444);background-attachment:fixed;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-family:sans-serif}" },
      { cat: "Background", name: "background-blend-mode", desc: "Blending mode for background layers", html: "<div class='box'></div>", css: ".box{width:100%;height:100px;background-color:#3b82f6;background-image:repeating-linear-gradient(45deg,transparent,transparent 10px,rgba(255,255,255,.3) 10px,rgba(255,255,255,.3) 20px);background-blend-mode:multiply;border-radius:8px}" },

      // Box Model
      { cat: "Box Model", name: "width & height", desc: "Set dimensions of an element", html: "<div class='box'>200 × 80px</div>", css: ".box{width:200px;height:80px;background:#3b82f6;color:#fff;display:flex;align-items:center;justify-content:center;border-radius:8px;font-family:sans-serif;font-weight:bold}" },
      { cat: "Box Model", name: "min/max width", desc: "Minimum and maximum width constraints", html: "<div class='box'>Max-Width: 300px</div>", css: ".box{max-width:300px;width:100%;height:60px;background:#8b5cf6;color:#fff;display:flex;align-items:center;justify-content:center;border-radius:8px;font-family:sans-serif}" },
      { cat: "Box Model", name: "margin & padding", desc: "Outer and inner spacing", html: "<div class='outer'><div class='box'>Padding: 20px<br>Margin: auto</div></div>", css: ".outer{background:#e2e8f0;padding:20px;border-radius:8px}.box{width:160px;background:#8b5cf6;color:#fff;padding:20px;margin:0 auto;border-radius:8px;text-align:center;font-family:sans-serif;font-size:.9em}" },
      { cat: "Box Model", name: "box-sizing", desc: "border-box vs content-box", html: "<div class='wrap'><div class='box cb'>Content-Box<br>(Wider)</div><div class='box bb'>Border-Box<br>(Exact)</div></div>", css: ".wrap{display:flex;gap:12px;font-family:sans-serif;font-size:12px}.box{width:150px;height:60px;background:#fff;border:4px solid #3b82f6;display:flex;align-items:center;justify-content:center;padding:10px;text-align:center}.bb{box-sizing:border-box}.cb{box-sizing:content-box}" },
      { cat: "Box Model", name: "display", desc: "Block, inline, flex, grid, none", html: "<div class='box'><div class='item'>Flex</div><div class='item'>Items</div><div class='item'>Here</div></div>", css: ".box{display:flex;gap:10px;background:#f1f5f9;padding:12px;border-radius:8px}.item{background:#3b82f6;color:#fff;padding:10px 20px;border-radius:6px;font-family:sans-serif}" },
      { cat: "Box Model", name: "overflow", desc: "Handle overflowing content", html: "<div class='box'>This is a lot of text that will be hidden because overflow is set to hidden and the box has a fixed height and width constraint so the text overflows.</div>", css: ".box{width:180px;height:60px;background:#f1f5f9;border:2px solid #cbd5e1;overflow:hidden;padding:10px;font-size:13px;font-family:sans-serif;border-radius:6px}" },
      { cat: "Box Model", name: "outline", desc: "Line drawn outside the border", html: "<div class='box'>Outline</div>", css: ".box{width:100px;height:60px;background:#fff;border:2px solid #3b82f6;outline:4px solid #f59e0b;outline-offset:4px;display:flex;align-items:center;justify-content:center;font-family:sans-serif;margin:20px auto}" },

      // Flexbox
      { cat: "Flexbox", name: "flex-direction", desc: "Row, column, row-reverse, column-reverse", html: "<div class='box'><div class='item'>1</div><div class='item'>2</div><div class='item'>3</div></div>", css: ".box{display:flex;flex-direction:column;gap:8px;background:#f1f5f9;padding:12px;border-radius:8px}.item{background:#8b5cf6;color:#fff;padding:10px;border-radius:6px;text-align:center;font-family:sans-serif}" },
      { cat: "Flexbox", name: "justify-content", desc: "Align items along the main axis", html: "<div class='box'><div class='item'>1</div><div class='item'>2</div><div class='item'>3</div></div>", css: ".box{display:flex;justify-content:space-between;background:#f1f5f9;padding:12px;border-radius:8px}.item{background:#ec4899;color:#fff;padding:10px 24px;border-radius:6px;font-family:sans-serif}" },
      { cat: "Flexbox", name: "align-items", desc: "Align items along the cross axis", html: "<div class='box'><div class='item'>Short</div><div class='item tall'>Tall</div><div class='item'>Short</div></div>", css: ".box{display:flex;align-items:center;height:100px;background:#f1f5f9;padding:12px;border-radius:8px;gap:10px}.item{background:#10b981;color:#fff;padding:10px;border-radius:6px;font-family:sans-serif}.tall{height:60px;display:flex;align-items:center}" },
      { cat: "Flexbox", name: "flex-wrap & gap", desc: "Wrap items and control spacing", html: "<div class='box'><div class='item'>One</div><div class='item'>Two</div><div class='item'>Three</div><div class='item'>Four</div><div class='item'>Five</div></div>", css: ".box{display:flex;flex-wrap:wrap;gap:10px;background:#f1f5f9;padding:12px;border-radius:8px}.item{background:#f59e0b;color:#fff;padding:10px 24px;border-radius:6px;font-family:sans-serif}" },
      { cat: "Flexbox", name: "align-content", desc: "Aligns flex lines when wrapping", html: "<div class='box'><div class='item'>1</div><div class='item'>2</div><div class='item'>3</div><div class='item'>4</div></div>", css: ".box{display:flex;flex-wrap:wrap;align-content:space-between;height:120px;background:#f1f5f9;padding:10px;border-radius:8px}.item{background:#06b6d4;color:#fff;padding:10px;border-radius:6px;width:40%;text-align:center;font-family:sans-serif}" },
      { cat: "Flexbox", name: "flex-grow", desc: "How much an item grows relative to others", html: "<div class='box'><div class='item'>1</div><div class='item grow'>Grows!</div><div class='item'>3</div></div>", css: ".box{display:flex;gap:10px;background:#f1f5f9;padding:10px;border-radius:8px}.item{background:#3b82f6;color:#fff;padding:10px;border-radius:6px;text-align:center;font-family:sans-serif}.grow{flex-grow:1}" },

      // Grid
      { cat: "Grid", name: "grid-template-columns", desc: "Define column tracks with fr, px, auto", html: "<div class='box'><div class='item'>1fr</div><div class='item'>2fr</div><div class='item'>1fr</div></div>", css: ".box{display:grid;grid-template-columns:1fr 2fr 1fr;gap:10px;background:#f1f5f9;padding:12px;border-radius:8px}.item{background:#14b8a6;color:#fff;padding:15px;text-align:center;border-radius:6px;font-family:sans-serif}" },
      { cat: "Grid", name: "grid-template-rows", desc: "Define row tracks", html: "<div class='box'><div class='item'>50px row</div><div class='item'>100px row</div></div>", css: ".box{display:grid;grid-template-rows:50px 100px;gap:10px;background:#f1f5f9;padding:10px;border-radius:8px}.item{background:#f97316;color:#fff;padding:10px;text-align:center;border-radius:6px;font-family:sans-serif}" },
      { cat: "Grid", name: "grid-template-areas", desc: "Named regions for clean layouts", html: "<div class='box'><div class='item h'>Header</div><div class='item s'>Side</div><div class='item m'>Main</div><div class='item f'>Footer</div></div>", css: ".box{display:grid;grid-template-areas:'header header' 'sidebar main' 'footer footer';grid-template-columns:1fr 2fr;gap:10px;background:#f1f5f9;padding:12px;border-radius:8px}.item{background:#ec4899;color:#fff;padding:16px;text-align:center;border-radius:6px;font-family:sans-serif}.h{grid-area:header}.s{grid-area:sidebar}.m{grid-area:main}.f{grid-area:footer}" },
      { cat: "Grid", name: "grid-column: span", desc: "Items spanning multiple columns", html: "<div class='box'><div class='item span'>Spans 2</div><div class='item'>3</div><div class='item'>4</div><div class='item'>5</div></div>", css: ".box{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;background:#f1f5f9;padding:12px;border-radius:8px}.item{background:#6366f1;color:#fff;padding:15px;text-align:center;border-radius:6px;font-family:sans-serif}.span{grid-column:1/3}" },
      { cat: "Grid", name: "justify-items & align-items", desc: "Align grid items within their cells", html: "<div class='box'><div class='item'>1</div><div class='item'>2</div><div class='item'>3</div></div>", css: ".box{display:grid;grid-template-columns:repeat(3,1fr);justify-items:center;align-items:center;height:100px;gap:10px;background:#f1f5f9;padding:10px;border-radius:8px}.item{background:#3b82f6;color:#fff;padding:10px 20px;border-radius:6px;font-family:sans-serif}" },

      // Typography
      { cat: "Typography", name: "color & font-family", desc: "Text color and typeface", html: "<div class='t1'>Serif Font</div><div class='t2'>Monospace Font</div><div class='t3'>Sans-Serif Font</div>", css: ".t1{font-family:Georgia,serif;font-size:1.5rem;color:#e74c3c;margin-bottom:10px}.t2{font-family:'Courier New',monospace;font-size:1.2rem;color:#3498db;margin-bottom:10px}.t3{font-family:system-ui,sans-serif;font-size:1.3rem;color:#27ae60}" },
      { cat: "Typography", name: "font-size & font-weight", desc: "Text size and boldness", html: "<div class='light'>Light (300)</div><div class='bold'>Black (900)</div><div class='big'>Large Text (2rem)</div>", css: ".light{font-weight:300;font-size:1.3rem;color:#334155;font-family:sans-serif;margin-bottom:8px}.bold{font-weight:900;font-size:1.3rem;color:#334155;font-family:sans-serif;margin-bottom:8px}.big{font-size:2rem;font-weight:bold;color:#3b82f6;font-family:sans-serif}" },
      { cat: "Typography", name: "line-height & letter-spacing", desc: "Vertical spacing and character spacing", html: "<div class='text'>This text has generous line-height of 2 and wide letter-spacing for excellent readability.</div>", css: ".text{line-height:2;letter-spacing:1px;font-size:1rem;color:#475569;font-family:Georgia,serif;max-width:300px;padding:10px}" },
      { cat: "Typography", name: "text-align & text-transform", desc: "Alignment, uppercase, capitalize", html: "<div class='center'>Centered Text</div><div class='upper'>uppercase transform</div><div class='cap'>capitalize each word</div>", css: ".center{text-align:center;font-size:1.2rem;color:#334155;font-family:sans-serif;margin-bottom:8px}.upper{text-transform:uppercase;letter-spacing:3px;font-size:1rem;color:#8b5cf6;font-weight:bold;font-family:sans-serif;margin-bottom:8px}.cap{text-transform:capitalize;font-size:1rem;color:#06b6d4;font-family:sans-serif}" },
      { cat: "Typography", name: "text-decoration", desc: "Underlines, strikethrough, wavy", html: "<div class='u'>Wavy Underline</div><div class='s'>Strikethrough</div><div class='o'>Overline</div>", css: ".u{font-size:1.5rem;color:#3b82f6;text-decoration:underline wavy #ef4444;margin-bottom:10px;font-family:sans-serif}.s{font-size:1.3rem;text-decoration:line-through;color:#888;margin-bottom:10px;font-family:sans-serif}.o{font-size:1.3rem;text-decoration:overline;color:#10b981;font-family:sans-serif}" },
      { cat: "Typography", name: "text-shadow", desc: "Shadow effects on text", html: "<div class='text'>SHADOW</div>", css: ".text{font-size:3rem;font-weight:900;color:#fff;text-shadow:3px 3px 0 #3b82f6,6px 6px 0 #ef4444;font-family:sans-serif;padding:20px}" },
      { cat: "Typography", name: "white-space & text-overflow", desc: "Truncate text with ellipsis", html: "<div class='text'>This is a very long string that will be truncated with an ellipsis because of nowrap and overflow hidden.</div>", css: ".text{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:200px;font-size:1rem;color:#334155;font-family:sans-serif;border:1px solid #cbd5e1;padding:8px;border-radius:6px}" },

      // Transform & Transition
      { cat: "Transform", name: "transform", desc: "Rotate, scale, translate, skew", html: "<div class='wrap'><div class='box r'>Rotate</div><div class='box s'>Scale</div><div class='box sk'>Skew</div></div>", css: ".wrap{display:flex;gap:20px;padding:30px;justify-content:center}.box{width:80px;height:80px;display:flex;align-items:center;justify-content:center;color:#fff;font-family:sans-serif;font-size:12px;font-weight:bold;border-radius:8px}.r{background:#8b5cf6;transform:rotate(15deg)}.s{background:#ef4444;transform:scale(1.2)}.sk{background:#06b6d4;transform:skewX(-10deg)}" },
      { cat: "Transform", name: "transform-origin", desc: "Change the pivot point for transforms", html: "<div class='box'></div>", css: ".box{width:60px;height:60px;background:#f59e0b;border-radius:8px;transform:rotate(45deg);transform-origin:top left;margin:30px}" },
      { cat: "Transform", name: "transition", desc: "Smooth property changes on hover", html: "<div class='box'>Hover Me</div>", css: ".box{width:100px;height:100px;background:#3b82f6;border-radius:12px;margin:30px auto;transition:all 0.5s cubic-bezier(0.68,-0.55,0.27,1.55);display:flex;align-items:center;justify-content:center;color:#fff;font-family:sans-serif;font-weight:bold;cursor:pointer}.box:hover{transform:scale(1.3) rotate(10deg);background:#ef4444;border-radius:50%;box-shadow:0 10px 30px rgba(239,68,68,.4)}" },

      // Visual Effects
      { cat: "Visual", name: "opacity", desc: "Element transparency", html: "<div class='wrap'><div class='box'>1.0</div><div class='box half'>0.5</div><div class='box low'>0.2</div></div>", css: ".wrap{display:flex;gap:20px;justify-content:center;padding:10px}.box{width:60px;height:60px;background:#3b82f6;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-family:sans-serif;font-size:12px}.half{opacity:0.5}.low{opacity:0.2}" },
      { cat: "Visual", name: "box-shadow", desc: "Add shadow to elements", html: "<div class='box'>Shadow</div>", css: ".box{width:140px;height:80px;background:#fff;border-radius:12px;margin:30px auto;box-shadow:0 10px 25px -5px rgba(0,0,0,.2),0 4px 6px -2px rgba(0,0,0,.1);display:flex;align-items:center;justify-content:center;font-weight:bold;color:#475569;font-family:sans-serif}" },
      { cat: "Visual", name: "border-radius", desc: "Round corners of elements", html: "<div class='wrap'><div class='box r1'></div><div class='box r2'></div><div class='box r3'></div></div>", css: ".wrap{display:flex;gap:20px;justify-content:center;padding:20px}.box{width:70px;height:70px;background:#ec4899}.r1{border-radius:12px}.r2{border-radius:50%}.r3{border-radius:12px 0 12px 0}" },
      { cat: "Visual", name: "filter", desc: "Blur, grayscale, brightness effects", html: "<div class='wrap'><div class='box'>Normal</div><div class='box blur'>Blur</div><div class='box gray'>Gray</div><div class='box bright'>Bright</div></div>", css: ".wrap{display:flex;gap:12px;justify-content:center;padding:20px}.box{width:70px;height:70px;background:linear-gradient(45deg,#f59e0b,#ef4444);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-family:sans-serif}.blur{filter:blur(3px)}.gray{filter:grayscale(100%)}.bright{filter:brightness(1.5)}" },
      { cat: "Visual", name: "backdrop-filter (Glass)", desc: "Glassmorphism with blur behind element", html: "<div class='bg'><div class='glass'>Glass Effect</div></div>", css: ".bg{width:100%;height:140px;background:linear-gradient(45deg,#3b82f6,#ec4899);border-radius:12px;position:relative;display:flex;align-items:center;justify-content:center}.glass{padding:20px 32px;background:rgba(255,255,255,.2);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.4);border-radius:12px;color:#fff;font-weight:bold;font-family:sans-serif;font-size:1.1em}" },
      { cat: "Visual", name: "clip-path", desc: "Create custom shapes by clipping", html: "<div class='wrap'><div class='box tri'></div><div class='box hex'></div><div class='box star'></div></div>", css: ".wrap{display:flex;gap:20px;justify-content:center;padding:20px}.box{width:80px;height:80px}.tri{background:#14b8a6;clip-path:polygon(50% 0%,0% 100%,100% 100%)}.hex{background:#8b5cf6;clip-path:polygon(25% 0%,75% 0%,100% 50%,75% 100%,25% 100%,0% 50%)}.star{background:#f59e0b;clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%)}" },
      { cat: "Visual", name: "mix-blend-mode", desc: "Blend element with its background", html: "<div class='wrap'><div class='c1'></div><div class='c2'></div></div>", css: ".wrap{position:relative;width:120px;height:100px;margin:10px auto}.c1{width:70px;height:70px;background:#3b82f6;border-radius:50%;position:absolute;top:0;left:0}.c2{width:70px;height:70px;background:#ef4444;border-radius:50%;position:absolute;bottom:0;right:0;mix-blend-mode:multiply}" },

      // Positioning
      { cat: "Positioning", name: "position", desc: "Static, relative, absolute, fixed, sticky", html: "<div class='wrap'><div class='box'>Absolute</div></div>", css: ".wrap{position:relative;height:120px;background:#f1f5f9;border-radius:8px;border:2px dashed #cbd5e1}.box{position:absolute;top:15px;right:15px;padding:10px 16px;background:#f59e0b;border-radius:6px;color:#fff;font-family:sans-serif;font-size:13px}" },
      { cat: "Positioning", name: "z-index", desc: "Stack order of positioned elements", html: "<div class='wrap'><div class='b1'>1</div><div class='b2'>2</div><div class='b3'>3</div></div>", css: ".wrap{position:relative;height:100px;padding:10px}.b1,.b2,.b3{position:absolute;width:60px;height:60px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:bold;font-family:sans-serif;border-radius:8px}.b1{background:#3b82f6;top:10px;left:10px;z-index:1}.b2{background:#ef4444;top:25px;left:35px;z-index:3}.b3{background:#10b981;top:40px;left:60px;z-index:2}" },
      { cat: "Positioning", name: "float & clear", desc: "Float elements with text wrapping", html: "<div class='wrap'><div class='box'></div><p class='text'>Text wraps around the floated purple box, demonstrating the float property.</p></div>", css: ".wrap{background:#f1f5f9;padding:10px;border-radius:8px}.box{float:right;width:50px;height:50px;background:#8b5cf6;border-radius:8px;margin-left:10px}.text{color:#475569;font-size:13px;font-family:sans-serif}" },
      { cat: "Positioning", name: "visibility", desc: "Visible vs hidden (keeps space)", html: "<div class='wrap'><div class='box'>Vis</div><div class='box hide'>Hid</div><div class='box'>Vis</div></div>", css: ".wrap{display:flex;gap:10px;padding:10px}.box{width:50px;height:50px;background:#3b82f6;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-family:sans-serif;font-size:11px}.hide{visibility:hidden}" },

      // Tables & Lists
      { cat: "Tables CSS", name: "border-collapse", desc: "Collapse table borders into one", html: "<table><tr><th>H1</th><th>H2</th></tr><tr><td>D1</td><td>D2</td></tr></table>", css: "table{width:100%;border-collapse:collapse;font-family:sans-serif;font-size:13px}th,td{border:2px solid #3b82f6;padding:10px;text-align:center}th{background:#eff6ff}" },
      { cat: "Tables CSS", name: "border-spacing", desc: "Space between table cell borders", html: "<table><tr><td>Cell 1</td><td>Cell 2</td></tr><tr><td>Cell 3</td><td>Cell 4</td></tr></table>", css: "table{width:100%;border-collapse:separate;border-spacing:10px;font-family:sans-serif;font-size:13px}td{border:2px solid #10b981;padding:10px;text-align:center;background:#ecfdf5;border-radius:6px}" },
      { cat: "Lists CSS", name: "list-style-type", desc: "Marker type: disc, circle, square, etc.", html: "<ul class='disc'><li>Disc marker</li><li>Default style</li></ul><ul class='square'><li>Square marker</li><li>Custom style</li></ul><ol class='roman'><li>Roman I</li><li>Roman II</li></ol>", css: ".disc{list-style-type:disc}.square{list-style-type:square}.roman{list-style-type:upper-roman}ul,ol{font-family:sans-serif;color:#475569;margin-bottom:10px}li{margin:4px 0}" },

      // UI
      { cat: "UI", name: "cursor", desc: "Mouse cursor types on hover", html: "<div class='wrap'><div class='box c1'>pointer</div><div class='box c2'>wait</div><div class='box c3'>not-allowed</div><div class='box c4'>grab</div></div>", css: ".wrap{display:flex;gap:10px;flex-wrap:wrap;padding:10px}.box{padding:12px 16px;background:#e2e8f0;border:1px solid #cbd5e1;border-radius:6px;font-size:12px;font-family:sans-serif;transition:background .2s}.box:hover{background:#cbd5e1}.c1{cursor:pointer}.c2{cursor:wait}.c3{cursor:not-allowed}.c4{cursor:grab}" },
      { cat: "UI", name: "resize", desc: "User-resizable boxes", html: "<div class='box'>Resize me! (drag corner)</div>", css: ".box{width:200px;height:80px;background:#f1f5f9;border:2px solid #3b82f6;border-radius:8px;resize:both;overflow:auto;padding:12px;font-family:sans-serif;font-size:13px;color:#475569}" },

    "code": "// 1. Generator function\nfunction* countUpTo(max) {\n  let count = 1;\n  while (count <= max) {\n    yield count;\n    count++;\n  }\n}\n\nconst counter = countUpTo(3);\nconsole.log('Generator step 1:', counter.next()); // { value: 1, done: false }\nconsole.log('Generator step 2:', counter.next()); // { value: 2, done: false }\nconsole.log('Generator step 3:', counter.next()); // { value: 3, done: false }\nconsole.log('Generator step 4:', counter.next()); // { value: undefined, done: true }\n\n// 2. Loop collection via Generator\nconsole.log('\\n--- Loop generator ---');\nfor (const val of countUpTo(3)) {\n  console.log('Value:', val);\n}\n\n// 3. Fibonacci Sequence Generator\nfunction* fibonacciGen(limit) {\n  let [prev, curr] = [0, 1];\n  while (prev <= limit) {\n    yield prev;\n    [prev, curr] = [curr, prev + curr];\n  }\n}\nconst fibList = [...fibonacciGen(20)];\nconsole.log('\\nFibonacci sequence <= 20:', fibList);"

    "code": "// 1. Defining a Custom Error Class\nclass InvalidAgeError extends Error {\n  constructor(message, receivedAge) {\n    super(message); // call Parent constructor\n    this.name = \"InvalidAgeError\";\n    this.receivedAge = receivedAge;\n  }\n}\n\nfunction verifyAge(age) {\n  if (typeof age !== 'number') {\n    throw new TypeError(\"Age parameter must be a number!\");\n  }\n  if (age < 0 || age > 120) {\n    throw new InvalidAgeError(\"Age must be between 0 and 120\", age);\n  }\n  return `Verification passed. Age: ${age}`;\n}\n\n// 2. Handling errors via try-catch-finally\nfunction runVerification(ageInput) {\n  try {\n    const result = verifyAge(ageInput);\n    console.log('Success:', result);\n  } catch (err) {\n    console.error(`Caught [${err.name}]: ${err.message}`);\n    if (err instanceof InvalidAgeError) {\n      console.warn(`Details: Received invalid age value: ${err.receivedAge}`);\n    }\n  } finally {\n    console.log('Cleanup: Verification check ended.');\n  }\n}\n\nconsole.log('--- Test Run 1 (Valid) ---');\nrunVerification(25);\n\nconsole.log('\\n--- Test Run 2 (Custom Error) ---');\nrunVerification(-5);\n\nconsole.log('\\n--- Test Run 3 (Type Error) ---');\nrunVerification(\"thirty\");"

    "code": "const user = { name: \"Alice\", age: 25 };\n\n// 1. Proxy validator to intercept set/get trap\nconst validatorProxy = new Proxy(user, {\n  get(target, prop, receiver) {\n    console.log(`[PROXY] Accessing property: ${prop}`);\n    if (!Reflect.has(target, prop)) {\n      return `Property \"${prop}\" does not exist!`;\n    }\n    return Reflect.get(target, prop, receiver);\n  },\n  set(target, prop, val, receiver) {\n    console.log(`[PROXY] Writing property: ${prop} = ${val}`);\n    if (prop === 'age') {\n      if (typeof val !== 'number' || Number.isNaN(val)) {\n        throw new TypeError(\"Age must be a number!\");\n      }\n      if (val < 0) {\n        throw new RangeError(\"Age cannot be negative!\");\n      }\n    }\n    return Reflect.set(target, prop, val, receiver);\n  }\n});\n\nconsole.log('Accessing existing:', validatorProxy.name);\nconsole.log('Accessing non-existing:', validatorProxy.email);\n\nvalidatorProxy.age = 30; // Works\ntry {\n  validatorProxy.age = -5;\n} catch(e) {\n  console.warn('Set blocked by Proxy:', e.message); // Age cannot be negative!\n}\ntry {\n  validatorProxy.age = \"thirty\";\n} catch(e) {\n  console.warn('Set blocked by Proxy:', e.message); // Age must be a number!\n}"

    "code": "console.log('📦 ES6 Module Syntax & Patterns:\\n');\nconsole.log('// --- mathUtils.js ---');\nconsole.log('export const PI = 3.14159;');\nconsole.log('export function add(a, b) { return a + b; }');\nconsole.log('export default class Calc { ... }');\n\nconsole.log('\\n// --- mainApp.js ---');\nconsole.log('import Calc, { PI, add } from \"./mathUtils.js\";');\nconsole.log('import * as math from \"./mathUtils.js\";');\n\n// Dynamic module loading (returns promise)\nconsole.log('\\n--- Dynamic Import Simulation ---');\nfunction loadModuleDynamically(moduleName) {\n  return new Promise((resolve) => {\n    setTimeout(() => {\n      resolve({\n        success: true,\n        exports: { logName: () => console.log('Module Loaded:', moduleName) }\n      });\n    }, 400);\n  });\n}\n\nasync function start() {\n  const myModule = await loadModuleDynamically('ChartsHelper');\n  myModule.exports.logName();\n}\nstart();"

    "cat": "Advanced",
    "name": "WeakMap & WeakSet",
    "desc": "Weak references allowing automated garbage collection to prevent memory leaks.",
    "html": "",
    "css": "",
    "code": "// 1. WeakMap vs Map (WeakMap keys MUST be objects, references are weak)\nconsole.log('--- WeakMap Demo ---');\nconst cache = new WeakMap();\n\nlet userObject = { id: 99912, name: \"Arthur\" };\ncache.set(userObject, { lastAccessed: Date.now(), role: \"Author\" });\n\nconsole.log('Metadata accessed:', cache.get(userObject));\n\n// Garbage collection linkage:\n// If userObject is reassigned to null, the key reference is lost, and the metadata value\n// will be automatically cleared from memory in the next garbage collection cycle!\nuserObject = null; \nconsole.log('Key object nullified. Metadata reference is freed.');\n\n// 2. Private Data Pattern using WeakMap\nconsole.log('\\n--- WeakMap Private Scoping ---');\nconst privateState = new WeakMap();\n\nclass SecureDatabase {\n  constructor(passkey) {\n    // Store passkey in WeakMap keyed by 'this' instance\n    privateState.set(this, { key: passkey });\n  }\n\n  authenticate(inputKey) {\n    const internal = privateState.get(this);\n    return internal.key === inputKey;\n  }\n}\n\nconst db = new SecureDatabase(\"DB_ROOT_ACCESS_112\");\nconsole.log('Auth check (wrong key):', db.authenticate(\"1234\")); // false\nconsole.log('Auth check (correct key):', db.authenticate(\"DB_ROOT_ACCESS_112\")); // true\nconsole.log('Direct key property search:', db.key); // undefined (completely private)"
  },

    "cat": "Interactive UI Projects",
    "name": "Glassmorphic Calculator",
    "desc": "A beautiful interactive calculator demonstrating JS math, event delegation, and UI updates.",
    "html": "<div class=\"calculator\">\n  <div class=\"calc-screen\" id=\"screen\">0</div>\n  <div class=\"calc-buttons\">\n    <button class=\"btn btn-clear\">AC</button>\n    <button class=\"btn btn-operator\">/</button>\n    <button class=\"btn btn-operator\">*</button>\n    <button class=\"btn btn-operator\">-</button>\n    \n    <button class=\"btn\">7</button>\n    <button class=\"btn\">8</button>\n    <button class=\"btn\">9</button>\n    <button class=\"btn btn-operator\">+</button>\n    \n    <button class=\"btn\">4</button>\n    <button class=\"btn\">5</button>\n    <button class=\"btn\">6</button>\n    <button class=\"btn btn-equals\">=</button>\n    \n    <button class=\"btn\">1</button>\n    <button class=\"btn\">2</button>\n    <button class=\"btn\">3</button>\n    <button class=\"btn\">0</button>\n  </div>\n</div>",
    "css": "body {\n  background: #0f172a;\n  display: flex;\n  justify-content: center;\n  align-items: center;\n  min-height: 100vh;\n  margin: 0;\n  font-family: 'Inter', sans-serif;\n}\n.calculator {\n  background: rgba(30, 41, 59, 0.4);\n  backdrop-filter: blur(16px);\n  border: 1px solid rgba(255, 255, 255, 0.1);\n  border-radius: 24px;\n  width: 320px;\n  padding: 24px;\n  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), 0 0 20px rgba(139, 92, 246, 0.15);\n}\n.calc-screen {\n  background: rgba(15, 23, 42, 0.6);\n  border: 1px solid rgba(255, 255, 255, 0.05);\n  color: #f8fafc;\n  font-size: 2.2rem;\n  font-family: monospace;\n  text-align: right;\n  padding: 18px;\n  border-radius: 16px;\n  margin-bottom: 20px;\n  overflow-x: auto;\n  white-space: nowrap;\n}\n.calc-buttons {\n  display: grid;\n  grid-template-columns: repeat(4, 1fr);\n  gap: 12px;\n}\n.btn {\n  background: rgba(51, 65, 85, 0.5);\n  border: 1px solid rgba(255, 255, 255, 0.05);\n  color: #f1f5f9;\n  font-size: 1.2rem;\n  font-weight: 600;\n  padding: 16px;\n  border-radius: 12px;\n  cursor: pointer;\n  transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);\n}\n.btn:hover {\n  background: rgba(100, 116, 139, 0.6);\n  transform: translateY(-2px);\n}\n.btn-operator {\n  background: rgba(139, 92, 246, 0.25);\n  color: #c084fc;\n}\n.btn-operator:hover {\n  background: rgba(139, 92, 246, 0.4);\n}\n.btn-clear {\n  background: rgba(239, 68, 68, 0.2);\n  color: #fca5a5;\n  grid-column: span 1;\n}\n.btn-clear:hover {\n  background: rgba(239, 68, 68, 0.35);\n}\n.btn-equals {\n  background: linear-gradient(135deg, #8b5cf6, #06b6d4);\n  color: white;\n  grid-row: span 2;\n  height: 100%;\n}\n.btn-equals:hover {\n  box-shadow: 0 0 15px rgba(6, 182, 212, 0.4);\n  transform: translateY(-2px);\n}",
    "code": "const screen = document.getElementById('screen');\nlet currentInput = '';\nlet pendingOperator = null;\nlet firstOperand = null;\nlet shouldResetScreen = false;\n\ndocument.querySelector('.calc-buttons').addEventListener('click', (e) => {\n  if (!e.target.matches('.btn')) return;\n  const btn = e.target;\n  const value = btn.textContent.trim();\n\n  console.log('Button clicked:', value);\n\n  if (value === 'AC') {\n    currentInput = '0';\n    pendingOperator = null;\n    firstOperand = null;\n    screen.textContent = '0';\n    console.log('Cleared state');\n    return;\n  }\n\n  if (btn.classList.contains('btn-operator')) {\n    if (pendingOperator && !shouldResetScreen) {\n      calculate();\n    }\n    firstOperand = parseFloat(screen.textContent.trim());\n    pendingOperator = value;\n    shouldResetScreen = true;\n    console.log('Set operator:', value, 'with operand:', firstOperand);\n    return;\n  }\n\n  if (btn.classList.contains('btn-equals')) {\n    calculate();\n    pendingOperator = null;\n    firstOperand = null;\n    return;\n  }\n\n  // Handle number input\n  const screenVal = screen.textContent.trim();\n  if (screenVal === '0' || shouldResetScreen) {\n    screen.textContent = value;\n    shouldResetScreen = false;\n  } else {\n    screen.textContent = screenVal + value;\n  }\n});\n\nfunction calculate() {\n  if (firstOperand === null || pendingOperator === null) return;\n  const secondOperand = parseFloat(screen.textContent.trim());\n  let result = 0;\n\n  switch (pendingOperator) {\n    case '+': result = firstOperand + secondOperand; break;\n    case '-': result = firstOperand - secondOperand; break;\n    case '*': result = firstOperand * secondOperand; break;\n    case '/': result = secondOperand !== 0 ? firstOperand / secondOperand : 'Error'; break;\n  }\n\n  console.log(\"Calculation: \" + firstOperand + \" \" + pendingOperator + \" \" + secondOperand + \" = \" + result);\n  screen.textContent = String(result);\n  firstOperand = result;\n  shouldResetScreen = true;\n}"
  },
