  {
    "cat": "Patterns",
    "name": "Higher-Order Components",
    "desc": "A HOC is a function that takes a component and returns an enhanced component. Classic reuse pattern.",
    "html": "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\">\n<script src=\"https://unpkg.com/react@18/umd/react.development.js\" crossorigin><\/script>\n<script src=\"https://unpkg.com/react-dom@18/umd/react-dom.development.js\" crossorigin><\/script>\n<script src=\"https://unpkg.com/@babel/standalone/babel.min.js\"><\/script>\n</head>\n<body>\n<div id=\"root\"></div>\n<script type=\"text/babel\">\nconst { useState, useEffect } = React;\n\n// HOC: adds loading state to any component\nfunction withLoading(WrappedComponent) {\n  return function WithLoadingComponent(props) {\n    const [loading, setLoading] = useState(true);\n    useEffect(() => {\n      const timer = setTimeout(() => setLoading(false), 1500);\n      return () => clearTimeout(timer);\n    }, []);\n    if (loading) return (\n      <div style={{padding:'40px',textAlign:'center',color:'#64748b'}}>\n        <div style={{fontSize:'2em',animation:'spin 1s linear infinite',display:'inline-block'}}>⏳</div>\n        <p>Loading...</p>\n        <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>\n      </div>\n    );\n    return <WrappedComponent {...props} />;\n  };\n}\n\n// HOC: adds a colored border wrapper\nfunction withBorder(WrappedComponent, color = '#3b82f6') {\n  return function WithBorderComponent(props) {\n    return (\n      <div style={{border:`3px solid ${color}`,borderRadius:'12px',padding:'16px',marginBottom:'12px'}}>\n        <WrappedComponent {...props} />\n      </div>\n    );\n  };\n}\n\n// Base components\nfunction UserProfile({ name, role }) {\n  return <div><h3 style={{margin:0}}>{name}</h3><p style={{margin:'4px 0 0',color:'#64748b'}}>{role}</p></div>;\n}\n\nfunction Stats({ value, label }) {\n  return <div style={{textAlign:'center'}}><div style={{fontSize:'2em',fontWeight:800,color:'#3b82f6'}}>{value}</div><div style={{color:'#64748b'}}>{label}</div></div>;\n}\n\n// Enhanced components\nconst LoadingProfile = withLoading(withBorder(UserProfile, '#8b5cf6'));\nconst LoadingStats = withLoading(withBorder(Stats, '#10b981'));\n\nfunction App() {\n  return (\n    <div style={{padding:'30px',fontFamily:'sans-serif',maxWidth:'400px',margin:'0 auto'}}>\n      <h2>Higher-Order Components</h2>\n      <p style={{color:'#64748b',marginBottom:'16px'}}>withLoading + withBorder HOCs compose together.</p>\n      <LoadingProfile name=\"Alice Johnson\" role=\"Senior Engineer\" />\n      <LoadingStats value=\"42\" label=\"Projects Completed\" />\n    </div>\n  );\n}\nReactDOM.createRoot(document.getElementById('root')).render(<App />);\n<\/script>\n</body>\n</html>",

  {
    "cat": "Patterns",
    "name": "Render Props",
    "desc": "A component with a render prop takes a function that returns React elements instead of implementing its own render logic.",
    "html": "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\">\n<script src=\"https://unpkg.com/react@18/umd/react.development.js\" crossorigin><\/script>\n<script src=\"https://unpkg.com/react-dom@18/umd/react-dom.development.js\" crossorigin><\/script>\n<script src=\"https://unpkg.com/@babel/standalone/babel.min.js\"><\/script>\n</head>\n<body>\n<div id=\"root\"></div>\n<script type=\"text/babel\">\nconst { useState, useEffect } = React;\n\n// Render prop component: tracks mouse position\nfunction MouseTracker({ render }) {\n  const [pos, setPos] = useState({ x: 0, y: 0 });\n  const handleMouseMove = (e) => {\n    const rect = e.currentTarget.getBoundingClientRect();\n    setPos({ x: Math.round(e.clientX - rect.left), y: Math.round(e.clientY - rect.top) });\n  };\n  return (\n    <div onMouseMove={handleMouseMove} style={{height:'200px',background:'#0f172a',borderRadius:'12px',position:'relative',overflow:'hidden',cursor:'crosshair'}}>\n      {render(pos)}\n    </div>\n  );\n}\n\nfunction App() {\n  return (\n    <div style={{padding:'30px',fontFamily:'sans-serif',maxWidth:'500px',margin:'0 auto'}}>\n      <h2>Render Props</h2>\n      <p style={{color:'#64748b',marginBottom:'12px'}}>Same MouseTracker, different renders:</p>\n\n      <h3>Crosshair View</h3>\n      <MouseTracker render={({ x, y }) => (\n        <>\n          <div style={{position:'absolute',left:x,top:0,width:'1px',height:'100%',background:'rgba(59,130,246,0.3)'}} />\n          <div style={{position:'absolute',top:y,left:0,height:'1px',width:'100%',background:'rgba(59,130,246,0.3)'}} />\n          <div style={{position:'absolute',left:x-4,top:y-4,width:'8px',height:'8px',borderRadius:'50%',background:'#3b82f6',boxShadow:'0 0 10px #3b82f6'}} />\n          <span style={{position:'absolute',bottom:'10px',right:'10px',color:'#64748b',fontSize:'0.85em',fontFamily:'monospace'}}>({x}, {y})</span>\n        </>\n      )} />\n\n      <h3 style={{marginTop:'16px'}}>Heat Map View</h3>\n      <MouseTracker render={({ x, y }) => (\n        <div style={{width:'100%',height:'100%',background:`radial-gradient(circle at ${x}px ${y}px, #ef4444, #f59e0b, #0f172a 60%)`,transition:'background 0.05s'}} />\n      )} />\n    </div>\n  );\n}\nReactDOM.createRoot(document.getElementById('root')).render(<App />);\n<\/script>\n</body>\n</html>",

  {
    "cat": "Patterns",
    "name": "Portals",
    "desc": "Render children into a DOM node outside the parent component's DOM tree. Useful for modals and tooltips.",
    "html": "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\">\n<script src=\"https://unpkg.com/react@18/umd/react.development.js\" crossorigin><\/script>\n<script src=\"https://unpkg.com/react-dom@18/umd/react-dom.development.js\" crossorigin><\/script>\n<script src=\"https://unpkg.com/@babel/standalone/babel.min.js\"><\/script>\n</head>\n<body>\n<div id=\"root\"></div>\n<div id=\"modal-root\"></div>\n<script type=\"text/babel\">\nconst { useState } = React;\n\nfunction Modal({ isOpen, onClose, title, children }) {\n  if (!isOpen) return null;\n  return ReactDOM.createPortal(\n    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000}} onClick={onClose}>\n      <div onClick={e => e.stopPropagation()} style={{background:'#fff',borderRadius:'16px',padding:'24px',maxWidth:'400px',width:'90%',boxShadow:'0 20px 60px rgba(0,0,0,0.3)',animation:'slideUp 0.3s ease'}}>\n        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'16px'}}>\n          <h2 style={{margin:0}}>{title}</h2>\n          <button onClick={onClose} style={{background:'none',border:'none',fontSize:'1.5em',cursor:'pointer',color:'#94a3b8'}}>×</button>\n        </div>\n        {children}\n      </div>\n    </div>,\n    document.getElementById('modal-root')\n  );\n}\n\nfunction App() {\n  const [showModal, setShowModal] = useState(false);\n  return (\n    <div style={{padding:'30px',fontFamily:'sans-serif',maxWidth:'500px',margin:'0 auto'}}>\n      <style>{`@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }`}</style>\n      <h2>React Portals</h2>\n      <p style={{color:'#64748b',marginBottom:'16px'}}>The modal renders into #modal-root, outside the #root tree.</p>\n      <div style={{border:'2px dashed #e2e8f0',padding:'20px',borderRadius:'8px',overflow:'hidden'}}>\n        <p>This container has <code>overflow: hidden</code>, but the modal still works because it's portaled outside!</p>\n        <button onClick={() => setShowModal(true)} style={{padding:'10px 24px',background:'#3b82f6',color:'#fff',border:'none',borderRadius:'8px',cursor:'pointer',fontSize:'1em'}}>Open Portal Modal</button>\n      </div>\n      <Modal isOpen={showModal} onClose={() => setShowModal(false)} title=\"Portal Modal 🚀\">\n        <p style={{color:'#64748b'}}>This modal is rendered via <code>ReactDOM.createPortal()</code> into a separate DOM node.</p>\n        <button onClick={() => setShowModal(false)} style={{marginTop:'12px',padding:'10px 24px',background:'#10b981',color:'#fff',border:'none',borderRadius:'8px',cursor:'pointer'}}>Got it!</button>\n      </Modal>\n    </div>\n  );\n}\nReactDOM.createRoot(document.getElementById('root')).render(<App />);\n<\/script>\n</body>\n</html>",

  {
    "cat": "Patterns",
    "name": "Error Boundaries",
    "desc": "Class components that catch JavaScript errors in child components and display a fallback UI.",
    "html": "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\">\n<script src=\"https://unpkg.com/react@18/umd/react.development.js\" crossorigin><\/script>\n<script src=\"https://unpkg.com/react-dom@18/umd/react-dom.development.js\" crossorigin><\/script>\n<script src=\"https://unpkg.com/@babel/standalone/babel.min.js\"><\/script>\n</head>\n<body>\n<div id=\"root\"></div>\n<script type=\"text/babel\">\nconst { useState } = React;\n\n// Error Boundary must be a class component\nclass ErrorBoundary extends React.Component {\n  constructor(props) {\n    super(props);\n    this.state = { hasError: false, error: null };\n  }\n  static getDerivedStateFromError(error) {\n    return { hasError: true, error };\n  }\n  componentDidCatch(error, errorInfo) {\n    console.error('Caught by Error Boundary:', error, errorInfo);\n  }\n  render() {\n    if (this.state.hasError) {\n      return (\n        <div style={{padding:'20px',background:'#fef2f2',border:'1px solid #fecaca',borderRadius:'12px',textAlign:'center'}}>\n          <div style={{fontSize:'3em'}}>💥</div>\n          <h3 style={{color:'#991b1b'}}>Something went wrong</h3>\n          <p style={{color:'#dc2626',fontFamily:'monospace',fontSize:'0.85em'}}>{this.state.error?.message}</p>\n          <button onClick={() => this.setState({ hasError: false, error: null })} style={{padding:'8px 20px',background:'#ef4444',color:'#fff',border:'none',borderRadius:'6px',cursor:'pointer',marginTop:'8px'}}>Try Again</button>\n        </div>\n      );\n    }\n    return this.props.children;\n  }\n}\n\n// Component that can throw\nfunction BuggyCounter() {\n  const [count, setCount] = useState(0);\n  if (count >= 3) throw new Error('Counter exceeded limit of 3!');\n  return (\n    <div style={{padding:'20px',background:'#f0fdf4',borderRadius:'12px',textAlign:'center',border:'1px solid #bbf7d0'}}>\n      <div style={{fontSize:'3em',fontWeight:800,color:'#10b981'}}>{count}</div>\n      <button onClick={() => setCount(c => c + 1)} style={{padding:'8px 20px',background:'#10b981',color:'#fff',border:'none',borderRadius:'6px',cursor:'pointer',marginTop:'8px'}}>Increment (crashes at 3)</button>\n    </div>\n  );\n}\n\nfunction App() {\n  return (\n    <div style={{padding:'30px',fontFamily:'sans-serif',maxWidth:'400px',margin:'0 auto'}}>\n      <h2>Error Boundaries</h2>\n      <p style={{color:'#64748b',marginBottom:'16px'}}>Click to 3 to trigger an error. The boundary catches it gracefully.</p>\n      <ErrorBoundary>\n        <BuggyCounter />\n      </ErrorBoundary>\n    </div>\n  );\n}\nReactDOM.createRoot(document.getElementById('root')).render(<App />);\n<\/script>\n</body>\n</html>",

  // ── STYLING ────────────────────────────────────────────────────────────
  {
    "cat": "Styling",
    "name": "Inline Styles",
    "desc": "React inline styles use camelCase properties and JavaScript objects instead of CSS strings.",
    "html": "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\">\n<script src=\"https://unpkg.com/react@18/umd/react.development.js\" crossorigin><\/script>\n<script src=\"https://unpkg.com/react-dom@18/umd/react-dom.development.js\" crossorigin><\/script>\n<script src=\"https://unpkg.com/@babel/standalone/babel.min.js\"><\/script>\n</head>\n<body>\n<div id=\"root\"></div>\n<script type=\"text/babel\">\nconst { useState } = React;\n\nfunction App() {\n  const [active, setActive] = useState(0);\n  const colors = ['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6'];\n\n  // Dynamic style objects\n  const cardStyle = (i) => ({\n    padding: '16px 20px',\n    marginBottom: '8px',\n    borderRadius: '10px',\n    background: active === i ? colors[i] : '#f8fafc',\n    color: active === i ? '#fff' : '#1e293b',\n    cursor: 'pointer',\n    transition: 'all 0.2s ease',\n    transform: active === i ? 'scale(1.02)' : 'scale(1)',\n    border: `2px solid ${active === i ? colors[i] : '#e2e8f0'}`,\n    fontWeight: active === i ? 700 : 400,\n  });\n\n  const items = ['Padding & Margin', 'Border Radius', 'Gradients', 'Transitions', 'Transforms'];\n\n  return (\n    <div style={{ padding: '30px', fontFamily: 'sans-serif', maxWidth: '400px', margin: '0 auto' }}>\n      <h2 style={{ color: '#1e293b' }}>Inline Styles in React</h2>\n      <p style={{ color: '#64748b', fontSize: '0.9em', marginBottom: '16px' }}>Click cards to see dynamic inline styles:</p>\n      {items.map((item, i) => (\n        <div key={i} onClick={() => setActive(i)} style={cardStyle(i)}>{item}</div>\n      ))}\n      <pre style={{ background: '#0f172a', color: '#e2e8f0', padding: '12px', borderRadius: '8px', fontSize: '0.8em', marginTop: '16px', overflow: 'auto' }}>\n{JSON.stringify(cardStyle(active), null, 2)}\n      </pre>\n    </div>\n  );\n}\nReactDOM.createRoot(document.getElementById('root')).render(<App />);\n<\/script>\n</body>\n</html>",

  {
    "cat": "Styling",
    "name": "CSS Classes & Modules",
    "desc": "Apply CSS classes conditionally with template literals or classnames utility patterns.",
    "html": "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\">\n<script src=\"https://unpkg.com/react@18/umd/react.development.js\" crossorigin><\/script>\n<script src=\"https://unpkg.com/react-dom@18/umd/react-dom.development.js\" crossorigin><\/script>\n<script src=\"https://unpkg.com/@babel/standalone/babel.min.js\"><\/script>\n<style>\n  .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 1em; transition: all 0.2s; margin: 4px; }\n  .btn-primary { background: #3b82f6; color: #fff; }\n  .btn-primary:hover { background: #2563eb; }\n  .btn-success { background: #10b981; color: #fff; }\n  .btn-danger { background: #ef4444; color: #fff; }\n  .btn-outline { background: transparent; border: 2px solid #3b82f6; color: #3b82f6; }\n  .btn-lg { padding: 14px 28px; font-size: 1.1em; }\n  .btn-sm { padding: 6px 12px; font-size: 0.85em; }\n  .btn-disabled { opacity: 0.5; cursor: not-allowed; }\n  .card { padding: 16px; border-radius: 10px; margin: 8px 0; transition: all 0.2s; border: 2px solid #e2e8f0; }\n  .card-active { border-color: #3b82f6; background: #eff6ff; transform: translateX(4px); }\n</style>\n</head>\n<body>\n<div id=\"root\"></div>\n<script type=\"text/babel\">\nconst { useState } = React;\n\n// Simple classnames helper\nfunction cx(...args) {\n  return args.filter(Boolean).join(' ');\n}\n\nfunction App() {\n  const [active, setActive] = useState(1);\n  const [disabled, setDisabled] = useState(false);\n  const items = ['Dashboard', 'Profile', 'Settings'];\n\n  return (\n    <div style={{padding:'30px',fontFamily:'sans-serif',maxWidth:'450px',margin:'0 auto'}}>\n      <h2>CSS Classes in React</h2>\n\n      <h3>Button Variants</h3>\n      <div>\n        <button className=\"btn btn-primary\">Primary</button>\n        <button className=\"btn btn-success\">Success</button>\n        <button className=\"btn btn-danger\">Danger</button>\n        <button className=\"btn btn-outline\">Outline</button>\n      </div>\n\n      <h3>Conditional Classes</h3>\n      <label style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'12px'}}>\n        <input type=\"checkbox\" checked={disabled} onChange={() => setDisabled(!disabled)} />\n        Disable buttons\n      </label>\n      <button className={cx('btn', 'btn-primary', 'btn-lg', disabled && 'btn-disabled')}>Large {disabled ? '(disabled)' : ''}</button>\n      <button className={cx('btn', 'btn-success', 'btn-sm', disabled && 'btn-disabled')}>Small {disabled ? '(disabled)' : ''}</button>\n\n      <h3>Active State</h3>\n      {items.map((item, i) => (\n        <div key={i} className={cx('card', active === i && 'card-active')} onClick={() => setActive(i)} style={{cursor:'pointer'}}>\n          <strong>{item}</strong>\n        </div>\n      ))}\n    </div>\n  );\n}\nReactDOM.createRoot(document.getElementById('root')).render(<App />);\n<\/script>\n</body>\n</html>",
    "css": "",
    "code": ""
  },
  {
    "cat": "Styling",
    "name": "Dynamic CSS Variables",
    "desc": "Use CSS custom properties with React state for theme switching and dynamic styling.",
    "html": "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\">\n<script src=\"https://unpkg.com/react@18/umd/react.development.js\" crossorigin><\/script>\n<script src=\"https://unpkg.com/react-dom@18/umd/react-dom.development.js\" crossorigin><\/script>\n<script src=\"https://unpkg.com/@babel/standalone/babel.min.js\"><\/script>\n<style>\n  :root { --hue: 220; --sat: 80%; --radius: 12px; }\n  .themed-card { background: hsl(var(--hue), var(--sat), 95%); border: 2px solid hsl(var(--hue), var(--sat), 60%); border-radius: var(--radius); padding: 20px; margin: 10px 0; transition: all 0.3s; }\n  .themed-card h3 { color: hsl(var(--hue), var(--sat), 30%); margin: 0 0 8px; }\n  .themed-card p { color: hsl(var(--hue), var(--sat), 40%); margin: 0; }\n  .themed-btn { background: hsl(var(--hue), var(--sat), 50%); color: #fff; border: none; padding: 10px 20px; border-radius: var(--radius); cursor: pointer; font-size: 1em; transition: all 0.3s; }\n  .themed-btn:hover { background: hsl(var(--hue), var(--sat), 40%); }\n</style>\n</head>\n<body>\n<div id=\"root\"></div>\n<script type=\"text/babel\">\nconst { useState } = React;\n\nfunction App() {\n  const [hue, setHue] = useState(220);\n  const [radius, setRadius] = useState(12);\n\n  return (\n    <div style={{padding:'30px',fontFamily:'sans-serif',maxWidth:'450px',margin:'0 auto','--hue':hue,'--radius':`${radius}px`}}>\n      <h2>Dynamic CSS Variables</h2>\n\n      <div style={{marginBottom:'16px'}}>\n        <label>Hue: <strong>{hue}°</strong></label><br/>\n        <input type=\"range\" min=\"0\" max=\"360\" value={hue} onChange={e => setHue(e.target.value)} style={{width:'100%'}} />\n      </div>\n      <div style={{marginBottom:'16px'}}>\n        <label>Border Radius: <strong>{radius}px</strong></label><br/>\n        <input type=\"range\" min=\"0\" max=\"30\" value={radius} onChange={e => setRadius(e.target.value)} style={{width:'100%'}} />\n      </div>\n\n      <div className=\"themed-card\">\n        <h3>🎨 Themed Card</h3>\n        <p>This card responds to CSS custom properties controlled by React state.</p>\n      </div>\n      <button className=\"themed-btn\">Themed Button</button>\n    </div>\n  );\n}\nReactDOM.createRoot(document.getElementById('root')).render(<App />);\n<\/script>\n</body>\n</html>",

  // ── STATE MANAGEMENT ───────────────────────────────────────────────────
  {
    "cat": "State Management",
    "name": "Context + useReducer",
    "desc": "Combine Context API with useReducer for a lightweight Redux-like global state pattern.",
    "html": "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\">\n<script src=\"https://unpkg.com/react@18/umd/react.development.js\" crossorigin><\/script>\n<script src=\"https://unpkg.com/react-dom@18/umd/react-dom.development.js\" crossorigin><\/script>\n<script src=\"https://unpkg.com/@babel/standalone/babel.min.js\"><\/script>\n</head>\n<body>\n<div id=\"root\"></div>\n<script type=\"text/babel\">\nconst { useReducer, useContext, createContext } = React;\n\nconst CartContext = createContext();\n\nfunction cartReducer(state, action) {\n  switch (action.type) {\n    case 'ADD': {\n      const exists = state.find(i => i.id === action.item.id);\n      if (exists) return state.map(i => i.id === action.item.id ? { ...i, qty: i.qty + 1 } : i);\n      return [...state, { ...action.item, qty: 1 }];\n    }\n    case 'REMOVE': return state.filter(i => i.id !== action.id);\n    case 'CLEAR': return [];\n    default: return state;\n  }\n}\n\nfunction CartProvider({ children }) {\n  const [cart, dispatch] = useReducer(cartReducer, []);\n  return <CartContext.Provider value={{ cart, dispatch }}>{children}</CartContext.Provider>;\n}\n\nfunction ProductList() {\n  const { dispatch } = useContext(CartContext);\n  const products = [\n    { id: 1, name: 'Coffee', price: 4.99, emoji: '☕' },\n    { id: 2, name: 'Croissant', price: 3.49, emoji: '🥐' },\n    { id: 3, name: 'Juice', price: 5.99, emoji: '🧃' },\n  ];\n  return (\n    <div>\n      <h3>Products</h3>\n      {products.map(p => (\n        <div key={p.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 14px',background:'#f8fafc',borderRadius:'8px',marginBottom:'6px'}}>\n          <span>{p.emoji} {p.name} — ${p.price}</span>\n          <button onClick={() => dispatch({ type: 'ADD', item: p })} style={{padding:'6px 14px',background:'#3b82f6',color:'#fff',border:'none',borderRadius:'6px',cursor:'pointer'}}>Add</button>\n        </div>\n      ))}\n    </div>\n  );\n}\n\nfunction Cart() {\n  const { cart, dispatch } = useContext(CartContext);\n  const total = cart.reduce((sum, i) => sum + i.price * i.qty, 0);\n  return (\n    <div style={{background:'#0f172a',borderRadius:'12px',padding:'16px',color:'#f1f5f9',marginTop:'16px'}}>\n      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>\n        <h3 style={{margin:0}}>🛒 Cart ({cart.reduce((s, i) => s + i.qty, 0)})</h3>\n        {cart.length > 0 && <button onClick={() => dispatch({ type: 'CLEAR' })} style={{background:'#ef4444',color:'#fff',border:'none',padding:'4px 12px',borderRadius:'4px',cursor:'pointer'}}>Clear</button>}\n      </div>\n      {cart.length === 0 ? <p style={{color:'#64748b',marginTop:'8px'}}>Cart is empty</p> : (\n        <>{cart.map(i => (\n          <div key={i.id} style={{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid #1e293b'}}>\n            <span>{i.emoji} {i.name} × {i.qty}</span>\n            <span>${(i.price * i.qty).toFixed(2)}</span>\n          </div>\n        ))}\n        <div style={{marginTop:'8px',fontWeight:700,fontSize:'1.1em'}}>Total: ${total.toFixed(2)}</div></>\n      )}\n    </div>\n  );\n}\n\nfunction App() {\n  return (\n    <CartProvider>\n      <div style={{padding:'30px',fontFamily:'sans-serif',maxWidth:'400px',margin:'0 auto'}}>\n        <h2>Context + useReducer Store</h2>\n        <ProductList />\n        <Cart />\n      </div>\n    </CartProvider>\n  );\n}\nReactDOM.createRoot(document.getElementById('root')).render(<App />);\n<\/script>\n</body>\n</html>",

  {
    "cat": "State Management",
    "name": "State Machines",
    "desc": "Model component states as explicit finite states with defined transitions. Prevents impossible states.",
    "html": "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\">\n<script src=\"https://unpkg.com/react@18/umd/react.development.js\" crossorigin><\/script>\n<script src=\"https://unpkg.com/react-dom@18/umd/react-dom.development.js\" crossorigin><\/script>\n<script src=\"https://unpkg.com/@babel/standalone/babel.min.js\"><\/script>\n</head>\n<body>\n<div id=\"root\"></div>\n<script type=\"text/babel\">\nconst { useReducer } = React;\n\n// State machine: idle -> loading -> success/error -> idle\nfunction fetchMachine(state, event) {\n  switch (state.status) {\n    case 'idle':\n      if (event.type === 'FETCH') return { status: 'loading', data: null, error: null };\n      return state;\n    case 'loading':\n      if (event.type === 'RESOLVE') return { status: 'success', data: event.data, error: null };\n      if (event.type === 'REJECT') return { status: 'error', data: null, error: event.error };\n      return state;\n    case 'success':\n    case 'error':\n      if (event.type === 'RESET') return { status: 'idle', data: null, error: null };\n      return state;\n    default: return state;\n  }\n}\n\nfunction App() {\n  const [state, send] = useReducer(fetchMachine, { status: 'idle', data: null, error: null });\n\n  const simulateFetch = () => {\n    send({ type: 'FETCH' });\n    setTimeout(() => {\n      if (Math.random() > 0.4) {\n        send({ type: 'RESOLVE', data: { users: 42, posts: 128, comments: 567 } });\n      } else {\n        send({ type: 'REJECT', error: 'Network timeout' });\n      }\n    }, 1500);\n  };\n\n  const colors = { idle: '#64748b', loading: '#3b82f6', success: '#10b981', error: '#ef4444' };\n\n  return (\n    <div style={{padding:'30px',fontFamily:'sans-serif',maxWidth:'420px',margin:'0 auto'}}>\n      <h2>State Machine Pattern</h2>\n      <p style={{color:'#64748b',marginBottom:'16px'}}>Explicit states prevent impossible combinations like \"loading + error\".</p>\n\n      <div style={{textAlign:'center',padding:'24px',background:'#f8fafc',borderRadius:'12px',border:`2px solid ${colors[state.status]}`,marginBottom:'16px'}}>\n        <div style={{fontSize:'0.85em',color:colors[state.status],fontWeight:700,textTransform:'uppercase',marginBottom:'12px'}}>⬤ {state.status}</div>\n\n        {state.status === 'idle' && <button onClick={simulateFetch} style={{padding:'10px 24px',background:'#3b82f6',color:'#fff',border:'none',borderRadius:'8px',cursor:'pointer',fontSize:'1em'}}>Fetch Data</button>}\n\n        {state.status === 'loading' && <div style={{fontSize:'2em',animation:'spin 1s linear infinite',display:'inline-block'}}>⏳</div>}\n\n        {state.status === 'success' && (\n          <div>\n            <p style={{fontSize:'1.5em'}}>✅</p>\n            {Object.entries(state.data).map(([k, v]) => <div key={k} style={{padding:'6px'}}><strong>{k}:</strong> {v}</div>)}\n            <button onClick={() => send({ type: 'RESET' })} style={{marginTop:'12px',padding:'8px 20px',background:'#10b981',color:'#fff',border:'none',borderRadius:'6px',cursor:'pointer'}}>Reset</button>\n          </div>\n        )}\n\n        {state.status === 'error' && (\n          <div>\n            <p style={{fontSize:'1.5em'}}>❌</p>\n            <p style={{color:'#ef4444'}}>{state.error}</p>\n            <button onClick={() => send({ type: 'RESET' })} style={{marginTop:'8px',padding:'8px 20px',background:'#ef4444',color:'#fff',border:'none',borderRadius:'6px',cursor:'pointer'}}>Retry</button>\n          </div>\n        )}\n      </div>\n      <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>\n\n      <div style={{display:'flex',gap:'4px',justifyContent:'center'}}>\n        {['idle','loading','success','error'].map(s => (\n          <div key={s} style={{padding:'4px 12px',borderRadius:'4px',fontSize:'0.75em',fontWeight:600,background: state.status === s ? colors[s] : '#e2e8f0',color: state.status === s ? '#fff' : '#94a3b8'}}>{s}</div>\n        ))}\n      </div>\n    </div>\n  );\n}\nReactDOM.createRoot(document.getElementById('root')).render(<App />);\n<\/script>\n</body>\n</html>",

  {
    "cat": "Advanced",
    "name": "React.memo",
    "desc": "Wraps a component to skip re-rendering when props haven't changed. Uses shallow comparison.",
    "html": "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\">\n<script src=\"https://unpkg.com/react@18/umd/react.development.js\" crossorigin><\/script>\n<script src=\"https://unpkg.com/react-dom@18/umd/react-dom.development.js\" crossorigin><\/script>\n<script src=\"https://unpkg.com/@babel/standalone/babel.min.js\"><\/script>\n</head>\n<body>\n<div id=\"root\"></div>\n<script type=\"text/babel\">\nconst { useState, memo } = React;\n\nlet normalRenders = 0;\nlet memoRenders = 0;\n\n// Normal component — re-renders every time parent re-renders\nfunction NormalChild({ name }) {\n  normalRenders++;\n  return (\n    <div style={{padding:'12px',background:'#fef2f2',borderRadius:'8px',marginBottom:'8px',border:'1px solid #fecaca'}}>\n      <strong>Normal Component</strong>\n      <p style={{margin:'4px 0 0',fontSize:'0.85em',color:'#991b1b'}}>Name: {name} · Rendered: {normalRenders} times</p>\n    </div>\n  );\n}\n\n// Memoized component — only re-renders when props change\nconst MemoChild = memo(function MemoChild({ name }) {\n  memoRenders++;\n  return (\n    <div style={{padding:'12px',background:'#f0fdf4',borderRadius:'8px',marginBottom:'8px',border:'1px solid #bbf7d0'}}>\n      <strong>React.memo Component</strong>\n      <p style={{margin:'4px 0 0',fontSize:'0.85em',color:'#166534'}}>Name: {name} · Rendered: {memoRenders} times</p>\n    </div>\n  );\n});\n\nfunction App() {\n  const [count, setCount] = useState(0);\n  const [name] = useState('Alice');\n\n  return (\n    <div style={{padding:'30px',fontFamily:'sans-serif',maxWidth:'420px',margin:'0 auto'}}>\n      <h2>React.memo</h2>\n      <p style={{color:'#64748b',marginBottom:'16px'}}>Click the counter. The normal component re-renders every time, but the memo'd one skips re-renders since its props haven't changed.</p>\n      <div style={{textAlign:'center',marginBottom:'16px'}}>\n        <div style={{fontSize:'3em',fontWeight:800,color:'#3b82f6'}}>{count}</div>\n        <button onClick={() => setCount(c => c + 1)} style={{padding:'10px 24px',background:'#3b82f6',color:'#fff',border:'none',borderRadius:'8px',cursor:'pointer'}}>Increment (parent re-render)</button>\n      </div>\n      <NormalChild name={name} />\n      <MemoChild name={name} />\n    </div>\n  );\n}\nReactDOM.createRoot(document.getElementById('root')).render(<App />);\n<\/script>\n</body>\n</html>",

  {
    "cat": "Advanced",
    "name": "Lazy & Suspense",
    "desc": "Code-split components with React.lazy() and show fallback UI with Suspense while loading.",
    "html": "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\">\n<script src=\"https://unpkg.com/react@18/umd/react.development.js\" crossorigin><\/script>\n<script src=\"https://unpkg.com/react-dom@18/umd/react-dom.development.js\" crossorigin><\/script>\n<script src=\"https://unpkg.com/@babel/standalone/babel.min.js\"><\/script>\n</head>\n<body>\n<div id=\"root\"></div>\n<script type=\"text/babel\">\nconst { useState, Suspense, lazy } = React;\n\n// Simulate a lazy-loaded component\nfunction createLazyComponent(content, delay) {\n  return lazy(() => new Promise(resolve => {\n    setTimeout(() => {\n      resolve({ default: () => content });\n    }, delay);\n  }));\n}\n\nconst LazyDashboard = createLazyComponent(\n  <div style={{padding:'20px',background:'#eff6ff',borderRadius:'12px',border:'1px solid #bfdbfe'}}>\n    <h3 style={{color:'#1e40af',margin:'0 0 8px'}}>📊 Dashboard</h3>\n    <p style={{color:'#3b82f6'}}>Dashboard loaded successfully! This component took 2 seconds to load.</p>\n  </div>, 2000\n);\n\nconst LazySettings = createLazyComponent(\n  <div style={{padding:'20px',background:'#f0fdf4',borderRadius:'12px',border:'1px solid #bbf7d0'}}>\n    <h3 style={{color:'#166534',margin:'0 0 8px'}}>⚙️ Settings</h3>\n    <p style={{color:'#10b981'}}>Settings loaded! This one took 1.5 seconds.</p>\n  </div>, 1500\n);\n\nfunction Spinner() {\n  return (\n    <div style={{textAlign:'center',padding:'40px'}}>\n      <div style={{fontSize:'2em',animation:'spin 1s linear infinite',display:'inline-block'}}>⏳</div>\n      <p style={{color:'#64748b',marginTop:'8px'}}>Loading component...</p>\n      <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>\n    </div>\n  );\n}\n\nfunction App() {\n  const [tab, setTab] = useState('none');\n\n  return (\n    <div style={{padding:'30px',fontFamily:'sans-serif',maxWidth:'450px',margin:'0 auto'}}>\n      <h2>Lazy Loading & Suspense</h2>\n      <p style={{color:'#64748b',marginBottom:'16px'}}>Click a tab to lazy-load the component with a loading fallback.</p>\n      <div style={{display:'flex',gap:'8px',marginBottom:'16px'}}>\n        <button onClick={() => setTab('dashboard')} style={{padding:'10px 20px',background: tab==='dashboard'?'#3b82f6':'#e2e8f0',color: tab==='dashboard'?'#fff':'#333',border:'none',borderRadius:'8px',cursor:'pointer'}}>Dashboard</button>\n        <button onClick={() => setTab('settings')} style={{padding:'10px 20px',background: tab==='settings'?'#10b981':'#e2e8f0',color: tab==='settings'?'#fff':'#333',border:'none',borderRadius:'8px',cursor:'pointer'}}>Settings</button>\n      </div>\n      <Suspense fallback={<Spinner />}>\n        {tab === 'dashboard' && <LazyDashboard />}\n        {tab === 'settings' && <LazySettings />}\n      </Suspense>\n      {tab === 'none' && <p style={{color:'#94a3b8',textAlign:'center',padding:'20px'}}>Select a tab to load content</p>}\n    </div>\n  );\n}\nReactDOM.createRoot(document.getElementById('root')).render(<App />);\n<\/script>\n</body>\n</html>",

    "code": ""
  },
  {
    "cat": "Advanced",
    "name": "Fragments",
    "desc": "Return multiple elements without extra DOM wrappers using <React.Fragment> or the short syntax <>.</>.",
    "html": "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\">\n<script src=\"https://unpkg.com/react@18/umd/react.development.js\" crossorigin><\/script>\n<script src=\"https://unpkg.com/react-dom@18/umd/react-dom.development.js\" crossorigin><\/script>\n<script src=\"https://unpkg.com/@babel/standalone/babel.min.js\"><\/script>\n</head>\n<body>\n<div id=\"root\"></div>\n<script type=\"text/babel\">\nfunction TableRow({ name, role, status }) {\n  // Fragment avoids wrapping <td> elements in an extra <div>\n  return (\n    <React.Fragment>\n      <td style={{padding:'10px 14px'}}>{name}</td>\n      <td style={{padding:'10px 14px'}}>{role}</td>\n      <td style={{padding:'10px 14px'}}>\n        <span style={{padding:'4px 10px',borderRadius:'20px',fontSize:'0.8em',background: status==='Active'?'#dcfce7':'#fef2f2',color: status==='Active'?'#166534':'#991b1b'}}>{status}</span>\n      </td>\n    </React.Fragment>\n  );\n}\n\nfunction Glossary({ items }) {\n  // Short syntax <> </> (can't use key prop)\n  return items.map((item, i) => (\n    <React.Fragment key={i}>\n      <dt style={{fontWeight:700,color:'#1e293b',marginTop:'12px'}}>{item.term}</dt>\n      <dd style={{color:'#64748b',marginLeft:'16px',borderLeft:'3px solid #3b82f6',paddingLeft:'12px'}}>{item.definition}</dd>\n    </React.Fragment>\n  ));\n}\n\nfunction App() {\n  const team = [\n    { name: 'Alice', role: 'Engineer', status: 'Active' },\n    { name: 'Bob', role: 'Designer', status: 'Active' },\n    { name: 'Charlie', role: 'PM', status: 'Away' },\n  ];\n  const terms = [\n    { term: 'Fragment', definition: 'Groups elements without adding extra DOM nodes' },\n    { term: 'Key', definition: 'Required when using Fragment in a list with map()' },\n    { term: 'Short Syntax', definition: '<> </> — cannot accept key or attributes' },\n  ];\n  return (\n    <div style={{padding:'30px',fontFamily:'sans-serif',maxWidth:'500px',margin:'0 auto'}}>\n      <h2>React Fragments</h2>\n\n      <h3>Table with Fragment Rows</h3>\n      <table style={{width:'100%',borderCollapse:'collapse',border:'1px solid #e2e8f0',borderRadius:'8px',overflow:'hidden'}}>\n        <thead><tr style={{background:'#0f172a',color:'#f1f5f9'}}><th style={{padding:'10px 14px',textAlign:'left'}}>Name</th><th style={{padding:'10px 14px',textAlign:'left'}}>Role</th><th style={{padding:'10px 14px',textAlign:'left'}}>Status</th></tr></thead>\n        <tbody>{team.map((m, i) => <tr key={i} style={{borderBottom:'1px solid #e2e8f0'}}><TableRow {...m} /></tr>)}</tbody>\n      </table>\n\n      <h3 style={{marginTop:'20px'}}>Glossary with Keyed Fragments</h3>\n      <dl><Glossary items={terms} /></dl>\n    </div>\n  );\n}\nReactDOM.createRoot(document.getElementById('root')).render(<App />);\n<\/script>\n</body>\n</html>",

  {
    "cat": "Advanced",
    "name": "Forwarding Refs",
    "desc": "Use React.forwardRef to pass a ref through a component to a child DOM element.",
    "html": "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\">\n<script src=\"https://unpkg.com/react@18/umd/react.development.js\" crossorigin><\/script>\n<script src=\"https://unpkg.com/react-dom@18/umd/react-dom.development.js\" crossorigin><\/script>\n<script src=\"https://unpkg.com/@babel/standalone/babel.min.js\"><\/script>\n</head>\n<body>\n<div id=\"root\"></div>\n<script type=\"text/babel\">\nconst { useRef, forwardRef, useImperativeHandle } = React;\n\n// Simple forwardRef\nconst FancyInput = forwardRef(function FancyInput({ label, ...props }, ref) {\n  return (\n    <div style={{marginBottom:'12px'}}>\n      <label style={{display:'block',fontWeight:600,marginBottom:'4px',color:'#1e293b'}}>{label}</label>\n      <input ref={ref} {...props} style={{width:'100%',padding:'12px',border:'2px solid #8b5cf6',borderRadius:'8px',fontSize:'1em',outline:'none',boxSizing:'border-box',transition:'border 0.2s'}} />\n    </div>\n  );\n});\n\n// forwardRef with useImperativeHandle (expose custom API)\nconst CustomInput = forwardRef(function CustomInput({ label }, ref) {\n  const inputRef = useRef();\n  useImperativeHandle(ref, () => ({\n    focus: () => inputRef.current.focus(),\n    clear: () => { inputRef.current.value = ''; },\n    shake: () => {\n      inputRef.current.style.animation = 'shake 0.5s';\n      setTimeout(() => { inputRef.current.style.animation = ''; }, 500);\n    },\n  }));\n  return (\n    <div style={{marginBottom:'12px'}}>\n      <label style={{display:'block',fontWeight:600,marginBottom:'4px',color:'#1e293b'}}>{label}</label>\n      <input ref={inputRef} placeholder=\"Type something...\" style={{width:'100%',padding:'12px',border:'2px solid #10b981',borderRadius:'8px',fontSize:'1em',outline:'none',boxSizing:'border-box'}} />\n    </div>\n  );\n});\n\nfunction App() {\n  const fancyRef = useRef();\n  const customRef = useRef();\n\n  return (\n    <div style={{padding:'30px',fontFamily:'sans-serif',maxWidth:'420px',margin:'0 auto'}}>\n      <style>{`@keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }`}</style>\n      <h2>Forwarding Refs</h2>\n\n      <FancyInput ref={fancyRef} label=\"Simple forwardRef\" placeholder=\"Click the button below...\" />\n      <button onClick={() => { fancyRef.current.focus(); fancyRef.current.value = 'Focused via ref!'; }} style={{padding:'8px 16px',background:'#8b5cf6',color:'#fff',border:'none',borderRadius:'6px',cursor:'pointer',marginBottom:'20px'}}>Focus & Fill</button>\n\n      <CustomInput ref={customRef} label=\"useImperativeHandle\" />\n      <div style={{display:'flex',gap:'6px'}}>\n        <button onClick={() => customRef.current.focus()} style={{padding:'8px 16px',background:'#10b981',color:'#fff',border:'none',borderRadius:'6px',cursor:'pointer'}}>Focus</button>\n        <button onClick={() => customRef.current.clear()} style={{padding:'8px 16px',background:'#f59e0b',color:'#fff',border:'none',borderRadius:'6px',cursor:'pointer'}}>Clear</button>\n        <button onClick={() => customRef.current.shake()} style={{padding:'8px 16px',background:'#ef4444',color:'#fff',border:'none',borderRadius:'6px',cursor:'pointer'}}>Shake!</button>\n      </div>\n    </div>\n  );\n}\nReactDOM.createRoot(document.getElementById('root')).render(<App />);\n<\/script>\n</body>\n</html>",

  {
    "cat": "Advanced",
    "name": "Keys & Reconciliation",
    "desc": "React uses keys to efficiently update lists. Incorrect keys cause bugs. This demo shows the difference.",
    "html": "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\">\n<script src=\"https://unpkg.com/react@18/umd/react.development.js\" crossorigin><\/script>\n<script src=\"https://unpkg.com/react-dom@18/umd/react-dom.development.js\" crossorigin><\/script>\n<script src=\"https://unpkg.com/@babel/standalone/babel.min.js\"><\/script>\n</head>\n<body>\n<div id=\"root\"></div>\n<script type=\"text/babel\">\nconst { useState } = React;\n\nfunction ItemWithInput({ item }) {\n  return (\n    <div style={{display:'flex',alignItems:'center',gap:'8px',padding:'8px 12px',background:'#f8fafc',borderRadius:'6px',marginBottom:'4px'}}>\n      <span style={{fontSize:'1.2em'}}>{item.emoji}</span>\n      <strong style={{flex:1}}>{item.name}</strong>\n      <input defaultValue={item.name} style={{padding:'6px',border:'1px solid #e2e8f0',borderRadius:'4px',width:'100px'}} />\n    </div>\n  );\n}\n\nfunction App() {\n  const initialItems = [\n    { id: 'a', name: 'Apple', emoji: '🍎' },\n    { id: 'b', name: 'Banana', emoji: '🍌' },\n    { id: 'c', name: 'Cherry', emoji: '🍒' },\n    { id: 'd', name: 'Dragon Fruit', emoji: '🐉' },\n  ];\n  const [items, setItems] = useState(initialItems);\n\n  const shuffle = () => setItems([...items].sort(() => Math.random() - 0.5));\n  const addFirst = () => setItems([{ id: Date.now().toString(), name: 'New Item', emoji: '✨' }, ...items]);\n  const removeFirst = () => setItems(items.slice(1));\n\n  return (\n    <div style={{padding:'30px',fontFamily:'sans-serif',maxWidth:'500px',margin:'0 auto'}}>\n      <h2>Keys & Reconciliation</h2>\n      <p style={{color:'#64748b',fontSize:'0.85em',marginBottom:'12px'}}>Edit the inputs, then shuffle. With proper keys (id), inputs follow their items. With index keys, they stay in place — a bug!</p>\n\n      <div style={{display:'flex',gap:'6px',marginBottom:'16px',flexWrap:'wrap'}}>\n        <button onClick={shuffle} style={{padding:'8px 16px',background:'#3b82f6',color:'#fff',border:'none',borderRadius:'6px',cursor:'pointer'}}>🔀 Shuffle</button>\n        <button onClick={addFirst} style={{padding:'8px 16px',background:'#10b981',color:'#fff',border:'none',borderRadius:'6px',cursor:'pointer'}}>➕ Add First</button>\n        <button onClick={removeFirst} style={{padding:'8px 16px',background:'#ef4444',color:'#fff',border:'none',borderRadius:'6px',cursor:'pointer'}}>🗑 Remove First</button>\n      </div>\n\n      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'16px'}}>\n        <div>\n          <h3 style={{color:'#10b981',fontSize:'0.9em'}}>✅ key={'{item.id}'}</h3>\n          {items.map(item => <ItemWithInput key={item.id} item={item} />)}\n        </div>\n        <div>\n          <h3 style={{color:'#ef4444',fontSize:'0.9em'}}>❌ key={'{index}'}</h3>\n          {items.map((item, i) => <ItemWithInput key={i} item={item} />)}\n        </div>\n      </div>\n    </div>\n  );\n}\nReactDOM.createRoot(document.getElementById('root')).render(<App />);\n<\/script>\n</body>\n</html>",

  {
    "cat": "Mini Projects",
    "name": "Emoji Picker",
    "desc": "A searchable emoji picker built entirely with React hooks and inline styles.",
    "html": "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\">\n<script src=\"https://unpkg.com/react@18/umd/react.development.js\" crossorigin><\/script>\n<script src=\"https://unpkg.com/react-dom@18/umd/react-dom.development.js\" crossorigin><\/script>\n<script src=\"https://unpkg.com/@babel/standalone/babel.min.js\"><\/script>\n</head>\n<body>\n<div id=\"root\"></div>\n<script type=\"text/babel\">\nconst { useState } = React;\n\nconst EMOJIS = [\n  { emoji: '😀', name: 'grinning' }, { emoji: '😂', name: 'joy' }, { emoji: '🥰', name: 'love' },\n  { emoji: '😎', name: 'cool' }, { emoji: '🤔', name: 'thinking' }, { emoji: '🎉', name: 'party' },\n  { emoji: '🔥', name: 'fire' }, { emoji: '💡', name: 'idea' }, { emoji: '❤️', name: 'heart' },\n  { emoji: '⭐', name: 'star' }, { emoji: '🚀', name: 'rocket' }, { emoji: '🎯', name: 'target' },\n  { emoji: '💎', name: 'gem' }, { emoji: '🌈', name: 'rainbow' }, { emoji: '🎸', name: 'guitar' },\n  { emoji: '🍕', name: 'pizza' }, { emoji: '☕', name: 'coffee' }, { emoji: '🌍', name: 'earth' },\n  { emoji: '🐱', name: 'cat' }, { emoji: '🦊', name: 'fox' }, { emoji: '🐼', name: 'panda' },\n  { emoji: '✨', name: 'sparkles' }, { emoji: '🏆', name: 'trophy' }, { emoji: '🎨', name: 'art' },\n];\n\nfunction App() {\n  const [query, setQuery] = useState('');\n  const [copied, setCopied] = useState('');\n\n  const filtered = EMOJIS.filter(e => e.name.includes(query.toLowerCase()));\n\n  const copy = (emoji) => {\n    navigator.clipboard?.writeText(emoji).catch(() => {});\n    setCopied(emoji);\n    setTimeout(() => setCopied(''), 1000);\n  };\n\n  return (\n    <div style={{padding:'30px',fontFamily:'sans-serif',maxWidth:'400px',margin:'0 auto'}}>\n      <h2>Emoji Picker ⚛️</h2>\n      <input value={query} onChange={e => setQuery(e.target.value)} placeholder=\"Search emojis...\" style={{width:'100%',padding:'12px',border:'2px solid #e2e8f0',borderRadius:'10px',fontSize:'1em',boxSizing:'border-box',marginBottom:'16px'}} />\n      <div style={{display:'grid',gridTemplateColumns:'repeat(6, 1fr)',gap:'6px'}}>\n        {filtered.map(e => (\n          <button key={e.name} onClick={() => copy(e.emoji)} title={e.name} style={{fontSize:'1.8em',padding:'8px',background: copied===e.emoji ? '#dcfce7' : '#f8fafc',border:'1px solid #e2e8f0',borderRadius:'10px',cursor:'pointer',transition:'all 0.15s',transform: copied===e.emoji ? 'scale(1.2)' : 'scale(1)'}}>\n            {e.emoji}\n          </button>\n        ))}\n      </div>\n      {filtered.length === 0 && <p style={{textAlign:'center',color:'#94a3b8',marginTop:'20px'}}>No emojis found 😢</p>}\n      {copied && <div style={{position:'fixed',bottom:'20px',left:'50%',transform:'translateX(-50%)',background:'#0f172a',color:'#fff',padding:'10px 20px',borderRadius:'8px',fontSize:'0.9em'}}>Copied {copied}!</div>}\n    </div>\n  );\n}\nReactDOM.createRoot(document.getElementById('root')).render(<App />);\n<\/script>\n</body>\n</html>",

    "desc": "A simple markdown editor with live preview, using basic regex-based parsing.",
    "html": "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\">\n<script src=\"https://unpkg.com/react@18/umd/react.development.js\" crossorigin><\/script>\n<script src=\"https://unpkg.com/react-dom@18/umd/react-dom.development.js\" crossorigin><\/script>\n<script src=\"https://unpkg.com/@babel/standalone/babel.min.js\"><\/script>\n</head>\n<body>\n<div id=\"root\"></div>\n<script type=\"text/babel\">\nconst { useState } = React;\n\nfunction parseMarkdown(md) {\n  return md\n    .replace(/^### (.+)$/gm, '<h3>$1</h3>')\n    .replace(/^## (.+)$/gm, '<h2>$1</h2>')\n    .replace(/^# (.+)$/gm, '<h1>$1</h1>')\n    .replace(/\\*\\*(.+?)\\*\\*/g, '<strong>$1</strong>')\n    .replace(/\\*(.+?)\\*/g, '<em>$1</em>')\n    .replace(/`(.+?)`/g, '<code style=\"background:#f1f5f9;padding:2px 6px;border-radius:4px;color:#e11d48\">$1</code>')\n    .replace(/^- (.+)$/gm, '<li>$1</li>')\n    .replace(/(<li>.*<\\/li>)/s, '<ul>$1</ul>')\n    .replace(/\\n/g, '<br/>');\n}\n\nfunction App() {\n  const [md, setMd] = useState(`# React Markdown Previewer\\n\\n## Features\\n\\n- **Bold** text support\\n- *Italic* text support\\n- Inline \\`code\\` blocks\\n- Headings (h1, h2, h3)\\n- Bullet lists\\n\\n### Try editing!\\n\\nType markdown on the left and see it rendered live.`);\n\n  return (\n    <div style={{padding:'20px',fontFamily:'sans-serif',height:'100vh',boxSizing:'border-box',display:'flex',flexDirection:'column'}}>\n      <h2 style={{margin:'0 0 12px'}}>📝 Markdown Previewer</h2>\n      <div style={{flex:1,display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px',minHeight:0}}>\n        <textarea value={md} onChange={e => setMd(e.target.value)} style={{padding:'16px',border:'2px solid #e2e8f0',borderRadius:'10px',fontFamily:'monospace',fontSize:'0.9em',resize:'none',outline:'none'}} />\n        <div style={{padding:'16px',border:'2px solid #e2e8f0',borderRadius:'10px',overflow:'auto',lineHeight:1.7}} dangerouslySetInnerHTML={{ __html: parseMarkdown(md) }} />\n      </div>\n    </div>\n  );\n}\nReactDOM.createRoot(document.getElementById('root')).render(<App />);\n<\/script>\n</body>\n</html>",

    "name": "Color Palette Generator",
    "desc": "Generate harmonious color palettes with HSL manipulation and copy-to-clipboard.",
    "html": "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\">\n<script src=\"https://unpkg.com/react@18/umd/react.development.js\" crossorigin><\/script>\n<script src=\"https://unpkg.com/react-dom@18/umd/react-dom.development.js\" crossorigin><\/script>\n<script src=\"https://unpkg.com/@babel/standalone/babel.min.js\"><\/script>\n</head>\n<body>\n<div id=\"root\"></div>\n<script type=\"text/babel\">\nconst { useState } = React;\n\nfunction hslToHex(h, s, l) {\n  s /= 100; l /= 100;\n  const a = s * Math.min(l, 1 - l);\n  const f = n => { const k = (n + h / 30) % 12; return Math.round(255 * (l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1))); };\n  return `#${[f(0),f(8),f(4)].map(x => x.toString(16).padStart(2,'0')).join('')}`;\n}\n\nfunction generatePalette(baseHue, harmony) {\n  const offsets = {\n    analogous: [0, 30, 60, -30, -60],\n    complementary: [0, 180, 30, 210, 60],\n    triadic: [0, 120, 240, 60, 300],\n    monochromatic: [0, 0, 0, 0, 0],\n  };\n  return (offsets[harmony] || offsets.analogous).map((off, i) => {\n    const h = (baseHue + off) % 360;\n    const s = harmony === 'monochromatic' ? 70 - i * 10 : 70;\n    const l = harmony === 'monochromatic' ? 30 + i * 12 : 50 + (i % 2) * 15;\n    return { hsl: `hsl(${h}, ${s}%, ${l}%)`, hex: hslToHex(h, s, l) };\n  });\n}\n\nfunction App() {\n  const [hue, setHue] = useState(220);\n  const [harmony, setHarmony] = useState('analogous');\n  const [copied, setCopied] = useState('');\n  const palette = generatePalette(hue, harmony);\n\n  const copy = (hex) => { navigator.clipboard?.writeText(hex).catch(()=>{}); setCopied(hex); setTimeout(() => setCopied(''), 800); };\n\n  return (\n    <div style={{padding:'30px',fontFamily:'sans-serif',maxWidth:'500px',margin:'0 auto'}}>\n      <h2>🎨 Color Palette Generator</h2>\n      <div style={{marginBottom:'12px'}}>\n        <label>Base Hue: <strong>{hue}°</strong></label>\n        <input type=\"range\" min=\"0\" max=\"360\" value={hue} onChange={e => setHue(+e.target.value)} style={{width:'100%'}} />\n      </div>\n      <div style={{display:'flex',gap:'6px',marginBottom:'16px'}}>\n        {['analogous','complementary','triadic','monochromatic'].map(h => (\n          <button key={h} onClick={() => setHarmony(h)} style={{padding:'6px 12px',background: harmony===h ? '#0f172a' : '#e2e8f0',color: harmony===h ? '#fff' : '#333',border:'none',borderRadius:'6px',cursor:'pointer',fontSize:'0.8em',textTransform:'capitalize'}}>{h}</button>\n        ))}\n      </div>\n      <div style={{display:'flex',borderRadius:'12px',overflow:'hidden',height:'120px',marginBottom:'12px'}}>\n        {palette.map((c, i) => (\n          <div key={i} onClick={() => copy(c.hex)} style={{flex:1,background:c.hsl,cursor:'pointer',display:'flex',alignItems:'flex-end',justifyContent:'center',paddingBottom:'8px',transition:'flex 0.2s'}} title={`Click to copy ${c.hex}`}>\n            <span style={{background:'rgba(0,0,0,0.4)',color:'#fff',padding:'2px 8px',borderRadius:'4px',fontSize:'0.75em',fontFamily:'monospace'}}>{c.hex}</span>\n          </div>\n        ))}\n      </div>\n      {copied && <div style={{textAlign:'center',color:'#10b981',fontSize:'0.9em'}}>✅ Copied {copied}</div>}\n    </div>\n  );\n}\nReactDOM.createRoot(document.getElementById('root')).render(<App />);\n<\/script>\n</body>\n</html>",

    "desc": "Interactive quiz with score tracking, feedback, and progress bar — all in React.",
    "html": "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\">\n<script src=\"https://unpkg.com/react@18/umd/react.development.js\" crossorigin><\/script>\n<script src=\"https://unpkg.com/react-dom@18/umd/react-dom.development.js\" crossorigin><\/script>\n<script src=\"https://unpkg.com/@babel/standalone/babel.min.js\"><\/script>\n</head>\n<body>\n<div id=\"root\"></div>\n<script type=\"text/babel\">\nconst { useState } = React;\n\nconst QUESTIONS = [\n  { q: 'What hook adds state to function components?', options: ['useEffect', 'useState', 'useRef', 'useMemo'], answer: 1 },\n  { q: 'What does JSX stand for?', options: ['JavaScript XML', 'Java Syntax Extension', 'JSON Exchange', 'JavaScript XHR'], answer: 0 },\n  { q: 'Which creates a context?', options: ['useContext()', 'React.createContext()', 'new Context()', 'React.context()'], answer: 1 },\n  { q: 'What renders into a different DOM subtree?', options: ['Fragment', 'Suspense', 'Portal', 'Memo'], answer: 2 },\n  { q: 'Which hook memoizes a value?', options: ['useCallback', 'useState', 'useMemo', 'useRef'], answer: 2 },\n];\n\nfunction App() {\n  const [current, setCurrent] = useState(0);\n  const [score, setScore] = useState(0);\n  const [selected, setSelected] = useState(null);\n  const [finished, setFinished] = useState(false);\n\n  const handleAnswer = (i) => {\n    if (selected !== null) return;\n    setSelected(i);\n    if (i === QUESTIONS[current].answer) setScore(s => s + 1);\n    setTimeout(() => {\n      if (current + 1 < QUESTIONS.length) {\n        setCurrent(c => c + 1);\n        setSelected(null);\n      } else {\n        setFinished(true);\n      }\n    }, 1000);\n  };\n\n  const restart = () => { setCurrent(0); setScore(0); setSelected(null); setFinished(false); };\n  const progress = ((current + (finished ? 1 : 0)) / QUESTIONS.length) * 100;\n\n  if (finished) {\n    const pct = Math.round((score / QUESTIONS.length) * 100);\n    return (\n      <div style={{padding:'40px',fontFamily:'sans-serif',textAlign:'center',maxWidth:'400px',margin:'0 auto'}}>\n        <div style={{fontSize:'4em'}}>{pct >= 80 ? '🏆' : pct >= 60 ? '👍' : '📚'}</div>\n        <h2>Quiz Complete!</h2>\n        <p style={{fontSize:'1.5em',color:'#3b82f6'}}>Score: {score}/{QUESTIONS.length} ({pct}%)</p>\n        <button onClick={restart} style={{padding:'12px 28px',background:'#3b82f6',color:'#fff',border:'none',borderRadius:'10px',cursor:'pointer',fontSize:'1em',marginTop:'12px'}}>Retry</button>\n      </div>\n    );\n  }\n\n  const q = QUESTIONS[current];\n  return (\n    <div style={{padding:'30px',fontFamily:'sans-serif',maxWidth:'450px',margin:'0 auto'}}>\n      <div style={{display:'flex',justifyContent:'space-between',marginBottom:'8px',fontSize:'0.85em',color:'#64748b'}}>\n        <span>Question {current + 1}/{QUESTIONS.length}</span>\n        <span>Score: {score}</span>\n      </div>\n      <div style={{height:'6px',background:'#e2e8f0',borderRadius:'3px',marginBottom:'20px'}}>\n        <div style={{height:'100%',width:`${progress}%`,background:'linear-gradient(90deg,#3b82f6,#8b5cf6)',borderRadius:'3px',transition:'width 0.3s'}} />\n      </div>\n      <h2 style={{fontSize:'1.1em',marginBottom:'16px'}}>{q.q}</h2>\n      {q.options.map((opt, i) => {\n        let bg = '#f8fafc', border = '#e2e8f0', color = '#1e293b';\n        if (selected !== null) {\n          if (i === q.answer) { bg = '#dcfce7'; border = '#10b981'; color = '#166534'; }\n          else if (i === selected) { bg = '#fef2f2'; border = '#ef4444'; color = '#991b1b'; }\n        }\n        return (\n          <button key={i} onClick={() => handleAnswer(i)} style={{display:'block',width:'100%',padding:'14px',marginBottom:'8px',background:bg,border:`2px solid ${border}`,borderRadius:'10px',cursor: selected!==null?'default':'pointer',fontSize:'1em',color,textAlign:'left',transition:'all 0.2s'}}>\n            {opt} {selected !== null && i === q.answer && ' ✅'}{selected !== null && i === selected && i !== q.answer && ' ❌'}\n          </button>\n        );\n      })}\n    </div>\n  );\n}\nReactDOM.createRoot(document.getElementById('root')).render(<App />);\n<\/script>\n</body>\n</html>",

  {
    "cat": "Mini Projects",
    "name": "Expense Tracker",
    "desc": "Full CRUD expense tracker with useReducer, categories, and animated totals.",
    "html": "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\">\n<script src=\"https://unpkg.com/react@18/umd/react.development.js\" crossorigin><\/script>\n<script src=\"https://unpkg.com/react-dom@18/umd/react-dom.development.js\" crossorigin><\/script>\n<script src=\"https://unpkg.com/@babel/standalone/babel.min.js\"><\/script>\n</head>\n<body>\n<div id=\"root\"></div>\n<script type=\"text/babel\">\nconst { useState, useReducer } = React;\n\nconst cats = { food: '🍔', transport: '🚗', entertainment: '🎮', shopping: '🛍️', bills: '📄' };\n\nfunction reducer(state, action) {\n  switch (action.type) {\n    case 'ADD': return [...state, { id: Date.now(), ...action.expense }];\n    case 'DELETE': return state.filter(e => e.id !== action.id);\n    default: return state;\n  }\n}\n\nfunction App() {\n  const [expenses, dispatch] = useReducer(reducer, [\n    { id: 1, desc: 'Groceries', amount: 52.30, category: 'food' },\n    { id: 2, desc: 'Netflix', amount: 15.99, category: 'entertainment' },\n    { id: 3, desc: 'Gas', amount: 45.00, category: 'transport' },\n  ]);\n  const [form, setForm] = useState({ desc: '', amount: '', category: 'food' });\n\n  const total = expenses.reduce((s, e) => s + e.amount, 0);\n\n  const handleAdd = (e) => {\n    e.preventDefault();\n    if (!form.desc || !form.amount) return;\n    dispatch({ type: 'ADD', expense: { desc: form.desc, amount: parseFloat(form.amount), category: form.category } });\n    setForm({ desc: '', amount: '', category: 'food' });\n  };\n\n  return (\n    <div style={{padding:'30px',fontFamily:'sans-serif',maxWidth:'440px',margin:'0 auto'}}>\n      <h2>💰 Expense Tracker</h2>\n      <div style={{background:'linear-gradient(135deg,#3b82f6,#8b5cf6)',borderRadius:'12px',padding:'20px',color:'#fff',textAlign:'center',marginBottom:'16px'}}>\n        <div style={{fontSize:'0.85em',opacity:0.8}}>Total Expenses</div>\n        <div style={{fontSize:'2.5em',fontWeight:800}}>${total.toFixed(2)}</div>\n      </div>\n\n      <form onSubmit={handleAdd} style={{display:'flex',gap:'6px',marginBottom:'16px',flexWrap:'wrap'}}>\n        <input value={form.desc} onChange={e => setForm({...form, desc: e.target.value})} placeholder=\"Description\" style={{flex:2,minWidth:'120px',padding:'10px',border:'2px solid #e2e8f0',borderRadius:'8px'}} />\n        <input type=\"number\" step=\"0.01\" value={form.amount} onChange={e => setForm({...form, amount: e.target.value})} placeholder=\"$\" style={{flex:1,minWidth:'70px',padding:'10px',border:'2px solid #e2e8f0',borderRadius:'8px'}} />\n        <select value={form.category} onChange={e => setForm({...form, category: e.target.value})} style={{padding:'10px',border:'2px solid #e2e8f0',borderRadius:'8px'}}>\n          {Object.keys(cats).map(c => <option key={c} value={c}>{cats[c]} {c}</option>)}\n        </select>\n        <button type=\"submit\" style={{padding:'10px 16px',background:'#10b981',color:'#fff',border:'none',borderRadius:'8px',cursor:'pointer'}}>Add</button>\n      </form>\n\n      {expenses.length === 0 ? <p style={{textAlign:'center',color:'#94a3b8'}}>No expenses yet</p> : expenses.map(exp => (\n        <div key={exp.id} style={{display:'flex',alignItems:'center',gap:'10px',padding:'10px 14px',background:'#f8fafc',borderRadius:'8px',marginBottom:'6px',border:'1px solid #e2e8f0'}}>\n          <span style={{fontSize:'1.3em'}}>{cats[exp.category]}</span>\n          <div style={{flex:1}}>\n            <strong>{exp.desc}</strong>\n            <div style={{fontSize:'0.8em',color:'#64748b',textTransform:'capitalize'}}>{exp.category}</div>\n          </div>\n          <strong style={{color:'#ef4444'}}>-${exp.amount.toFixed(2)}</strong>\n          <button onClick={() => dispatch({ type: 'DELETE', id: exp.id })} style={{background:'none',border:'none',color:'#94a3b8',cursor:'pointer',fontSize:'1.2em'}}>×</button>\n        </div>\n      ))}\n    </div>\n  );\n}\nReactDOM.createRoot(document.getElementById('root')).render(<App />);\n<\/script>\n</body>\n</html>",

    "html": "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\">\n<script src=\"https://unpkg.com/react@18/umd/react.development.js\" crossorigin><\/script>\n<script src=\"https://unpkg.com/react-dom@18/umd/react-dom.development.js\" crossorigin><\/script>\n<script src=\"https://unpkg.com/@babel/standalone/babel.min.js\"><\/script>\n</head>\n<body>\n<div id=\"root\"></div>\n<script type=\"text/babel\">\nconst { useState, useEffect, useRef } = React;\n\nfunction AnimatedNumber({ value, duration = 1000, prefix = '', suffix = '' }) {\n  const [display, setDisplay] = useState(0);\n  const prevValue = useRef(0);\n\n  useEffect(() => {\n    const start = prevValue.current;\n    const end = value;\n    const startTime = performance.now();\n\n    function animate(now) {\n      const elapsed = now - startTime;\n      const progress = Math.min(elapsed / duration, 1);\n      // Ease out cubic\n      const eased = 1 - Math.pow(1 - progress, 3);\n      setDisplay(Math.round(start + (end - start) * eased));\n      if (progress < 1) requestAnimationFrame(animate);\n    }\n    requestAnimationFrame(animate);\n    prevValue.current = end;\n  }, [value, duration]);\n\n  return <span>{prefix}{display.toLocaleString()}{suffix}</span>;\n}\n\nfunction StatCard({ icon, label, value, color, prefix, suffix }) {\n  return (\n    <div style={{background:'#fff',border:'1px solid #e2e8f0',borderRadius:'12px',padding:'20px',textAlign:'center',borderTop:`4px solid ${color}`}}>\n      <div style={{fontSize:'2em',marginBottom:'8px'}}>{icon}</div>\n      <div style={{fontSize:'2em',fontWeight:800,color}}>\n        <AnimatedNumber value={value} prefix={prefix} suffix={suffix} />\n      </div>\n      <div style={{color:'#64748b',fontSize:'0.9em',marginTop:'4px'}}>{label}</div>\n    </div>\n  );\n}\n\nfunction App() {\n  const [multiplier, setMultiplier] = useState(1);\n\n  return (\n    <div style={{padding:'30px',fontFamily:'sans-serif',maxWidth:'500px',margin:'0 auto'}}>\n      <h2         'data.json': JSON.stringify([ { id: 1, name: "Alice", role: "Admin" }, { id: 2, name: "Bob", role: "User" } ], null, 2),
        'hello.txt': 'Hello, World from Node.js VFS!'
      };

      class EventEmitter {
        constructor() { this.events = {}; }
        on(event, listener) {
          if (!this.events[event]) this.events[event] = [];
          this.events[event].push(listener);
        }
        emit(event, ...args) {
          if (this.events[event]) this.events[event].forEach(l => l(...args));
        }
      }

      const fs = {
        readFileSync: function(path, encoding) {
          const clean = path.replace(/^\\.\\//, '');
          if (vfs[clean] !== undefined) return vfs[clean];
          throw new Error("ENOENT: no such file or directory, open '" + path + "'");
        },
        writeFileSync: function(path, data) {
          const clean = path.replace(/^\\.\\//, '');
          vfs[clean] = String(data);
          console.log("📝 [fs] Wrote to: " + path);
        },
        readdirSync: function(path) { return Object.keys(vfs); },
        existsSync: function(path) {
          const clean = path.replace(/^\\.\\//, '');
          return vfs[clean] !== undefined;
        }
      };

      const path = {
        join: (...args) => args.join('/').replace(/\\/\\//g, '/'),
        resolve: (...args) => '/' + args.join('/').replace(/\\/\\//g, '/'),
        extname: (p) => { const parts = p.split('.'); return parts.length > 1 ? '.' + parts.pop() : ''; },
        basename: (p) => p.split('/').pop()
      };

      const os = {
        platform: () => 'linux',
        release: () => '5.15.0',
        type: () => 'Linux',
        arch: () => 'x64',
        totalmem: () => 8589934592,
        freemem: () => 4294967296,
        cpus: () => Array(4).fill({ model: 'Virtual CPU', speed: 2500 }),
        homedir: () => '/home/node'
      };

      const http = {
        createServer: function(handler) {
          console.log("🌐 Server initialized via http.createServer()");
          return {
            listen: function(port, callback) {
              console.log("🚀 Server listening on http://localhost:" + port);
              if (callback) callback();
              setTimeout(() => {
                console.log("🔌 [Simulated HTTP] GET http://localhost:" + port + "/");
                const req = { url: '/', method: 'GET', headers: { 'user-agent': 'node-client' } };
                const res = {
                  writeHead: (status) => console.log("📥 [HTTP Status] " + status),
                  end: (body) => console.log("📄 [HTTP Response] " + (typeof body === 'object' ? JSON.stringify(body) : body))
                };
                if (handler) handler(req, res);
              }, 500);
            }
          };
        }
      };

      function express() {
        const routes = [];
        const app = {
          get: (path, handler) => routes.push({ method: 'GET', path, handler }),
          post: (path, handler) => routes.push({ method: 'POST', path, handler }),
          use: (middleware) => console.log("🛡️ [Express] Mounted middleware"),
          listen: (port, callback) => {
            console.log("🚀 Express App listening on http://localhost:" + port);
            if (callback) callback();
            setTimeout(() => {
              routes.forEach(route => {
                console.log("🔌 [Simulated Express] " + route.method + " " + route.path);
                const req = { params: {}, query: {}, body: {} };
                const res = {
                  send: (body) => console.log("📄 Response (send): " + (typeof body === 'object' ? JSON.stringify(body) : body)),
                  json: (body) => console.log("📄 Response (json): " + JSON.stringify(body, null, 2)),
                  status: (code) => { console.log("📥 Status: " + code); return res; }
                };
                route.handler(req, res);
              });
            }, 600);
          }
        };
        return app;
      }

      function require(mod) {
        if (mod === 'fs') return fs;
        if (mod === 'path') return path;
        if (mod === 'os') return os;
        if (mod === 'http') return http;
        if (mod === 'events') return { EventEmitter };
        if (mod === 'express') return express;
        throw new Error("Cannot find module '" + mod + "'");
      }

      const module = { exports: {} };
      const exports = module.exports;
      const __filename = '/home/node/index.js';
      const __dirname = '/home/node';
      const process = {
        env: { NODE_ENV: 'development', PORT: 3000 },
        argv: ['node', '/home/node/index.js'],
        cwd: () => '/home/node',
        version: 'v20.11.0',
        nextTick: (fn) => setTimeout(fn, 0)

      try {
        const fn = new Function('exports', 'require', 'module', '__filename', '__dirname', 'process', ${JSON.stringify(js)});

        console.error(e.name + ': ' + e.message);

        document.getElementById('previewFrame').srcdoc = terminalHtml;

      const consoleScript = '<script>' + `
      (function() {
        var m = ['log', 'warn', 'error', 'info'];
        m.forEach(function(method) {
          var o = console[method];
          console[method] = function() {
            var a = Array.prototype.slice.call(arguments);
            if (o) o.apply(console, a);
            var s = a.map(function(x) {
              try {
                if (x === null) return 'null';
                if (x === undefined) return 'undefined';
                if (typeof x === 'object') return JSON.stringify(x, null, 2);
                return String(x);
              } catch(e) { return String(x); }
            });
            parent.postMessage({ type: 'console', method: method, args: s }, '*');
          };
        });
        console.clear = function() {
          parent.postMessage({ type: 'console', method: 'clear', args: [] }, '*');
        };
        window.onerror = function(msg, u, line) {
          parent.postMessage({ type: 'console', method: 'error', args: ['Error: ' + msg + ' (line ' + line + ')'] }, '*');
          return true;
        };
        window.addEventListener('unhandledrejection', function(e) {
          parent.postMessage({ type: 'console', method: 'error', args: ['Unhandled: ' + (e.reason ? e.reason.message || e.reason : 'Unknown')] }, '*');
        });
      })();
      try {
        ${js}
      } catch(e) {
        console.error(e.message || e);
      }
    ` + '<' + '/script>';

      let finalDoc = '';
      if (html.includes('<!DOCTYPE html>') || html.includes('<html') || html.includes('<body')) {
        const styleTag = css.trim() ? `<style>${css}</style>` : '';
        if (html.includes('</head>')) {
          html = html.replace('</head>', styleTag + '\n</head>');
        } else if (html.includes('<body>')) {
          html = html.replace('<body>', '<body>\n' + styleTag);
        } else {
          html = styleTag + '\n' + html;
        }
        if (html.includes('</body>')) {
          finalDoc = html.replace('</body>', consoleScript + '\n</body>');
        } else {
          finalDoc = html + '\n' + consoleScript;
        }
      } else {
        finalDoc = `<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><style>body{font-family:system-ui,sans-serif}${css}</style></head><body>${html}${consoleScript}</body></html>`;
      }
      document.getElementById('previewFrame').srcdoc = finalDoc;

    window.addEventListener('message', e => { if (!e.data || e.data.type !== 'console') return; const { method, args } = e.data; if (method === 'clear') { document.getElementById('consoleOutput').innerHTML = ''; consoleCount = 0; updateBadge(); return } addEntry(method, args); consoleCount++; updateBadge() });
    function addEntry(m, a) { const o = document.getElementById('consoleOutput'); const d = document.createElement('div'); d.className = 'console-entry ' + m; const icons = { log: '›', info: 'ℹ', warn: '⚠', error: '✕' }; d.innerHTML = '<span class="console-entry-icon">' + (icons[m] || '›') + '</span><span class="console-entry-text">' + esc(a.join(' ')) + '</span>'; o.appendChild(d); o.scrollTop = o.scrollHeight }
    function updateBadge() { const b = document.getElementById('consoleBadge'); if (consoleCount > 0) { b.textContent = consoleCount > 99 ? '99+' : consoleCount; b.classList.add('visible') } else { b.classList.remove('visible') } }
    function clearConsole() { document.getElementById('consoleOutput').innerHTML = ''; consoleCount = 0; updateBadge() }
    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML }

    function initConsoleInput() {
      const inp = document.getElementById('consoleInput'); const hist = []; let hi = -1;
      inp.addEventListener('keydown', e => {
        if (e.key === 'Enter') { const c = inp.value.trim(); if (!c) return; hist.unshift(c); hi = -1; addEntry('log', ['› ' + c]); try { const f = document.getElementById('previewFrame'); const r = f.contentWindow.eval(c); if (r !== undefined) addEntry('log', [String(typeof r === 'object' ? JSON.stringify(r, null, 2) : r)]) } catch (err) { addEntry('error', [err.message]) } inp.value = '' }
        else if (e.key === 'ArrowUp') { if (hist.length > 0 && hi < hist.length - 1) { hi++; inp.value = hist[hi] } e.preventDefault() }
        else if (e.key === 'ArrowDown') { if (hi > 0) { hi--; inp.value = hist[hi] } else { hi = -1; inp.value = '' } e.preventDefault() }
      });
    }

    function initResizer() {
      const h = document.getElementById('resizeHandle'), ep = document.getElementById('editorPanel'), ws = document.querySelector('.main-panel');
      h.addEventListener('mousedown', e => { isResizing = true; h.classList.add('active'); document.body.style.cursor = 'col-resize'; document.body.style.userSelect = 'none'; e.preventDefault() });
      document.addEventListener('mousemove', e => { if (!isResizing) return; const r = ws.getBoundingClientRect(); const p = ((e.clientX - r.left) / r.width) * 100; ep.style.width = Math.max(20, Math.min(80, p)) + '%'; Object.values(editors).forEach(ed => ed.resize()) });
      document.addEventListener('mouseup', () => { if (isResizing) { isResizing = false; document.getElementById('resizeHandle').classList.remove('active'); document.body.style.cursor = ''; document.body.style.userSelect = '' } });
    }

    function initToolbar() {
      document.getElementById('runBtn').addEventListener('click', () => { clearConsole(); updatePreview() });
      const ab = document.getElementById('autoRunBtn');
      ab.addEventListener('click', () => { CONFIG.autoRun = !CONFIG.autoRun; ab.classList.toggle('active', CONFIG.autoRun); document.getElementById('autoRunStatus').textContent = CONFIG.autoRun ? '⚡ Auto-run ON' : '⚡ Auto-run OFF' });
      document.getElementById('resetBtn').addEventListener('click', () => { if (currentExample) loadExampleIntoEditors(currentExample) });
      document.getElementById('downloadBtn').addEventListener('click', downloadProject);
      document.getElementById('fontPlusBtn').addEventListener('click', () => changeFontSize(1));
      document.getElementById('fontMinusBtn').addEventListener('click', () => changeFontSize(-1));
      document.getElementById('themeBtn').addEventListener('click', toggleTheme);
      document.getElementById('clearConsoleBtn').addEventListener('click', clearConsole);
      document.getElementById('refreshBtn').addEventListener('click', () => { clearConsole(); updatePreview() });
      document.getElementById('fullscreenBtn').addEventListener('click', () => { const p = document.getElementById('outputPanel'); p.classList.toggle('fullscreen'); document.getElementById('fullscreenBtn').textContent = p.classList.contains('fullscreen') ? '✕' : '⛶' });
      document.getElementById('sidebarToggle').addEventListener('click', () => { document.getElementById('sidebar').classList.toggle('collapsed'); setTimeout(() => Object.values(editors).forEach(ed => ed.resize()), 300) });
    }
    function changeFontSize(d) { CONFIG.fontSize = Math.max(10, Math.min(28, CONFIG.fontSize + d)); Object.values(editors).forEach(ed => ed.setFontSize(CONFIG.fontSize)) }
    function toggleTheme() { CONFIG.theme = CONFIG.theme === 'dark' ? 'light' : 'dark'; if (CONFIG.theme === 'light') document.documentElement.setAttribute('data-theme', 'light'); else document.documentElement.removeAttribute('data-theme'); Object.values(editors).forEach(ed => ed.setTheme(CONFIG.theme === 'dark' ? 'ace/theme/one_dark' : 'ace/theme/chrome')); document.getElementById('themeBtn').textContent = CONFIG.theme === 'dark' ? '🌙' : '☀️' }
    function downloadProject() { const h = editors.html.getValue(), c = editors.css.getValue(), j = editors.js.getValue(); const f = '<!DOCTYPE html>\n<html>\n<head>\n<meta charset="UTF-8">\n<style>\n' + c + '\n</style>\n</head>\n<body>\n' + h + '\n<script>\n' + j + '\n<\/script>\n</body>\n</html>'; const b = new Blob([f], { type: 'text/html' }); const u = URL.createObjectURL(b); const a = document.createElement('a'); a.href = u; a.download = 'project.html'; a.click(); URL.revokeObjectURL(u) }

    function initShortcuts() {
      document.addEventListener('keydown', e => {
        if (e.ctrlKey && e.key === 'Enter') { e.preventDefault(); clearConsole(); updatePreview() }
        if (e.ctrlKey && e.key === 'd') { e.preventDefault(); CONFIG.autoRun = !CONFIG.autoRun; document.getElementById('autoRunBtn').classList.toggle('active', CONFIG.autoRun); document.getElementById('autoRunStatus').textContent = CONFIG.autoRun ? '⚡ Auto-run ON' : '⚡ Auto-run OFF' }
        if (e.ctrlKey && e.key === 's') { e.preventDefault(); document.getElementById('statusText').textContent = 'Saved!'; setTimeout(() => { document.getElementById('statusText').textContent = 'Ready' }, 1500) }
        if (e.ctrlKey && e.key === '1') { e.preventDefault(); switchEditorTab('html') }
        if (e.ctrlKey && e.key === '2') { e.preventDefault(); switchEditorTab('css') }
        if (e.ctrlKey && e.key === '3') { e.preventDefault(); switchEditorTab('javascript') }
        if (e.key === 'Escape') { document.getElementById('outputPanel').classList.remove('fullscreen'); document.getElementById('fullscreenBtn').textContent = '⛶' }
      });
    }

    function init() {
      buildExampleDB();
      initEditors();
      renderSidebar();
      initSearch();
      initTabs();
      initOutputTabs();
      initResizer();
      initToolbar();
      initConsoleInput();
      initShortcuts();
      updatePreview();
    }
    function checkAndInit() {
      if (typeof ace !== 'undefined') {
        init();
      } else {
        document.body.innerHTML = `
          <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#06080f;font-family:sans-serif;color:#e2e8f0;flex-direction:column;">
            <div style="font-size:3rem;margin-bottom:1rem">⚠️</div>
            <div style="font-size:1.1rem;font-weight:600">Failed to load editor</div>
            <div style="margin-top:.5rem;opacity:.6">Please check your internet connection and reload.</div>
          </div>
        `;
      }
    }

    if (document.readyState === 'complete' || document.readyState === 'interactive') {
      checkAndInit();
    } else {
      window.addEventListener('DOMContentLoaded', checkAndInit);
    }
