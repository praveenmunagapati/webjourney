<!DOCTYPE html>
<html lang="en">
2<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ultimate CSS Encyclopedia</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --sidebar-bg: #0f172a;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #0ea5e9;
            --border: #334155;
            --code-bg: #020617;
            --success: #4ade80;
            --danger: #f87171;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 300px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            height: 100vh;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            background: var(--card-bg);
        }

        .sidebar-header h1 {
            font-size: 1.2rem;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-box { padding: 1rem; border-bottom: 1px solid var(--border); }

        .search-box input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 0.9rem;
            outline: none;
            transition: border 0.2s;
        }

        .search-box input:focus { border-color: var(--accent); }

        .nav-links {
            flex: 1;
            overflow-y: auto;
            padding: 1rem 0;
        }

        .nav-category {
            padding: 0.75rem 1.5rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 700;
            margin-top: 0.5rem;
            letter-spacing: 1px;
        }

        .nav-link {
            display: block;
            padding: 0.5rem 1.5rem;
            color: var(--text);
            text-decoration: none;
            font-size: 0.85rem;
            font-family: 'Courier New', monospace;
            transition: background 0.2s, color 0.2s;
            border-left: 3px solid transparent;
        }

        .nav-link:hover {
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent);
            border-left-color: var(--accent);
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 2rem 3rem;
            scroll-behavior: smooth;
        }

        .page-header {
            margin-bottom: 3rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1.5rem;
        }

        .page-header h2 { font-size: 2rem; margin-bottom: 0.5rem; }
        .page-header p { color: var(--text-muted); }

        .category-header {
            font-size: 1.5rem;
            color: var(--accent);
            margin: 3rem 0 1.5rem 0;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--border);
            scroll-margin-top: 1rem;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 2rem;
            overflow: hidden;
            scroll-margin-top: 1rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .card-header {
            padding: 1rem 1.5rem;
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .prop-name {
            font-family: 'Courier New', monospace;
            font-size: 1.25rem;
            font-weight: bold;
            color: #f472b6;
        }

        .card-body {
            padding: 1.5rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        @media (max-width: 1024px) {
            .card-body { grid-template-columns: 1fr; }
            .sidebar { width: 240px; }
            .main-content { padding: 1.5rem; }
        }

        .info-section h4 {
            color: var(--accent);
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .info-section p, .info-section ul {
            margin-bottom: 1.5rem;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .info-section ul { padding-left: 1.25rem; }
        .info-section li { margin-bottom: 0.25rem; }
        .info-section code { 
            background: rgba(56, 189, 248, 0.1); 
            color: #38bdf8; 
            padding: 2px 6px; 
            border-radius: 4px; 
            font-size: 0.85rem; 
        }

        .code-block {
            background: var(--code-bg);
            padding: 1rem;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            color: #a5f3fc;
            overflow-x: auto;
            position: relative;
            border: 1px solid var(--border);
            white-space: pre-wrap;
        }

        .copy-btn {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            background: var(--border);
            border: none;
            color: var(--text);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .copy-btn:hover { background: var(--accent); color: var(--bg); }

        .preview-container { grid-column: 1 / -1; margin-top: 1rem; }

        .preview-window {
            background: #ffffff;
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            height: 160px;
            position: relative;
        }

        .preview-window iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #f8fafc;
        }

        .preview-label {
            position: absolute;
            top: 0;
            right: 0;
            background: var(--accent);
            color: var(--bg);
            font-size: 0.7rem;
            padding: 4px 10px;
            border-bottom-left-radius: 6px;
            font-weight: bold;
            z-index: 10;
            text-transform: uppercase;
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
    </style>
</head>

    </main>

        // ==========================================
        // RENDER ENGINE
        // ==========================================
        const mainContent = document.getElementById('contentContainer');
        const navLinks = document.getElementById('navLinks');

        function renderEncyclopedia() {
            // Group by category
            const categories = {};
            cssDB.forEach(item => {
                if (!categories[item.cat]) categories[item.cat] = [];
                categories[item.cat].push(item);
            });

            let navHTML = '';
            let contentHTML = '';

            for (const [cat, items] of Object.entries(categories)) {
                navHTML += `<div class="nav-category">${cat}</div>`;
                contentHTML += `<h3 class="category-header" id="cat-${cat.replace(/\s+/g, '')}">${cat}</h3>`;
                
                items.forEach(item => {
                    navHTML += `<a href="#${item.name}" class="nav-link">${item.name}</a>`;
                    
                    const valuesHTML = item.values.map(v => `<li><code>${v}</code></li>`).join('');
                    
                    // Encode for safe iframe injection
                    const safeCSS = encodeURIComponent(item.css);
                    const safeHTML = encodeURIComponent(item.html);

                    contentHTML += `
                        <div class="card" id="${item.name}" data-name="${item.name.toLowerCase()}" data-cat="${cat.toLowerCase()}" data-desc="${item.desc.toLowerCase()}">
                            <div class="card-header">
                                <span class="prop-name">${item.name}</span>
                            </div>
                            <div class="card-body">
                                <div class="info-section">
                                    <h4>Description</h4>
                                    <p>${item.desc}</p>
                                    <h4>Common Values</h4>
                                    <ul>${valuesHTML}</ul>
                                </div>
                                <div class="info-section">
                                    <h4>Syntax</h4>
                                    <div class="code-block">
                                        <button class="copy-btn" onclick="copyCode(this)">Copy</button>
                                        <pre>${item.syntax}</pre>
                                    </div>
                                </div>
                                <div class="preview-container">
                                    <h4 style="color: var(--accent); margin-bottom: 0.5rem; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px;">Live Preview</h4>
                                    <div class="preview-window">
                                        <span class="preview-label">Live Render</span>
                                        <iframe class="preview-frame" data-css="${safeCSS}" data-html="${safeHTML}"></iframe>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                });
            }

            navLinks.innerHTML = navHTML;
            mainContent.innerHTML = contentHTML;

            // Initialize Iframes Safely
            document.querySelectorAll('.preview-frame').forEach(iframe => {
                const css = decodeURIComponent(iframe.dataset.css);
                const html = decodeURIComponent(iframe.dataset.html);
                // Inject a complete, isolated HTML document into the iframe
                iframe.srcdoc = `<!DOCTYPE html><html><head><style>body{margin:0;padding:20px;font-family:system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100px;background:#f8fafc;}${css}</style></head><body>${html}</body></html>`;
            });
        }

        function copyCode(btn) {
            const code = btn.nextElementSibling.innerText;
            navigator.clipboard.writeText(code).then(() => {
                const originalText = btn.innerText;
                btn.innerText = "Copied!";
                btn.style.background = "var(--success)";
                btn.style.color = "#0f172a";
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.style.background = "";
                    btn.style.color = "";
                }, 2000);
            });
        }

        // Robust Search Logic
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            const cards = document.querySelectorAll('.card');
            const headers = document.querySelectorAll('.category-header');
            const navLinksAll = document.querySelectorAll('.nav-link');

            cards.forEach(card => {
                const name = card.dataset.name;
                const cat = card.dataset.cat;
                const desc = card.dataset.desc;
                const match = name.includes(query) || cat.includes(query) || desc.includes(query);
                card.style.display = match ? 'block' : 'none';
            });

            // Hide empty categories and their nav links
            headers.forEach(header => {
                const catId = header.id.replace('cat-', '').toLowerCase();
                const cardsInCat = document.querySelectorAll(`.card[data-cat="${catId}"]`);
                const visibleCards = Array.from(cardsInCat).filter(c => c.style.display !== 'none');
                
                const isCatVisible = visibleCards.length > 0;
                header.style.display = isCatVisible ? 'block' : 'none';
                
                // Sync sidebar
                const navCat = document.querySelector(`.nav-category`); // Simplified sync
            });
            
            // Better sidebar sync
            document.querySelectorAll('.nav-category').forEach((navCat, index) => {
                const catName = navCat.innerText.toLowerCase();
                const visibleCardsInNav = Array.from(cards).filter(c => c.dataset.cat === catName && c.style.display !== 'none');
                navCat.style.display = visibleCardsInNav.length > 0 ? 'block' : 'none';
                
                // Hide/show individual links
                let nextEl = navCat.nextElementSibling;
                while (nextEl && nextEl.classList.contains('nav-link')) {
                    const linkName = nextEl.innerText.toLowerCase();
                    const card = document.querySelector(`.card[data-name="${linkName}"]`);
                    if (card) {
                        nextEl.style.display = card.style.display !== 'none' ? 'block' : 'none';
                    }
                    nextEl = nextEl.nextElementSibling;
                }
            });
        });

        // Initialize
        renderEncyclopedia();
    </script>
</body>
</html>
