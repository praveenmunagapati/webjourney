<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Complete Reference Guide</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0914;
            --card-bg: #131024;
            --sidebar-bg: #0f0d1c;
            --text: #e2dff0;
            --text-muted: #8e89a5;
            --accent: #9b5de5;
            --accent-hover: #b583f7;
            --accent-2: #00f5d4;
            --border: #201c38;
            --code-bg: #07050d;
            --success: #10b981;
            --danger: #ef4444;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Navigation */
        .sidebar {
            width: 300px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            height: 100vh;
            flex-shrink: 0;
            z-index: 10;
        }

        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            background: var(--card-bg);
        }

        .sidebar-header h1 {
            font-size: 1.15rem;
            font-weight: 800;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-header h1 span {
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .search-box { padding: 1rem; border-bottom: 1px solid var(--border); }

        .search-box input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 0.85rem;
            outline: none;
            transition: all var(--transition);
        }

        .search-box input:focus { 
            border-color: var(--accent);
            box-shadow: 0 0 12px rgba(155, 93, 229, 0.2);
        }

        .nav-links {
            flex: 1;
            overflow-y: auto;
            padding: 1rem 0;
        }

        .nav-category {
            padding: 0.75rem 1.5rem;
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--accent-2);
            font-weight: 800;
            margin-top: 0.5rem;
            letter-spacing: 1.5px;
        }

        .nav-link {
            display: block;
            padding: 0.5rem 1.5rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            transition: all var(--transition);
            border-left: 3px solid transparent;
        }

        .nav-link:hover {
            color: #fff;
            background: rgba(155, 93, 229, 0.08);
            border-left-color: rgba(155, 93, 229, 0.4);
        }

        .nav-link.active {
            color: #fff;
            background: rgba(155, 93, 229, 0.15);
            border-left-color: var(--accent);
            font-weight: 600;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            scroll-behavior: smooth;
        }

        .page-header {
            margin-bottom: 2.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
            position: relative;
        }

        .page-header::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
        }

        .page-header h2 {
            font-size: 2rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 0.5rem;
        }

        .page-header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .category-header {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--accent-2);
            margin: 3rem 0 1.5rem 0;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
        }

        .category-header:first-of-type {
            margin-top: 1rem;
        }

        /* Card layout */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 2rem;
            overflow: hidden;
            transition: transform var(--transition), box-shadow var(--transition);
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4), 0 0 20px rgba(155, 93, 229, 0.08);
            border-color: rgba(155, 93, 229, 0.3);
        }

        .card-header {
            padding: 1.25rem 1.5rem;
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .prop-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
        }

        .card-body {
            padding: 1.5rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        @media (max-width: 1024px) {
            .card-body {
                grid-template-columns: 1fr;
            }
        }

        .info-section {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .info-section h4 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent);
            margin-bottom: -0.25rem;
        }

        .info-section p {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .info-section ul {
            list-style: none;
            padding-left: 0;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .info-section li code {
            background: var(--code-bg);
            color: var(--accent-2);
            padding: 3px 8px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            border: 1px solid rgba(0, 245, 212, 0.15);
        }

        .code-block {
            position: relative;
            background: var(--code-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            overflow-x: auto;
        }

        .code-block pre {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: #d8d3ec;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .copy-btn {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
            transition: all var(--transition);
        }

        .copy-btn:hover {
            color: #fff;
            background: var(--accent);
            border-color: var(--accent);
        }

        /* Live Preview window */
        .preview-container {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .preview-window {
            border: 1px solid var(--border);
            border-radius: 8px;
            background: #f8fafc;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100%;
            min-height: 220px;
            position: relative;
        }

        .preview-label {
            position: absolute;
            top: 0;
            right: 0;
            background: var(--accent);
            color: #fff;
            font-size: 0.65rem;
            padding: 3px 8px;
            border-bottom-left-radius: 6px;
            font-weight: 700;
            z-index: 10;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .preview-frame {
            border: none;
            width: 100%;
            height: 100%;
            min-height: 200px;
            background: #f8fafc;
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
    </style>
</head>

        // ==========================================
        // RENDER ENGINE
        // ==========================================
        const mainContent = document.getElementById('contentContainer');
        const navLinks = document.getElementById('navLinks');

        function renderEncyclopedia() {
            // Group by category
            const categories = {};
            bootstrapDB.forEach(item => {
                if (!categories[item.cat]) categories[item.cat] = [];
                categories[item.cat].push(item);
            });

            let navHTML = '';
            let contentHTML = '';

            for (const [cat, items] of Object.entries(categories)) {
                navHTML += `<div class="nav-category">${cat}</div>`;
                contentHTML += `<h3 class="category-header" id="cat-${cat.replace(/\s+/g, '')}">${cat}</h3>`;
                
                items.forEach(item => {
                    navHTML += `<a href="#${item.name.replace(/\s+/g, '')}" class="nav-link">${item.name}</a>`;
                    
                    const valuesHTML = item.values.map(v => `<li><code>${v}</code></li>`).join('');
                    
                    // Encode for safe iframe injection
                    const safeHTML = encodeURIComponent(item.html);

                    contentHTML += `
                        <div class="card" id="${item.name.replace(/\s+/g, '')}" data-name="${item.name.toLowerCase()}" data-cat="${cat.toLowerCase()}" data-desc="${item.desc.toLowerCase()}">
                            <div class="card-header">
                                <span class="prop-name">${item.name}</span>
                            </div>
                            <div class="card-body">
                                <div class="info-section">
                                    <h4>Description</h4>
                                    <p>${item.desc}</p>
                                    <h4>Classes Highlighted</h4>
                                    <ul>${valuesHTML}</ul>
                                </div>
                                <div class="info-section">
                                    <h4>Syntax / Structure</h4>
                                    <div class="code-block">
                                        <button class="copy-btn" onclick="copyCode(this)">Copy</button>
                                        <pre>${escapeHtml(item.syntax)}</pre>
                                    </div>
                                </div>
                                <div class="preview-container" style="grid-column: span 2;">
                                    <h4 style="color: var(--accent); margin-bottom: 0.5rem; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px;">Live Preview Panel</h4>
                                    <div class="preview-window">
                                        <span class="preview-label">Bootstrap Render</span>
                                        <iframe class="preview-frame" data-html="${safeHTML}"></iframe>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                });
            }

            navLinks.innerHTML = navHTML;
            mainContent.innerHTML = contentHTML;

            // Initialize Iframes Safely
            document.querySelectorAll('.preview-frame').forEach(iframe => {
                const html = decodeURIComponent(iframe.dataset.html);
                iframe.srcdoc = `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #f8fafc;
      font-family: system-ui, -apple-system, sans-serif;
    }
  </style>
</head>
<body>
  ${html}
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"><\/script>
  <script>
    // Initialize tooltips
    var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'))
    var tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) {
      return new bootstrap.Tooltip(tooltipTriggerEl)
    });
    // Initialize popovers
    var popoverTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="popover"]'))
    var popoverList = popoverTriggerList.map(function (popoverTriggerEl) {
      return new bootstrap.Popover(popoverTriggerEl)
    });
  <\/script>
</body>
</html>`;
            });

            // Smooth active navigation highlight
            const links = document.querySelectorAll('.nav-link');
            const cards = document.querySelectorAll('.card');

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const id = entry.target.getAttribute('id');
                        links.forEach(link => {
                            if (link.getAttribute('href') === '#' + id) {
                                link.classList.add('active');
                            } else {
                                link.classList.remove('active');
                            }
                        });
                    }
                });
            }, {
                root: null,
                rootMargin: '-10% 0px -80% 0px',
                threshold: 0
            });

            cards.forEach(card => observer.observe(card));
        }

        function escapeHtml(string) {
            return String(string).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function copyCode(btn) {
            const code = btn.nextElementSibling.innerText;
            navigator.clipboard.writeText(code).then(() => {
                const originalText = btn.innerText;
                btn.innerText = "Copied!";
                btn.style.background = "var(--success)";
                btn.style.color = "#000";
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.style.background = "";
                    btn.style.color = "";
                }, 2000);
            });
        }

        // Search Logic
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            const cards = document.querySelectorAll('.card');
            const headers = document.querySelectorAll('.category-header');

            cards.forEach(card => {
                const name = card.dataset.name;
                const cat = card.dataset.cat;
                const desc = card.dataset.desc;
                const match = name.includes(query) || cat.includes(query) || desc.includes(query);
                card.style.display = match ? 'block' : 'none';
            });

            // Hide empty categories and their nav links
            headers.forEach(header => {
                const catId = header.id.replace('cat-', '').toLowerCase();
                const cardsInCat = document.querySelectorAll(`.card[data-cat="${catId}"]`);
                const visibleCards = Array.from(cardsInCat).filter(c => c.style.display !== 'none');
                
                const isCatVisible = visibleCards.length > 0;
                header.style.display = isCatVisible ? 'block' : 'none';
            });
            
            // Better sidebar category sync
            document.querySelectorAll('.nav-category').forEach((navCat) => {
                const catName = navCat.innerText.toLowerCase();
                const visibleCardsInNav = Array.from(cards).filter(c => c.dataset.cat === catName && c.style.display !== 'none');
                navCat.style.display = visibleCardsInNav.length > 0 ? 'block' : 'none';
                
                // Hide/show individual links
                let nextEl = navCat.nextElementSibling;
                while (nextEl && nextEl.classList.contains('nav-link')) {
                    const linkName = nextEl.innerText.toLowerCase();
                    const card = document.querySelector(`.card[data-name="${linkName}"]`);
                    if (card) {
                        nextEl.style.display = card.style.display !== 'none' ? 'block' : 'none';
                    }
                    nextEl = nextEl.nextElementSibling;
                }
            });
        });

        // Initialize
        renderEncyclopedia();
    </script>
</body>
</html>
