<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JavaScript Interactive Encyclopedia</title>
<style>
  :root {
    --bg: #0a0e1a;
    --panel: #131827;
    --panel-2: #1a2033;
    --border: #2a3349;
    --text: #e4e8f0;
    --muted: #8892a8;
    --accent: #7c3aed;
    --accent-2: #06b6d4;
    --success: #10b981;
    --warning: #f59e0b;
    --error: #ef4444;
    --pink: #ec4899;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--text);
    height: 100vh; overflow: hidden;
    display: grid; grid-template-columns: 280px 1fr;
  }
  /* SIDEBAR */
  .sidebar {
    background: var(--panel); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .logo {
    padding: 18px 20px; border-bottom: 1px solid var(--border);
    background: linear-gradient(135deg, var(--accent), var(--pink));
    font-weight: 800; font-size: 18px;
    display: flex; align-items: center; gap: 10px;
  }
  .logo span { font-size: 22px; }
  .search {
    padding: 12px; border-bottom: 1px solid var(--border);
  }
  .search input {
    width: 100%; padding: 10px 14px; background: var(--bg);
    border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-size: 13px; outline: none;
    transition: border 0.2s;
  }
  .search input:focus { border-color: var(--accent); }
  .nav { flex: 1; overflow-y: auto; padding: 8px 0; }
  .nav-group { margin-bottom: 8px; }
  .nav-title {
    padding: 8px 20px; font-size: 11px; text-transform: uppercase;
    letter-spacing: 1.5px; color: var(--muted); font-weight: 700;
  }
  .nav-item {
    padding: 8px 20px; font-size: 13px; cursor: pointer;
    color: var(--text); border-left: 3px solid transparent;
    transition: all 0.15s; display: flex; align-items: center; gap: 8px;
  }
  .nav-item:hover { background: rgba(124, 58, 237, 0.1); color: #fff; }
  .nav-item.active {
    background: rgba(124, 58, 237, 0.15); color: #fff;
    border-left-color: var(--accent);
  }
  .nav-item .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent); opacity: 0.5;
  }
  .nav-item.active .dot { opacity: 1; box-shadow: 0 0 8px var(--accent); }
  /* MAIN */
  .main { display: flex; flex-direction: column; overflow: hidden; }
  .header {
    padding: 16px 24px; border-bottom: 1px solid var(--border);
    background: var(--panel);
    display: flex; align-items: center; justify-content: space-between;
  }
  .header h2 { font-size: 18px; font-weight: 700; }
  .header .subtitle { color: var(--muted); font-size: 13px; margin-top: 2px; }
  .tabs { display: flex; gap: 4px; background: var(--bg); padding: 4px; border-radius: 8px; }
  .tab {
    padding: 8px 16px; font-size: 13px; cursor: pointer;
    color: var(--muted); border-radius: 6px; font-weight: 500;
    transition: all 0.15s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { background: var(--accent); color: #fff; }
  .content { flex: 1; overflow: hidden; position: relative; }
  /* SPLIT VIEW */
  .split {
    display: grid; grid-template-columns: 1fr 1fr;
    height: 100%;
  }
  .code-pane {
    display: flex; flex-direction: column;
    border-right: 1px solid var(--border);
    background: #0d1117;
  }
  .code-header {
    padding: 10px 16px; background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12px; color: var(--muted); font-weight: 600;
  }
  .run-btn {
    padding: 6px 14px; background: var(--success); color: #fff;
    border: none; border-radius: 6px; font-size: 12px;
    cursor: pointer; font-weight: 600;
    display: flex; align-items: center; gap: 6px;
    transition: all 0.15s;
  }
  .run-btn:hover { background: #059669; transform: translateY(-1px); }
  .editor-wrap { flex: 1; position: relative; overflow: hidden; }
  .editor {
    width: 100%; height: 100%; background: transparent;
    color: transparent; caret-color: #fff;
    font-family: 'SF Mono', Monaco, Consolas, monospace;
    font-size: 13px; line-height: 1.6; padding: 16px;
    border: none; outline: none; resize: none;
    position: absolute; top: 0; left: 0;
    white-space: pre; overflow: auto;
    z-index: 2; tab-size: 2;
  }
  .highlight {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    font-family: 'SF Mono', Monaco, Consolas, monospace;
    font-size: 13px; line-height: 1.6; padding: 16px;
    pointer-events: none; overflow: auto;
    white-space: pre; color: #c9d1d9; z-index: 1;
  }
  .highlight .kw { color: #ff7b72; }
  .highlight .str { color: #a5d6ff; }
  .highlight .num { color: #79c0ff; }
  .highlight .fn { color: #d2a8ff; }
  .highlight .cm { color: #8b949e; font-style: italic; }
  .highlight .op { color: #ff7b72; }
  .console-pane {
    display: flex; flex-direction: column; background: var(--bg); height: 100%;
  }
  .console-header {
    padding: 10px 16px; background: var(--panel);
    border-bottom: 1px solid var(--border);
    font-size: 12px; color: var(--muted); font-weight: 600;
    display: flex; justify-content: space-between; align-items: center;
    flex-shrink: 0;
  }
  .clear-btn {
    padding: 4px 10px; background: var(--border); color: var(--text);
    border: none; border-radius: 4px; font-size: 11px;
    cursor: pointer; font-weight: 500;
  }
  .clear-btn:hover { background: var(--accent); }
  .console {
    flex: 1; overflow-y: auto; overflow-x: hidden; padding: 12px 16px;
    font-family: 'SF Mono', Monaco, Consolas, monospace;
    font-size: 12px; line-height: 1.7;
  }
  .log-entry {
    padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.03);
    display: flex; gap: 8px; align-items: flex-start;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateX(-5px); } to { opacity: 1; } }
  .log-entry .icon { flex-shrink: 0; width: 16px; }
  .log-entry.log { color: #e4e8f0; }
  .log-entry.error { color: var(--error); }
  .log-entry.warn { color: var(--warning); }
  .log-entry.info { color: var(--accent-2); }
  .log-entry.result { color: var(--success); }
  /* DESCRIPTION */
  .desc {
    padding: 16px 24px; background: var(--panel);
    border-bottom: 1px solid var(--border);
    font-size: 14px; color: var(--muted); line-height: 1.6;
    max-height: 120px; overflow-y: auto;
  }
  .desc strong { color: var(--text); }
  .desc code {
    background: rgba(124, 58, 237, 0.15); color: #d2a8ff;
    padding: 2px 6px; border-radius: 4px; font-size: 12px;
  }
  /* SHOWCASE */
  .showcase {
    height: 100%; overflow-y: auto; padding: 24px;
    background: var(--bg);
  }
  .showcase-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 20px;
  }
  .demo-card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden;
    transition: all 0.2s;
  }
  .demo-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(124, 58, 237, 0.2);
    border-color: var(--accent);
  }
  .demo-header {
    padding: 14px 18px; background: var(--panel-2);
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .demo-title { font-weight: 700; font-size: 14px; }
  .demo-badge {
    padding: 3px 8px; background: rgba(124, 58, 237, 0.2);
    color: #d2a8ff; border-radius: 4px; font-size: 10px;
    font-weight: 600; text-transform: uppercase;
  }
  .demo-body { padding: 16px; position: relative; }
  .demo-canvas {
    width: 100%; height: 220px; background: #000;
    border-radius: 8px; display: block;
  }
  .demo-controls {
    margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap;
  }
  .demo-btn {
    padding: 6px 12px; background: var(--border); color: var(--text);
    border: none; border-radius: 6px; font-size: 12px;
    cursor: pointer; font-weight: 500; transition: all 0.15s;
  }
  .demo-btn:hover { background: var(--accent); }
  .demo-btn.active { background: var(--accent); }
  .demo-info { font-size: 12px; color: var(--muted); margin-top: 10px; line-height: 1.5; }
  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="logo"><span>⚡</span> JS Encyclopedia</div>
  <div class="search">
    <input type="text" id="search" placeholder="Search concepts...">
  </div>
  <nav class="nav" id="nav"></nav>
</aside>

<main class="main">
  <div class="header">
    <div>
      <h2 id="pageTitle">Welcome</h2>
      <div class="subtitle" id="pageSubtitle">Master JavaScript interactively</div>
    </div>
    <div class="tabs">
      <div class="tab active" data-tab="learn">Learn</div>
      <div class="tab" data-tab="showcase">✨ Showcase</div>
    </div>
  </div>
  <div class="content">
    <div id="learnView" class="split">
      <div class="code-pane">
        <div class="desc" id="desc">Click any concept in the sidebar to start learning interactively.</div>
        <div class="code-header">
          <span>📝 Live Editor</span>
          <button class="run-btn" id="runBtn">▶ Run</button>
        </div>
        <div class="editor-wrap">
          <pre class="highlight" id="highlight"></pre>
          <textarea class="editor" id="editor" spellcheck="false">// Welcome to the Interactive JavaScript Encyclopedia
// Click any topic on the left, then hit Run

const greeting = "Hello, JavaScript!";
console.log(greeting);
console.log("Try editing this code!");

// JavaScript powers the modern web.
// This encyclopedia has 60+ concepts with live demos.</textarea>
        </div>
      </div>
      <div class="console-pane">
        <div class="console-header">
          <span>📟 Console Output</span>
          <button class="clear-btn" id="clearBtn">Clear</button>
        </div>
        <div class="console" id="console"></div>
      </div>
    </div>
    <div id="showcaseView" class="showcase" style="display:none">
      <div class="showcase-grid" id="showcaseGrid"></div>
    </div>
  </div>
</main>

<script>
// ============================================================
// THE JAVASCRIPT DATABASE - 60+ Interactive Concepts
// ============================================================
const concepts = [
  // FUNDAMENTALS
  { cat: "Fundamentals", name: "Variables", desc: "<strong>let</strong>, <strong>const</strong>, and <strong>var</strong> declare variables. <code>const</code> cannot be reassigned. <code>let</code> is block-scoped.",
    code: `// Variables and types
let age = 25;           // Can be reassigned
const name = "Alice";   // Cannot be reassigned
var legacy = "old";     // Function-scoped (avoid)

console.log("Name:", name);
console.log("Age:", age);
console.log("Type of age:", typeof age);
console.log("Type of name:", typeof name);

age = 26;
console.log("New age:", age);` },

  { cat: "Fundamentals", name: "Data Types", desc: "JavaScript has <strong>7 primitive types</strong>: string, number, boolean, null, undefined, symbol, bigint — plus objects.",
    code: `// The 7 primitive types
const str = "hello";
const num = 42;
const bool = true;
const empty = null;
const undef = undefined;
const sym = Symbol("id");
const big = 9007199254740991n;

console.log("String:", typeof str, str);
console.log("Number:", typeof num, num);
console.log("Boolean:", typeof bool, bool);
console.log("Null:", typeof null, "(it's 'object'!)");
console.log("Undefined:", typeof undef);
console.log("Symbol:", typeof sym);
console.log("BigInt:", typeof big);` },

  { cat: "Fundamentals", name: "Operators", desc: "Arithmetic, comparison, logical, and assignment operators. Always use <code>===</code> over <code>==</code>.",
    code: `// Arithmetic
console.log("10 + 3 =", 10 + 3);
console.log("10 / 3 =", 10 / 3);
console.log("10 % 3 =", 10 % 3);
console.log("10 ** 3 =", 10 ** 3);

// Comparison (strict vs loose)
console.log("\\nComparison:");
console.log("5 === '5':", 5 === '5');  // false
console.log("5 == '5':", 5 == '5');   // true (avoid)

// Logical
const a = true, b = false;
console.log("\\nLogical:");
console.log("a && b:", a && b);
console.log("a || b:", a || b);
console.log("!a:", !a);

// Nullish coalescing
const user = null;
console.log("\\nuser ?? 'guest':", user ?? 'guest');` },

  { cat: "Fundamentals", name: "Strings", desc: "Strings are immutable sequences. Template literals (<code>`...${}`</code>) enable interpolation and multi-line.",
    code: `const name = "World";
const greeting = \`Hello, \${name}!\`;
console.log(greeting);

// Common methods
const str = "JavaScript";
console.log("Length:", str.length);
console.log("Upper:", str.toUpperCase());
console.log("Slice:", str.slice(0, 4));
console.log("Replace:", str.replace("Java", "Type"));
console.log("Includes:", str.includes("Script"));
console.log("Split:", "a,b,c".split(","));
console.log("Trim:", "  hello  ".trim());
console.log("Repeat:", "ha".repeat(3));` },

  { cat: "Fundamentals", name: "Template Literals", desc: "Backtick strings support <strong>interpolation</strong>, <strong>multi-line</strong>, and <strong>tagged templates</strong>.",
    code: `const user = { name: "Bob", age: 30 };

// Interpolation
console.log(\`User: \${user.name}, Age: \${user.age}\`);

// Expressions inside
console.log(\`In 5 years: \${user.age + 5}\`);

// Multi-line
const html = \`
  <div class="card">
    <h1>\${user.name}</h1>
    <p>Age: \${user.age}</p>
  </div>
\`;
console.log(html);

// Tagged template
function highlight(strings, ...values) {
  return strings.reduce((result, str, i) => 
    result + str + (values[i] ? \`【\${values[i]}】\` : ''), '');
}
console.log(highlight\`Hello \${user.name}!\`);` },

  { cat: "Fundamentals", name: "Numbers & Math", desc: "All numbers are 64-bit floats. The <code>Math</code> object provides constants and functions.",
    code: `console.log("PI:", Math.PI);
console.log("E:", Math.E);
console.log("sqrt(16):", Math.sqrt(16));
console.log("pow(2, 8):", Math.pow(2, 8));
console.log("max(1,5,3):", Math.max(1, 5, 3));
console.log("min(1,5,3):", Math.min(1, 5, 3));
console.log("floor(4.7):", Math.floor(4.7));
console.log("ceil(4.1):", Math.ceil(4.1));
console.log("round(4.5):", Math.round(4.5));
console.log("random:", Math.random());
console.log("abs(-5):", Math.abs(-5));
console.log("sin(π/2):", Math.sin(Math.PI/2));

// Precision issues
console.log("\\n0.1 + 0.2 =", 0.1 + 0.2);` },

  // CONTROL FLOW
  { cat: "Control Flow", name: "If/Else", desc: "Conditional branching. Use <code>else if</code> for multiple branches, <strong>ternary</strong> for simple cases.",
    code: `const score = 85;

if (score >= 90) {
  console.log("Grade: A");
} else if (score >= 80) {
  console.log("Grade: B");
} else if (score >= 70) {
  console.log("Grade: C");
} else {
  console.log("Grade: F");
}

// Ternary operator
const status = score >= 60 ? "Pass" : "Fail";
console.log("Status:", status);

// Nullish and optional chaining
const user = { name: "Alice" };
console.log("Name:", user?.name ?? "Guest");
console.log("Age:", user?.age ?? "Unknown");` },

  { cat: "Control Flow", name: "Switch", desc: "Multi-way branching based on value matching. Don't forget <code>break</code>!",
    code: `const day = "Wednesday";

switch (day) {
  case "Monday":
    console.log("Start of week");
    break;
  case "Tuesday":
  case "Wednesday":
  case "Thursday":
    console.log("Midweek grind");
    break;
  case "Friday":
    console.log("TGIF!");
    break;
  case "Saturday":
  case "Sunday":
    console.log("Weekend 🎉");
    break;
  default:
    console.log("Unknown day");
}

// Switch with expressions
const getGreeting = (hour) => {
  switch (true) {
    case hour < 12: return "Morning";
    case hour < 18: return "Afternoon";
    default: return "Evening";
  }
};
console.log(getGreeting(14));` },

  { cat: "Control Flow", name: "For Loops", desc: "Classic <code>for</code>, <code>for...of</code> (values), and <code>for...in</code> (keys) loops.",
    code: `// Classic for
for (let i = 1; i <= 5; i++) {
  console.log("i =", i);
}

// for...of (iterates values)
const fruits = ["🍎", "🍌", "🍇"];
console.log("\\nFruits:");
for (const fruit of fruits) {
  console.log(" -", fruit);
}

// for...in (iterates keys)
const user = { name: "Alice", age: 30, city: "NYC" };
console.log("\\nUser properties:");
for (const key in user) {
  console.log(\`  \${key}: \${user[key]}\`);
}

// Loop with entries
console.log("\\nEntries:");
for (const [key, value] of Object.entries(user)) {
  console.log(\`  \${key} => \${value}\`);
}` },

  { cat: "Control Flow", name: "While Loops", desc: "<code>while</code> runs while condition is true. <code>do...while</code> runs at least once.",
    code: `// While
let count = 0;
while (count < 5) {
  console.log("Count:", count);
  count++;
}

// Do-while (runs at least once)
let n = 10;
do {
  console.log("n =", n);
  n *= 2;
} while (n < 100);

// Break and continue
console.log("\\nEven numbers < 10:");
for (let i = 0; i < 20; i++) {
  if (i >= 10) break;
  if (i % 2 !== 0) continue;
  console.log(" ", i);
}` },

  // FUNCTIONS
  { cat: "Functions", name: "Function Basics", desc: "Functions are first-class citizens. They can be <strong>declared</strong>, <strong>expressed</strong>, or <strong>arrowed</strong>.",
    code: `// Function declaration (hoisted)
function greet(name) {
  return \`Hello, \${name}!\`;
}
console.log(greet("Alice"));

// Function expression
const add = function(a, b) {
  return a + b;
};
console.log("2 + 3 =", add(2, 3));

// Arrow function
const multiply = (a, b) => a * b;
console.log("4 * 5 =", multiply(4, 5));

// Default parameters
const power = (base, exp = 2) => base ** exp;
console.log("3² =", power(3));
console.log("2⁸ =", power(2, 8));

// Rest parameters
const sum = (...nums) => nums.reduce((a, b) => a + b, 0);
console.log("Sum:", sum(1, 2, 3, 4, 5));` },

  { cat: "Functions", name: "Closures", desc: "A function that <strong>remembers</strong> its outer scope even after that scope has finished executing. Powerful and magical.",
    code: `// Classic closure: counter
function makeCounter() {
  let count = 0;
  return {
    increment: () => ++count,
    decrement: () => --count,
    getCount: () => count
  };
}

const counter = makeCounter();
console.log(counter.increment()); // 1
console.log(counter.increment()); // 2
console.log(counter.increment()); // 3
console.log(counter.decrement()); // 2
console.log("Final:", counter.getCount());

// Closure in loops
console.log("\\nClosures in loops:");
const funcs = [];
for (let i = 0; i < 3; i++) {
  funcs.push(() => console.log("i =", i));
}
funcs.forEach(f => f()); // 0, 1, 2

// Private variables
function createWallet(initial) {
  let balance = initial;
  return {
    deposit: (amt) => balance += amt,
    getBalance: () => balance
  };
}
const wallet = createWallet(100);
wallet.deposit(50);
console.log("Balance:", wallet.getBalance());` },

  { cat: "Functions", name: "Callbacks", desc: "Functions passed as arguments to be executed later. The foundation of async JavaScript.",
    code: `// Basic callback
function fetchData(callback) {
  console.log("Fetching...");
  setTimeout(() => {
    callback({ data: "Hello from server!" });
  }, 100);
}

fetchData((result) => {
  console.log("Received:", result.data);
});

// Array methods use callbacks
const numbers = [1, 2, 3, 4, 5];

const doubled = numbers.map(n => n * 2);
console.log("\\nDoubled:", doubled);

const evens = numbers.filter(n => n % 2 === 0);
console.log("Evens:", evens);

const sum = numbers.reduce((acc, n) => acc + n, 0);
console.log("Sum:", sum);

// Callback hell (avoid this!)
// setTimeout(() => {
//   setTimeout(() => {
//     setTimeout(() => { ... }
//   }, 1000);
// }, 1000);` },

  { cat: "Functions", name: "Higher-Order Functions", desc: "Functions that take or return other functions. The heart of functional programming in JS.",
    code: `// Function that returns a function
function multiplier(factor) {
  return (number) => number * factor;
}

const double = multiplier(2);
const triple = multiplier(3);
console.log("double(5):", double(5));
console.log("triple(5):", triple(5));

// Function that takes a function
function applyOperation(a, b, operation) {
  return operation(a, b);
}

console.log("\\nAdd:", applyOperation(5, 3, (a, b) => a + b));
console.log("Mul:", applyOperation(5, 3, (a, b) => a * b));

// Compose functions
const compose = (...fns) => (x) => 
  fns.reduceRight((acc, fn) => fn(acc), x);

const addOne = x => x + 1;
const timesTwo = x => x * 2;
const square = x => x ** 2;

const transform = compose(square, timesTwo, addOne);
console.log("\\ncompose(3):", transform(3)); // (3+1)*2 = 8, 8² = 64` },

  { cat: "Functions", name: "this Keyword", desc: "<code>this</code> refers to the execution context. Arrow functions <strong>don't</strong> have their own <code>this</code>.",
    code: `// Object method
const user = {
  name: "Alice",
  greet() {
    return \`Hi, I'm \${this.name}\`;
  },
  // Arrow doesn't bind this
  greetArrow: () => \`Hi, I'm \${this?.name}\`
};

console.log(user.greet());
console.log("Arrow:", user.greetArrow()); // undefined

// Call, apply, bind
function introduce(role) {
  return \`I'm \${this.name}, a \${role}\`;
}

const person = { name: "Bob" };
console.log("\\nCall:", introduce.call(person, "dev"));

// Syntax highlighter
function highlightCode(code) {
  // 1. Escape raw HTML special characters first to prevent layout breakages
  let html = code
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');

  // 2. Master regex pattern: Each token type occupies a specific capture group
  const pattern = /(\/\/.*)|(\/\*[\s\S]*?\*\/)|((["'`])(?:(?!\4|\\).|\\.)*\4)|\b(const|let|var|function|class|extends|return|if|else|for|while|do|switch|case|break|continue|try|catch|finally|throw|new|typeof|instanceof|async|await|yield|import|export|from|default|this|super|of|in|true|false|null|undefined|NaN|Infinity)\b|\b(console|Math|Array|Object|Promise|Map|Set|Symbol|Proxy|Reflect|Error|Date|JSON)\b|\b(\d+\.?\d*)\b|\b([A-Za-z_$][\w$]*)(?=\s*\()/g;

  // 3. Process tokens in a single linear pass
  return html.replace(pattern, (match, p1, p2, p3, p4, p5, p6, p7, p8) => {
    if (p1 || p2) return `<span class="cm">${match}</span>`; // Comments (Green/Gray)
    if (p3) return `<span class="str">${match}</span>`;        // Strings (Blue)
    if (p5) return `<span class="kw">${match}</span>`;         // Keywords & Literals (Red)
    if (p6 || p8) return `<span class="fn">${match}</span>`;   // Native Objects & Functions (Purple)
    if (p7) return `<span class="num">${match}</span>`;        // Numbers (Light Blue)
    return match;
  });
}

function updateHighlight() {
  highlight.innerHTML = highlightCode(editor.value) + '\n';
}

editor.addEventListener('input', updateHighlight);
editor.addEventListener('scroll', () => { highlight.scrollTop = editor.scrollTop; highlight.scrollLeft = editor.scrollLeft; });
updateHighlight();

// Console logger
function logToConsole(type, ...args) {
  const entry = document.createElement('div');
  entry.className = `log-entry ${type}`;
  const icons = { log: '›', error: '✕', warn: '⚠', info: 'ℹ', result: '←' };
  entry.innerHTML = `<span class="icon">${icons[type] || '›'}</span><span>${args.map(a => {
    if (typeof a === 'object') {
      try { return '<span style="color:#a5d6ff">' + JSON.stringify(a, null, 2).replace(/\n/g, '<br>').replace(/ /g, '&nbsp;') + '</span>'; }
      catch { return String(a); }
    }
    if (typeof a === 'string') return a.replace(/</g,'&lt;').replace(/\n/g,'<br>');
    return String(a);
  }).join(' ')}</span>`;
  consoleEl.appendChild(entry);
  consoleEl.scrollTop = consoleEl.scrollHeight;
}

// Run code
document.getElementById('runBtn').addEventListener('click', () => {
  consoleEl.innerHTML = '';
  logToConsole('info', '▶ Running code...');
  
  const mockConsole = {
    log: (...args) => logToConsole('log', ...args),
    error: (...args) => logToConsole('error', ...args),
    warn: (...args) => logToConsole('warn', ...args),
    info: (...args) => logToConsole('info', ...args),
    table: (data) => logToConsole('log', data)
  };
  
  try {
    const code = editor.value;
    const fn = new Function('console', code);
    const result = fn(mockConsole);
    if (result !== undefined) logToConsole('result', result);
    logToConsole('info', '✓ Execution complete');
  } catch (e) {
    logToConsole('error', `${e.name}: ${e.message}`);
  }
});

document.getElementById('clearBtn').addEventListener('click', () => { consoleEl.innerHTML = ''; });

// Nav clicks
nav.addEventListener('click', (e) => {
  const item = e.target.closest('.nav-item');
  if (!item) return;
  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  item.classList.add('active');
  
  // Switch to learn tab
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector('.tab[data-tab="learn"]').classList.add('active');
  document.getElementById('learnView').style.display = 'grid';
  document.getElementById('showcaseView').style.display = 'none';
  
  if (item.dataset.welcome) {
    pageTitle.textContent = 'Welcome';
    pageSubtitle.textContent = 'Master JavaScript interactively';
    desc.innerHTML = 'Click any topic on the left to start. Every concept has a working example you can edit and run!';
    editor.value = `// Welcome to the Interactive JavaScript Encyclopedia
// This is a LIVE code editor. Try editing and clicking Run!

const message = "JavaScript is amazing!";
console.log(message);

// Topics available:
console.log("📚 60+ concepts across 9 categories");
console.log("⚡ Edit any code and hit Run");
console.log("✨ Check out the Showcase tab for visual demos");

// Try me:
const fruits = ["🍎", "🍌", "🍇"];
fruits.forEach(fruit => console.log("Fruit:", fruit));`;
    updateHighlight();
  } else {
    const concept = concepts.find(c => c.name === item.dataset.name);
    if (concept) {
      pageTitle.textContent = concept.name;
      pageSubtitle.textContent = concept.cat;
      desc.innerHTML = concept.desc;
      editor.value = concept.code;
      updateHighlight();
    }
  }
});

// Search
document.getElementById('search').addEventListener('input', (e) => {
  const q = e.target.value.toLowerCase();
  document.querySelectorAll('.nav-item').forEach(item => {
    const text = item.textContent.toLowerCase();
    item.style.display = !q || text.includes(q) ? 'flex' : 'none';
  });
  document.querySelectorAll('.nav-group').forEach(group => {
    const visibleItems = group.querySelectorAll('.nav-item[style*="flex"], .nav-item:not([style])');
    const hasVisible = Array.from(group.querySelectorAll('.nav-item')).some(i => i.style.display !== 'none');
    group.style.display = hasVisible ? 'block' : 'none';
  });
});

// Tabs
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    
    if (tab.dataset.tab === 'learn') {
      document.getElementById('learnView').style.display = 'grid';
      document.getElementById('showcaseView').style.display = 'none';
    } else {
      document.getElementById('learnView').style.display = 'none';
      document.getElementById('showcaseView').style.display = 'block';
      pageTitle.textContent = '✨ Showcase';
      pageSubtitle.textContent = 'Stunning visual demos built with pure JavaScript';
      initShowcase();
    }
  });
});

// Showcase
let currentCleanup = null;
function initShowcase() {
  const grid = document.getElementById('showcaseGrid');
  grid.innerHTML = '';
  
  showcase.forEach(demo => {
    const card = document.createElement('div');
    card.className = 'demo-card';
    card.innerHTML = `
      <div class="demo-header">
        <span class="demo-title">${demo.title}</span>
        <span class="demo-badge">${demo.badge}</span>
      </div>
      <div class="demo-body">
        <canvas class="demo-canvas" width="400" height="220"></canvas>
        <div class="demo-controls"></div>
        <div class="demo-info">${demo.info}</div>
      </div>
    `;
    grid.appendChild(card);
    
    const canvas = card.querySelector('canvas');
    const controlsDiv = card.querySelector('.demo-controls');
    
    setTimeout(() => {
      const api = demo.setup(canvas);
      
      demo.controls.forEach(name => {
        const btn = document.createElement('button');
        btn.className = 'demo-btn';
        btn.textContent = name;
        btn.addEventListener('click', () => {
          api.controls[name]?.();
          btn.classList.add('active');
          setTimeout(() => btn.classList.remove('active'), 200);
        });
        controlsDiv.appendChild(btn);
      });
    }, 100);
  });
}

// Keyboard shortcut: Ctrl/Cmd + Enter to run
editor.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    document.getElementById('runBtn').click();
  }
  if (e.key === 'Tab') {
    e.preventDefault();
    const start = editor.selectionStart;
    const end = editor.selectionEnd;
    editor.value = editor.value.substring(0, start) + '  ' + editor.value.substring(end);
    editor.selectionStart = editor.selectionEnd = start + 2;
    updateHighlight();
  }
});

// Welcome state
pageTitle.textContent = 'Welcome to JS Encyclopedia';
pageSubtitle.textContent = 'Interactive learning with live code execution';
</script>
</body>
